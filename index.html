                    <tr><td>Moneyness</td><td><span class="badge badge-${(trade.moneyness||'ATM').toLowerCase()}">${trade.moneyness||'ATM'}</span></td></tr>
                    <tr><td>Intrinsic Value</td><td class="fw-bold ${intrinsic > 0 ? 'text-success' : 'text-danger'}">${formatUSD(intrinsic)}/unit</td></tr>
                    <tr><td>Total Payoff</td><td class="fw-bold">${formatUSD(payoff)}</td></tr>
                    <tr><td>Premium Paid</td><td>${formatUSD(trade.premiumTotal)}</td></tr>
                    <tr><td>Net P&L</td><td class="fw-bold ${payoff - trade.premiumTotal >= 0 ? 'text-success' : 'text-danger'}">${formatUSD(payoff - trade.premiumTotal)}</td></tr>
                </table>
                <div class="form-group mt-2"><label>Settlement Method</label><select id="evtExerciseSettlement">
                    <option value="futures">${trade.venue !== 'OTC' ? 'Delivery into Futures Position' : 'Cash Settlement'}</option>
                    <option value="cash">Cash Settlement</option>
                </select></div>`;
            break;
        case 'AUTO_EXERCISE':
            const autoIntrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            const isITM = autoIntrinsic > 0;
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Auto-Exercise')} — Exchange auto-exercises ITM options at expiry.</p>
                <table class="enrich-table">
                    <tr><td>Current Spot</td><td class="fw-bold">${formatUSD(spot)}</td></tr>
                    <tr><td>Strike</td><td>${formatUSD(trade.strike)}</td></tr>
                    <tr><td>Intrinsic Value</td><td class="${isITM ? 'text-success' : 'text-danger'} fw-bold">${formatUSD(autoIntrinsic)}</td></tr>
                    <tr><td>Auto-Exercise</td><td class="fw-bold">${isITM ? 'YES — option is ITM' : 'NO — option is OTM (will abandon)'}</td></tr>
                </table>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
                    CME/LME Rule: All options ITM by at least one tick at expiry are automatically exercised unless a contrary instruction is submitted. Source: CME Rule 812.01.
                </p>`;
            break;
        case 'ASSIGNMENT':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Assignment')} — you are assigned on this short ${trade.callPut} option.</p>
                <p style="font-size:0.78rem;">The option buyer has exercised. As the seller, you must fulfil the obligation
                ${trade.callPut === 'Call' ? '(deliver the underlying at the strike price)' : '(buy the underlying at the strike price)'}.</p>
                <table class="enrich-table mt-2">
                    <tr><td>Your Obligation</td><td class="fw-bold">${trade.callPut === 'Call' ? 'Sell' : 'Buy'} ${trade.quantity * com.contractSize} ${com.unit} @ ${formatUSD(trade.strike)}</td></tr>
                    <tr><td>Market Value</td><td>${formatUSD(spot * trade.quantity * com.contractSize)}</td></tr>
                    <tr><td>Premium Received</td><td class="text-success">${formatUSD(trade.premiumTotal)}</td></tr>
                </table>`;
            break;
        case 'ABANDONMENT':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Abandonment')} — let this option expire without exercising.</p>
                <table class="enrich-table">
                    <tr><td>Moneyness</td><td><span class="badge badge-${(trade.moneyness||'ATM').toLowerCase()}">${trade.moneyness||'ATM'}</span></td></tr>
                    <tr><td>Premium ${trade.buySell === 'Buy' ? 'Paid (lost)' : 'Received (kept)'}</td><td class="${trade.buySell === 'Buy' ? 'text-danger' : 'text-success'} fw-bold">${formatUSD(trade.premiumTotal)}</td></tr>
                </table>
                <p style="font-size:0.78rem; color:var(--text-muted); margin-top:8px;">
                    ${trade.buySell === 'Buy' ? 'Total loss is limited to premium paid.' : 'Premium received is fully earned.'}
                </p>`;
            break;
        case 'EARLY_TERMINATION':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Early Termination')} — mutually agree to terminate before maturity.</p>
                <div class="form-group"><label>Termination Date</label><input type="date" id="evtTermDate" value="${today()}"><span class="field-hint">Effective date of early termination. MTM close-out calculated as of this date.</span></div>
                <div class="form-group mt-2"><label>Breakage Fee / Settlement Amount</label><input type="number" id="evtTermFee" value="0" step="0.01"></div>
                <div class="form-group mt-2"><label>Reason</label><select id="evtTermReason"><option>Mutual agreement</option><option>Market conditions</option><option>Credit concern</option><option>Regulatory change</option></select></div>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
                    Per ISDA Master Agreement Section 6. MTM close-out value will be calculated at termination.
                </p>`;
            break;
        case 'PARTIAL_TERMINATION':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Partial Termination')} — reduce quantity. Current: ${trade.quantity} lots.</p>
                <div class="form-group"><label>Lots to Terminate</label><input type="number" id="evtPartialQty" value="1" min="1" max="${trade.quantity - 1}" oninput="document.getElementById('evtPartialRemaining').value = Math.max(0, ${trade.quantity} - parseInt(this.value || 0)) + ' lots'"></div>
                <div class="form-group mt-2"><label>Remaining after event</label><input type="text" id="evtPartialRemaining" value="${trade.quantity - 1} lots" readonly></div>`;
            break;
        case 'NOVATION':
            const otherCPs = Object.keys(COUNTERPARTIES).filter(cp => cp !== trade.counterparty);
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Novation')} — transfer this trade to a new counterparty (step-in).</p>
                <div class="form-group"><label>New Counterparty (Step-In)</label><select id="evtNovationCP">${otherCPs.map(cp => `<option value="${cp}">${cp}</option>`).join('')}</select></div>
                <div class="form-group mt-2"><label>Novation Fee</label><input type="number" id="evtNovationFee" value="0" step="0.01"></div>
                <table class="enrich-table mt-2">
                    <tr><td>Original Counterparty (Step-Out)</td><td>${trade.counterparty}</td></tr>
                    <tr><td>Trade Reference</td><td>${trade.id}</td></tr>
                    <tr><td>Notional</td><td>${formatUSD(trade.notional)}</td></tr>
                </table>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
                    The original trade is terminated and a new trade is created with the step-in counterparty on identical terms. Both events are EMIR-reportable.
                </p>`;
            break;
        case 'GIVE_UP':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Give-Up')} — transfer from executing broker to clearing broker.</p>
                <div class="form-group"><label>Clearing Broker</label><select id="evtGiveUpBroker">${Object.keys(COUNTERPARTIES).map(cp => `<option value="${cp}">${cp}</option>`).join('')}</select></div>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
                    Common for exchange-traded futures/options. The executing broker "gives up" the trade to the client's designated clearing member.
                </p>`;
            break;
        case 'ALLOCATION':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Allocation')} — split this block trade into sub-allocations.</p>
                <div class="form-group"><label>Number of Allocations</label><select id="evtAllocCount"><option value="2">2</option><option value="3">3</option></select></div>
                <p style="font-size:0.78rem; margin-top:8px;">Current quantity: <strong>${trade.quantity} lots</strong>. Each allocation will receive an equal share.</p>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:6px;">
                    Block trades are allocated to individual client accounts post-execution. Each allocation becomes a separate trade with its own reporting obligations.
                </p>`;
            break;
        case 'ROLL':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Roll/Carry')} — close near-month, open far-month position.</p>
                <div class="form-group"><label>Roll to ${tip('Prompt Date')}</label><input type="date" id="evtRollDate" value="${dateStr(addMonths(trade.valueDate || today(), 1))}"><span class="field-hint">New delivery month for the rolled position. Cost = calendar spread between months.</span></div>
                <div class="form-group mt-2"><label>Roll Cost / Spread</label><input type="number" id="evtRollCost" value="0" step="0.01"></div>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
                    The existing position is closed and a new position is opened for the next delivery month. The cost is the calendar spread between the two months.
                </p>`;
            break;
        case 'PHYSICAL_DELIVERY':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Physical Delivery')} — ${trade.buySell === 'Buy' ? 'take' : 'make'} delivery of ${com.name}.</p>
                <table class="enrich-table">
                    <tr><td>Metal</td><td>${com.name} (${trade.commodity})</td></tr>
                    <tr><td>Quantity</td><td>${trade.quantity * com.contractSize} ${com.unit}</td></tr>
                    <tr><td>Delivery Direction</td><td class="fw-bold">${trade.buySell === 'Buy' ? 'RECEIVE metal' : 'DELIVER metal'}</td></tr>
                    <tr><td>Delivery Location</td><td>${com.exchange === 'LME' ? 'LME-approved warehouse' : 'COMEX/NYMEX approved vault'}</td></tr>
                    ${com.type === 'base' ? '<tr><td>Warrant</td><td>Via LMEsword transfer</td></tr>' : '<tr><td>Account Type</td><td>' + (trade.metalAccount || 'Unallocated') + '</td></tr>'}
                </table>`;
            break;
        case 'CASH_SETTLEMENT':
            const mtm = isOptionType(trade.productType) ? (trade.optionTheoPrice || 0) - (trade.premium || 0) : spot - trade.price;
            const cashAmt = mtm * trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Cash Settlement')} — net cash payment at market close-out.</p>
                <table class="enrich-table">
                    <tr><td>Settlement Amount</td><td class="fw-bold ${cashAmt >= 0 ? 'text-success' : 'text-danger'}">${formatUSD(Math.abs(cashAmt))}</td></tr>
                    <tr><td>Direction</td><td>${cashAmt >= 0 ? 'RECEIVE' : 'PAY'}</td></tr>
                    <tr><td>Calculation</td><td>MTM close-out at ${formatUSD(spot)}</td></tr>
                </table>`;
            break;
        case 'MARGIN_CALL':
            const addlMargin = trade.notional * 0.02;
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Margin Call')} — additional collateral required.</p>
                <table class="enrich-table">
                    <tr><td>Current ${tip('Initial Margin')}</td><td>${formatUSD(trade.initialMargin)}</td></tr>
                    <tr><td>Current ${tip('Variation Margin')}</td><td>${formatUSD(trade.variationMargin)}</td></tr>
                    <tr><td>Additional Margin Required</td><td class="text-danger fw-bold">${formatUSD(addlMargin)}</td></tr>
                    <tr><td>Deadline</td><td>T+1 (next business day by 10:00 London)</td></tr>
                </table>`;
            break;
        case 'CREDIT_EVENT':
            formHtml = `
                <p style="font-size:0.82rem; margin-bottom:10px;">${tip('Credit Event')} — counterparty default triggers ISDA close-out.</p>
                <div class="form-group"><label>Event Type</label><select id="evtCreditType"><option>Failure to Pay</option><option>Bankruptcy</option><option>Credit Downgrade</option><option>Restructuring</option></select></div>
                <div style="background:var(--danger-bg); border:1px solid var(--danger-border); border-radius:var(--radius); padding:10px; margin-top:10px;">
                    <strong class="text-danger">Close-Out Netting:</strong> All trades with ${trade.counterparty} will be terminated and netted per ISDA Master Agreement Section 6(e). Close-out amount calculated at mid-market.
                </div>`;
            break;
        default:
            formHtml = `<p>Event: ${eventKey}</p>`;
    }

    // Render modal
    const modalId = 'eventModal';
    const existing = document.getElementById(modalId);
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = modalId;
    overlay.className = 'event-modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `<div class="event-modal">
        <h3>${evt.icon} ${evt.label}</h3>
        ${formHtml}
        <div class="btn-group" style="margin-top:16px;">
            <button class="btn btn-primary" onclick="executeEvent('${tradeId}', '${eventKey}')">Confirm ${evt.label}</button>
            <button class="btn btn-outline" onclick="document.getElementById('${modalId}').remove()">Cancel</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
}

function executeEvent(tradeId, eventKey) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade) return;
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);

    switch (eventKey) {
        case 'AMEND': {
            const newPrice = parseFloat(document.getElementById('evtAmendPrice')?.value) || trade.price;
            const newQty = parseInt(document.getElementById('evtAmendQty')?.value) || trade.quantity;
            const newVD = document.getElementById('evtAmendValueDate')?.value || trade.valueDate;
            const reason = document.getElementById('evtAmendReason')?.value || 'Amendment';
            trade.priorVersions.push({ price: trade.price, quantity: trade.quantity, valueDate: trade.valueDate, timestamp: new Date().toISOString() });
            const changes = [];
            if (newPrice !== trade.price) changes.push(`Price: ${formatUSD(trade.price)} -> ${formatUSD(newPrice)}`);
            if (newQty !== trade.quantity) changes.push(`Qty: ${trade.quantity} -> ${newQty}`);
            if (newVD !== trade.valueDate) changes.push(`Value Date: ${trade.valueDate} -> ${newVD}`);
            trade.price = newPrice; trade.quantity = newQty; trade.valueDate = newVD;
            trade.notional = trade.quantity * trade.price * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            if (isOptionType(trade.productType)) trade.notional = trade.quantity * trade.strike * com.contractSize;
            trade.amendCount++;
            trade.tradeStatus = 'AMENDED';
            setTimeout(() => { trade.tradeStatus = 'LIVE'; }, 100);
            addEvent(trade, 'AMEND', `${reason}: ${changes.join('; ') || 'No changes'}. Version ${trade.amendCount}.`);
            break;
        }
        case 'CANCEL': {
            const reason = document.getElementById('evtCancelReason')?.value || 'Cancelled';
            trade.tradeStatus = 'CANCELLED';
            addEvent(trade, 'CANCEL', `Trade cancelled. Reason: ${reason}. EMIR EROR report submitted to TR.`);
            break;
        }
        case 'EXERCISE': {
            const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            const payoff = intrinsic * trade.quantity * com.contractSize;
            const settlement = document.getElementById('evtExerciseSettlement')?.value || 'cash';
            trade.tradeStatus = 'EXERCISED';
            trade.exerciseResult = { intrinsic, payoff, settlement, spot, timestamp: new Date().toISOString() };
            trade.realisedPnL = payoff - trade.premiumTotal;
            addEvent(trade, 'EXERCISE', `${trade.callPut} exercised at spot ${formatUSD(spot)}. Intrinsic: ${formatUSD(intrinsic)}/unit. Payoff: ${formatUSD(payoff)}. Settlement: ${settlement}.`);
            break;
        }
        case 'AUTO_EXERCISE': {
            const autoIntrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            if (autoIntrinsic > 0) {
                const payoff = autoIntrinsic * trade.quantity * com.contractSize;
                trade.tradeStatus = 'EXERCISED';
                trade.exerciseResult = { intrinsic: autoIntrinsic, payoff, settlement: 'auto', spot, timestamp: new Date().toISOString() };
                trade.realisedPnL = trade.buySell === 'Buy' ? payoff - trade.premiumTotal : trade.premiumTotal - payoff;
                addEvent(trade, 'AUTO_EXERCISE', `Auto-exercised at expiry. Spot: ${formatUSD(spot)}, Intrinsic: ${formatUSD(autoIntrinsic)}/unit. CME Rule 812.01.`);
            } else {
                trade.tradeStatus = 'EXPIRED';
                trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
                addEvent(trade, 'ABANDONMENT', `OTM at expiry — auto-abandoned. Spot: ${formatUSD(spot)}, Strike: ${formatUSD(trade.strike)}. Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
            }
            break;
        }
        case 'ASSIGNMENT': {
            const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            const payoff = intrinsic * trade.quantity * com.contractSize;
            trade.tradeStatus = 'EXERCISED';
            trade.exerciseResult = { intrinsic, payoff, settlement: 'assignment', spot, timestamp: new Date().toISOString() };
            trade.realisedPnL = trade.premiumTotal - payoff;
            addEvent(trade, 'ASSIGNMENT', `Assigned on short ${trade.callPut}. Must ${trade.callPut === 'Call' ? 'sell' : 'buy'} ${trade.quantity * com.contractSize} ${com.unit} @ ${formatUSD(trade.strike)}. Loss on exercise: ${formatUSD(payoff)}.`);
            break;
        }
        case 'ABANDONMENT': {
            trade.tradeStatus = 'EXPIRED';
            trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
            addEvent(trade, 'ABANDONMENT', `Option abandoned (expired worthless). Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
            break;
        }
        case 'EXPIRY': {
            trade.tradeStatus = 'EXPIRED';
            if (isOptionType(trade.productType)) {
                const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
                if (intrinsic > 0) {
                    const payoff = intrinsic * trade.quantity * com.contractSize;
                    trade.exerciseResult = { intrinsic, payoff, settlement: 'expiry-auto', spot, timestamp: new Date().toISOString() };
                    trade.realisedPnL = trade.buySell === 'Buy' ? payoff - trade.premiumTotal : trade.premiumTotal - payoff;
                    addEvent(trade, 'EXPIRY', `Expired ITM. Auto-exercised. Payoff: ${formatUSD(payoff)}.`);
                } else {
                    trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
                    addEvent(trade, 'EXPIRY', `Expired OTM. No exercise. Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
                }
            } else {
                addEvent(trade, 'EXPIRY', `Future contract expired at prompt date. Final settlement price: ${formatUSD(spot)}.`);
            }
            break;
        }
        case 'EARLY_TERMINATION': {
            const termDate = document.getElementById('evtTermDate')?.value || today();
            const fee = parseFloat(document.getElementById('evtTermFee')?.value) || 0;
            const reason = document.getElementById('evtTermReason')?.value || 'Mutual agreement';
            trade.tradeStatus = 'TERMINATED';
            trade.terminationDate = termDate;
            const mult = trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            const closeOut = trade.buySell === 'Buy' ? (spot - trade.price) * mult : (trade.price - spot) * mult;
            trade.realisedPnL = closeOut - fee;
            addEvent(trade, 'EARLY_TERMINATION', `Terminated early. Reason: ${reason}. Close-out: ${formatUSD(closeOut)}. Fee: ${formatUSD(fee)}. Net: ${formatUSD(trade.realisedPnL)}. Per ISDA Section 6.`);
            break;
        }
        case 'PARTIAL_TERMINATION': {
            const termedQty = parseInt(document.getElementById('evtPartialQty')?.value) || 1;
            const remaining = trade.quantity - termedQty;
            if (remaining < 1) { alert('Cannot terminate all lots — use full termination instead.'); return; }
            trade.priorVersions.push({ quantity: trade.quantity, notional: trade.notional, timestamp: new Date().toISOString() });
            trade.quantity = remaining;
            trade.notional = remaining * trade.price * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            if (isOptionType(trade.productType)) {
                trade.notional = remaining * trade.strike * com.contractSize;
                trade.premiumTotal = trade.premium * remaining * com.contractSize;
            }
            addEvent(trade, 'PARTIAL_TERMINATION', `Partially terminated ${termedQty} lot(s). Remaining: ${remaining} lot(s). New notional: ${formatUSD(trade.notional)}.`);
            break;
        }
        case 'NOVATION': {
            const newCP = document.getElementById('evtNovationCP')?.value;
            const fee = parseFloat(document.getElementById('evtNovationFee')?.value) || 0;
            if (!newCP) return;
            const oldCP = trade.counterparty;
            // Terminate original trade
            trade.tradeStatus = 'NOVATED';
            trade.novatedTo = newCP;
            addEvent(trade, 'NOVATION', `Novated from ${oldCP} to ${newCP}. Fee: ${formatUSD(fee)}. Original trade terminated, new trade created.`);
            // Create new trade with new counterparty
            const newTradeData = {
                tradeDate: today(), counterparty: newCP, buySell: trade.buySell,
                productType: trade.productType, commodity: trade.commodity,
                quantity: String(trade.quantity), price: String(trade.price),
                valueDate: trade.valueDate, metalAccount: trade.metalAccount,
                callPut: trade.callPut, strike: trade.strike ? String(trade.strike) : null,
                premium: trade.premium ? String(trade.premium) : null,
                expiryDate: trade.expiryDate, exerciseStyle: trade.exerciseStyle,
                swapTenor: trade.swapTenor ? String(trade.swapTenor) : null,
                futurePromptDate: trade.futurePromptDate
            };
            const novTrade = createTradeObject(newTradeData);
            novTrade.stage = trade.stage;
            novTrade.novatedFrom = trade.id;
            novTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Created via novation from ${trade.id}. Step-in: ${newCP}. Step-out: ${oldCP}.`, emirAction: 'NEWT', emirEvent: 'NOVA', user: 'SYS' }];
            state.trades.push(novTrade);
            runValidation(novTrade);
            break;
        }
        case 'GIVE_UP': {
            const broker = document.getElementById('evtGiveUpBroker')?.value;
            if (!broker) return;
            addEvent(trade, 'GIVE_UP', `Given up from executing broker to clearing broker: ${broker}. Trade now cleared under ${broker}'s account.`);
            trade.clearer = broker + ' Clearing';
            break;
        }
        case 'ALLOCATION': {
            const allocCount = parseInt(document.getElementById('evtAllocCount')?.value) || 2;
            const perAlloc = Math.floor(trade.quantity / allocCount);
            const remainder = trade.quantity - (perAlloc * allocCount);
            trade.tradeStatus = 'CANCELLED';
            addEvent(trade, 'ALLOCATION', `Block trade allocated into ${allocCount} sub-trades of ${perAlloc} lots each.`);
            for (let i = 0; i < allocCount; i++) {
                const qty = i === 0 ? perAlloc + remainder : perAlloc;
                const allocData = {
                    tradeDate: trade.tradeDate, counterparty: trade.counterparty, buySell: trade.buySell,
                    productType: trade.productType, commodity: trade.commodity,
                    quantity: String(qty), price: String(trade.price),
                    valueDate: trade.valueDate, metalAccount: trade.metalAccount,
                    callPut: trade.callPut, strike: trade.strike ? String(trade.strike) : null,
                    premium: trade.premium ? String(trade.premium) : null,
                    expiryDate: trade.expiryDate, exerciseStyle: trade.exerciseStyle,
                    swapTenor: trade.swapTenor ? String(trade.swapTenor) : null,
                    futurePromptDate: trade.futurePromptDate
                };
                const allocTrade = createTradeObject(allocData);
                allocTrade.stage = 2;
                allocTrade.allocationParent = trade.id;
                allocTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Allocation ${i + 1}/${allocCount} from block ${trade.id}. Qty: ${qty} lots.`, emirAction: 'NEWT', emirEvent: 'ALOC', user: 'SYS' }];
                trade.allocationChildren.push(allocTrade.id);
                state.trades.push(allocTrade);
                runValidation(allocTrade);
            }
            break;
        }
        case 'ROLL': {
            const rollDate = document.getElementById('evtRollDate')?.value;
            const rollCost = parseFloat(document.getElementById('evtRollCost')?.value) || 0;
            // Close existing position
            trade.tradeStatus = 'TERMINATED';
            addEvent(trade, 'ROLL', `Position rolled. Near-month closed at ${formatUSD(spot)}. Roll cost: ${formatUSD(rollCost)}. New prompt: ${rollDate}.`);
            // Create new position
            const rollData = {
                tradeDate: today(), counterparty: trade.counterparty, buySell: trade.buySell,
                productType: trade.productType, commodity: trade.commodity,
                quantity: String(trade.quantity), price: String(spot + rollCost * (trade.buySell === 'Buy' ? 1 : -1)),
                valueDate: rollDate, metalAccount: trade.metalAccount,
                futurePromptDate: rollDate
            };
            const rollTrade = createTradeObject(rollData);
            rollTrade.stage = 2;
            rollTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Rolled from ${trade.id}. New prompt date: ${rollDate}. Carry cost: ${formatUSD(rollCost)}.`, emirAction: 'NEWT', emirEvent: 'TRAD', user: 'SYS' }];
            state.trades.push(rollTrade);
            runValidation(rollTrade);
            break;
        }
        case 'PHYSICAL_DELIVERY': {
            trade.deliveryStatus = 'DELIVERED';
            trade.tradeStatus = 'DELIVERED';
            addEvent(trade, 'PHYSICAL_DELIVERY', `Physical delivery completed. ${trade.buySell === 'Buy' ? 'Received' : 'Delivered'} ${trade.quantity * com.contractSize} ${com.unit} of ${com.name}. ${com.type === 'base' ? 'Warrant transferred via LMEsword.' : 'Account: ' + (trade.metalAccount || 'Unallocated')}.`);
            break;
        }
        case 'CASH_SETTLEMENT': {
            const mtm = isOptionType(trade.productType) ? ((trade.optionTheoPrice || 0) - (trade.premium || 0)) : (spot - trade.price);
            const cashAmt = mtm * trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            trade.realisedPnL = trade.buySell === 'Buy' ? cashAmt : -cashAmt;
            trade.tradeStatus = 'TERMINATED';
            addEvent(trade, 'CASH_SETTLEMENT', `Cash settled at ${formatUSD(spot)}. Settlement amount: ${formatUSD(Math.abs(cashAmt))} (${cashAmt >= 0 ? 'received' : 'paid'}).`);
            break;
        }
        case 'MARGIN_CALL': {
            const addlMargin = trade.notional * 0.02;
            trade.variationMargin += addlMargin;
            addEvent(trade, 'MARGIN_CALL', `Margin call: ${formatUSD(addlMargin)} additional collateral required. Total VM: ${formatUSD(trade.variationMargin)}. Deadline: T+1 10:00 London.`);
            break;
        }
        case 'CREDIT_EVENT': {
            const eventType = document.getElementById('evtCreditType')?.value || 'Failure to Pay';
            trade.tradeStatus = 'TERMINATED';
            const mult = trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            const closeOut = trade.buySell === 'Buy' ? (spot - trade.price) * mult : (trade.price - spot) * mult;
            trade.realisedPnL = closeOut;
            addEvent(trade, 'CREDIT_EVENT', `Credit event: ${eventType} by ${trade.counterparty}. ISDA close-out netting triggered. Close-out amount: ${formatUSD(closeOut)}. All trades with this counterparty terminated.`);
            break;
        }
    }

    // Close modal
    document.getElementById('eventModal')?.remove();

    // Update UI
    updateSidebar();
    const t = getCurrentTrade();
    if (t && t.id === tradeId) renderTradeView(t);
    else if (state.currentView === 'blotter') renderBlotterView();
}

function getPhysicalCode(commodity) {
    const com = COMMODITIES[commodity];
    return com && com.physicalCode ? com.physicalCode : null;
}

function generateBarNumber(metal) {
    const prefix = metal === 'Au' ? 'GD' : metal === 'Ag' ? 'SV' : metal === 'Pt' ? 'PT' : 'PD';
    return prefix + '-' + Math.floor(100000 + Math.random() * 900000);
}

function generateBarList(metal, quantity, contractSize) {
    const bars = [];
    const com = COMMODITIES[metal];
    const totalOz = quantity * contractSize;
    // Gold: ~400 oz bars; Silver: ~1000 oz bars; Pt/Pd: ~1-6 kg (~32-193 oz)
    const barSizeOz = metal === 'Au' ? 400 : metal === 'Ag' ? 1000 : 100;
    const numBars = Math.max(1, Math.round(totalOz / barSizeOz));
    const refiners = metal === 'Au' ? ['Argor-Heraeus', 'PAMP SA', 'Valcambi', 'Metalor', 'Rand Refinery', 'Perth Mint']
        : metal === 'Ag' ? ['Asahi Refining', 'KGHM', 'Umicore', 'Johnson Matthey', 'Heraeus']
        : ['Johnson Matthey', 'Heraeus', 'BASF', 'Tanaka', 'Valcambi'];
    const fineness = metal === 'Au' ? 0.9999 : metal === 'Ag' ? 0.999 : 0.9995;

    for (let i = 0; i < numBars; i++) {
        const grossWeight = barSizeOz * (0.97 + Math.random() * 0.06);
        bars.push({
            barNumber: generateBarNumber(metal),
            refiner: refiners[Math.floor(Math.random() * refiners.length)],
            grossWeight: parseFloat(grossWeight.toFixed(3)),
            fineness: parseFloat((fineness - Math.random() * 0.0005).toFixed(4)),
            fineWeight: parseFloat((grossWeight * fineness).toFixed(3)),
            year: 2020 + Math.floor(Math.random() * 6),
            vault: metal === 'Au' || metal === 'Ag' ? 'HSBC London Vault' : 'Johnson Matthey Royston'
        });
    }
    return bars;
}

function executePhysicalOp(tradeId, opType) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade) return;
    const com = COMMODITIES[trade.commodity];

    switch (opType) {
        case 'allocate':
            trade.metalAccount = 'Allocated';
            trade._barList = generateBarList(trade.commodity, trade.quantity, com.contractSize);
            addEvent(trade, 'AMEND', `Physical allocation: converted to Allocated account. ${trade._barList.length} bars assigned. Bar list generated.`);
            break;
        case 'unallocate':
            trade.metalAccount = 'Unallocated';
            trade._barList = null;
            addEvent(trade, 'AMEND', `Physical unallocation: converted to Unallocated account. Bars returned to pool. Client is now unsecured creditor.`);
            break;
        case 'vault_transfer':
            const fromVault = document.getElementById('physFromVault')?.value || 'HSBC London Vault';
            const toVault = document.getElementById('physToVault')?.value || 'JP Morgan London Vault';
            addEvent(trade, 'AMEND', `Vault transfer: ${trade.quantity * com.contractSize} ${com.unit} moved from ${fromVault} to ${toVault}.`);
            if (trade._barList) trade._barList.forEach(b => b.vault = toVault);
            break;
        case 'loco_swap':
            const from = document.getElementById('physLocoFrom')?.value || 'Loco London';
            const to = document.getElementById('physLocoTo')?.value || 'Loco Zurich';
            const premium = parseFloat(document.getElementById('physLocoPremium')?.value) || 0;
            addEvent(trade, 'AMEND', `Loco swap: ${from} -> ${to}. Premium: $${premium.toFixed(2)}/oz. No physical shipment — book transfer.`);
            break;
    }

    document.getElementById('physicalOpModal')?.remove();
    updateSidebar();
    const t = getCurrentTrade();
    if (t && t.id === tradeId) renderTradeView(t);
}

function renderAuctionPanel(trade) {
    const com = COMMODITIES[trade.commodity];
    if (com.type !== 'precious' || !com.lbmaFix) return '';
    const auction = LBMA_AUCTIONS[trade.commodity];
    if (!auction) return '';

    // Simulate an auction
    const fixPrice = getMarketPrice(trade.commodity);
    const rounds = [];
    let buyVol = 0, sellVol = 0, currentPrice = fixPrice * (1 + (Math.random() - 0.5) * 0.002);
    const numRounds = 3 + Math.floor(Math.random() * 4);
    for (let i = 1; i <= numRounds; i++) {
        const buyOrd = Math.floor(50 + Math.random() * 200);
        const sellOrd = Math.floor(50 + Math.random() * 200);
        const imbalance = buyOrd - sellOrd;
        const imbalanceDir = imbalance > 0 ? 'Buy surplus' : imbalance < 0 ? 'Sell surplus' : 'Balanced';
        const balanced = i === numRounds;
        if (!balanced) currentPrice += imbalance * 0.002;
        else currentPrice = fixPrice;
        rounds.push({
            round: i, price: currentPrice, buyOrders: buyOrd, sellOrders: sellOrd,
            imbalance: Math.abs(imbalance), direction: imbalanceDir,
            status: balanced ? 'FIXED' : 'Imbalanced — next round'
        });
        buyVol += buyOrd; sellVol += sellOrd;
    }

    let html = `<div class="card">
        <div class="card-title">${tip('LBMA Gold Price') === tip(auction.name) ? tip(auction.name) : auction.name} — ${tip('Auction Trade')}</div>
        <p style="font-size:0.78rem; color:var(--text-body); margin-bottom:10px;">
            The ${auction.name} is determined via electronic auction administered by ${tip('IBA')}.
            ${auction.participants} direct participants submit aggregated buy/sell orders.
            Auction runs in ${auction.roundDuration} rounds until buy and sell volumes balance within tolerance.
        </p>

        <table class="enrich-table">
            <tr><td>Benchmark</td><td class="fw-bold">${auction.name}</td></tr>
            <tr><td>Administrator</td><td>${auction.administrator}</td></tr>
            <tr><td>Auction Time(s)</td><td>${auction.times.join(' | ')}</td></tr>
            <tr><td>Currency</td><td>${auction.currency}</td></tr>
            <tr><td>Participants</td><td>${auction.participants} direct participants</td></tr>
            <tr><td>Round Duration</td><td>${auction.roundDuration}</td></tr>
            <tr><td>Fix Price</td><td class="fw-bold" style="color:var(--primary); font-size:1rem;">${formatUSD(fixPrice)}</td></tr>
        </table>

        <h4 style="font-size:0.82rem; margin:14px 0 8px; color:var(--primary);">Simulated Auction Rounds</h4>
        <div style="border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;">`;

    rounds.forEach(r => {
        const statusColor = r.status === 'FIXED' ? '#2f855a' : '#b7791f';
        html += `<div class="auction-round">
            <span class="auction-round-num">${r.round}</span>
            <span style="flex:1;">Price: <strong>${formatUSD(r.price)}</strong></span>
            <span style="font-size:0.72rem;">Buy: ${r.buyOrders} | Sell: ${r.sellOrders}</span>
            <span style="font-size:0.72rem; color:${statusColor}; font-weight:600;">${r.status}</span>
        </div>`;
    });

    html += `</div>
        <div style="margin-top:10px; font-size:0.72rem; color:var(--text-muted);">
            Total volume: Buy ${buyVol} orders | Sell ${sellVol} orders | ${numRounds} rounds to fix.
            Settlement: ${tip('Loco London')}, T+2 via ${tip('LPMCL')} unallocated accounts.
        </div>
    </div>`;
    return html;
}

function renderCFTCReport(trade) {
    const com = COMMODITIES[trade.commodity];
    // CFTC reporting applies to US exchange-traded commodity derivatives
    if (!['COMEX', 'NYMEX'].includes(com.exchange) && trade.productType !== 'Future' && !isOptionType(trade.productType)) return '';

    const reportingLevels = { Au: 200, Ag: 150, Cu: 50, Ni: 50, Pt: 50, Pd: 25 };
    const reportingLevel = reportingLevels[trade.commodity] || 100;
    const isReportable = trade.quantity >= reportingLevel;
    const traderCategory = trade.quantity >= reportingLevel * 2 ? 'Commercial' : 'Non-Commercial (Managed Money)';

    // CFTC Form 102 fields
    const cftcId = 'CFTC-' + trade.id.replace('TRD-', '');
    const specialAccountNumber = 'SA-' + Math.floor(10000 + Math.random() * 90000);
    const reportDate = trade.tradeDate;
    const commodityCode = com.futuresCode;
    const contractMonth = trade.futurePromptDate ? trade.futurePromptDate.slice(0, 7) : (trade.expiryDate ? trade.expiryDate.slice(0, 7) : trade.valueDate.slice(0, 7));

    let html = `<div style="margin-top:16px;">
        <h4 style="font-size:0.92rem; margin-bottom:10px;">

function generateWarrantNumber(metal) {
    return 'LME-' + metal.toUpperCase() + '-W' + Math.floor(10000 + Math.random() * 90000);
}

function generateLMEWarrants(trade) {
    const com = COMMODITIES[trade.commodity];
    const wData = LME_WARRANT_DATA[trade.commodity];
    if (!wData) return [];

    const warrants = [];
    const numWarrants = trade.quantity; // 1 warrant per lot
    for (let i = 0; i < numWarrants; i++) {
        const loc = wData.warehouseLocations[Math.floor(Math.random() * wData.warehouseLocations.length)];
        const brand = wData.brands[Math.floor(Math.random() * wData.brands.length)];
        const weight = parseFloat(com.contractSize).toFixed(3);
        warrants.push({
            warrantNumber: generateWarrantNumber(trade.commodity),
            metal: com.name,
            brand: brand,
            weight: weight + ' ' + com.unit,
            location: loc,
            warehouse: loc + ' Warehouse Co.',
            status: 'LIVE',
            issueDate: trade.tradeDate,
            rentPerDay: wData.rentPerDay,
            daysHeld: Math.floor(Math.random() * 60) + 1,
            lotSize: wData.parcelSize
        });
    }
    return warrants;
}

function renderLMEWarrantPanel(trade) {
    const com = COMMODITIES[trade.commodity];
    if (com.type !== 'base') return '';
    const wData = LME_WARRANT_DATA[trade.commodity];
    if (!wData) return '';

    if (!trade._warrants) trade._warrants = generateLMEWarrants(trade);

    let html = `<div class="card">
        <div class="card-title">${tip('LME Warrant')} Management — ${com.name}</div>
        <p style="font-size:0.78rem; color:var(--text-body); margin-bottom:10px;">
            An LME warrant is a document of title to a specific lot of ${com.name} in an LME-approved warehouse.
            Standard lot: ${wData.parcelSize}. Warrants are transferred electronically via ${tip('LMEsword')}.
        </p>

        <table class="enrich-table" style="margin-bottom:14px;">
            <tr><td>Standard Lot Size</td><td class="fw-bold">${wData.parcelSize}</td></tr>
            <tr><td>Approved Brands</td><td>${wData.brands.join(', ')}</td></tr>
            <tr><td>Warehouse Locations</td><td>${wData.warehouseLocations.join(', ')}</td></tr>
            <tr><td>${tip('Warrant Rent')}</td><td>$${wData.rentPerDay.toFixed(2)} per MT per day</td></tr>
            <tr><td>Insurance</td><td>${(wData.insurancePct * 100).toFixed(1)}% of metal value per annum</td></tr>
            <tr><td>Transfer System</td><td>${tip('LMEsword')} (electronic warrant register)</td></tr>
        </table>

        <h4 style="font-size:0.82rem; margin-bottom:8px; color:var(--primary);">Warrants Held (${trade._warrants.length})</h4>`;

    trade._warrants.forEach(w => {
        const statusClass = w.status === 'LIVE' ? 'warrant-live' : w.status === 'CANCELLED' ? 'warrant-cancelled' : 'warrant-delivered';
        const rentAccrued = (w.rentPerDay * w.daysHeld * parseFloat(w.weight)).toFixed(2);
        html += `<div class="warrant-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <strong style="font-family:'Courier New',monospace; font-size:0.82rem;">${w.warrantNumber}</strong>
                <span class="warrant-status ${statusClass}">${w.status === 'LIVE' ? tip('Live Warrant') : w.status === 'CANCELLED' ? tip('Cancelled Warrant') : 'DELIVERED'}</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; font-size:0.75rem;">
                <span>Brand: <strong>${w.brand}</strong></span>
                <span>Weight: <strong>${w.weight}</strong></span>
                <span>Location: <strong>${w.location}</strong></span>
                <span>Warehouse: ${w.warehouse}</span>
                <span>Issued: ${datePretty(w.issueDate)}</span>
                <span>Days held: ${w.daysHeld}</span>
            </div>
            <div style="font-size:0.72rem; color:var(--text-muted); margin-top:4px;">
                Rent accrued: $${rentAccrued} (${w.daysHeld} days x $${w.rentPerDay}/MT/day x ${w.weight.split(' ')[0]} MT)
            </div>
            ${w.status === 'LIVE' ? `<div style="margin-top:6px;">
                <button class="btn btn-outline btn-sm" onclick="cancelWarrant('${trade.id}', '${w.warrantNumber}')" style="font-size:0.7rem;">Cancel Warrant</button>
            </div>` : ''}
        </div>`;
    });

    // Delivery process explanation
    html += `<div style="margin-top:16px; padding:12px; background:var(--bg-page); border-radius:var(--radius);">
        <h4 style="font-size:0.82rem; margin-bottom:8px; color:var(--primary);">${tip('LME Delivery')} Process</h4>
        <ol style="font-size:0.78rem; line-height:1.8; margin-left:18px;">
            <li><strong>Prompt Date Approaches:</strong> Short position holder must deliver warrants to the long position holder.</li>
            <li><strong>Warrant Selection:</strong> Short selects warrants from their ${tip('LMEsword')} account (specific brand, location).</li>
            <li><strong>LMEsword Transfer:</strong> Warrants are electronically transferred from short's to long's ${tip('LMEsword')} account on prompt date.</li>
            <li><strong>Payment:</strong> Long pays the settlement price x lot size to the short.</li>
            <li><strong>Cancellation (optional):</strong> Long may "cancel" the warrant — instructing the warehouse to prepare metal for physical withdrawal.</li>
            <li><strong>Physical Withdrawal:</strong> Metal is loaded out from the warehouse. Rent ceases on the load-out date.</li>
        </ol>
        <p style="font-size:0.72rem; color:var(--text-muted); margin-top:8px;">
            <strong>Queue rules:</strong> Warehouses must load out a minimum of 3,000 MT/day (for metals with large stocks).
            ${tip('Cancelled Warrant')}s are reported daily by the LME and indicate metal leaving the warehouse system.
            The "cancelled warrant ratio" (cancelled / total) is a key market indicator of physical demand.
        </p>
    </div>`;

    // Total rent summary
    const totalRent = trade._warrants.reduce((s, w) => s + w.rentPerDay * w.daysHeld * parseFloat(w.weight), 0);
    html += `<div style="margin-top:10px; font-size:0.78rem;">
        <strong>Total Warrant Rent Accrued:</strong> <span class="text-danger">${formatUSD(totalRent)}</span>
        across ${trade._warrants.length} warrants.
    </div>`;

    html += `</div>`;
    return html;
}

function cancelWarrant(tradeId, warrantNumber) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade || !trade._warrants) return;
    const w = trade._warrants.find(wr => wr.warrantNumber === warrantNumber);
    if (!w || w.status !== 'LIVE') return;
    w.status = 'CANCELLED';
    addEvent(trade, 'AMEND', `LME Warrant ${warrantNumber} cancelled. Metal scheduled for withdrawal from ${w.location} warehouse. Brand: ${w.brand}, Weight: ${w.weight}.`);
    updateSidebar();
    const t = getCurrentTrade();
    if (t && t.id === tradeId) renderTradeView(t);
}

                <table class="doc-field-table">
                    <thead><tr><th>Term</th><th>Definition</th><th>Context</th></tr></thead>
                    <tbody>
                        <tr><td><strong>FOP</strong></td><td>Free of Payment &mdash; title transfers without simultaneous cash settlement</td><td>Used for internal transfers, pre-positioned metal</td></tr>
                        <tr><td><strong>DvP</strong></td><td>Delivery versus Payment &mdash; title and cash settle simultaneously</td><td>Standard for inter-bank precious metals settlement</td></tr>
                        <tr><td><strong>AURUM</strong></td><td>LPMCL's electronic clearing system for Loco London gold</td><td>Clears ~$30B daily in London gold transfers</td></tr>
                        <tr><td><strong>LMEsword</strong></td><td>Electronic warrant system for LME-approved warehouse metals</td><td>All LME warrant transfers are electronic since 1999</td></tr>
                        <tr><td><strong>Loco</strong></td><td>Location of delivery (e.g., Loco London, Loco Zurich)</td><td>Determines the settlement system and vault network</td></tr>
                        <tr><td><strong>Allocated</strong></td><td>Specific identified bars assigned to the account holder</td><td>Holder owns specific bars; custodian holds on bailment</td></tr>
                        <tr><td><strong>Unallocated</strong></td><td>General claim on the custodian for a quantity of metal</td><td>Fungible; holder is unsecured creditor of the bank</td></tr>

        <div class="card">
            <div class="card-title">Trade Certificates</div>

            <div class="doc-highlight">
                <strong>Role of Certificates:</strong> Certificates are independent third-party documents that verify the
                quality, quantity, origin, and condition of a commodity. They are issued by inspection companies
                (e.g., SGS, Bureau Veritas, Intertek, Alex Stewart International) and are required by buyers, banks
                (for documentary credits), and exchanges (for deliverable status).
            </div>

            <div class="doc-section">
                <div class="doc-section-title"><span class="doc-badge doc-badge-cert">CERT</span> Certificate Types</div>
                <div class="doc-info-grid">
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x2696;</div>
                            <div class="doc-info-name">Certificate of Quality / Assay</div>
                        </div>
                        <div class="doc-info-desc">
                            Confirms the chemical composition and purity of the commodity. For metals, this includes
                            assay results (fineness for precious metals, grade for base metals). For agri, it covers
                            protein content, moisture, foreign matter, etc.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x2696;</div>
                            <div class="doc-info-name">Certificate of Weight</div>
                        </div>
                        <div class="doc-info-desc">
                            Independent verification of the net and gross weight of the shipment. Critical for
                            calculating the invoice value (price x weight). Draft survey or shore-tank gauging
                            methods may be used for bulk cargoes.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F30D;</div>
                            <div class="doc-info-name">Certificate of Origin (CO)</div>
                        </div>
                        <div class="doc-info-desc">
                            Certifies the country of origin of the goods. Required for customs clearance, tariff
                            determination, and sanctions compliance. May be issued by a chamber of commerce or
                            the exporting country's trade authority.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4CB;</div>
                            <div class="doc-info-name">Certificate of Inspection</div>
                        </div>
                        <div class="doc-info-desc">
                            A comprehensive report covering visual inspection, sampling, and testing of the commodity.
                            Confirms that goods conform to the contract specifications. Often required by the
                            buyer's bank under a Letter of Credit (L/C).
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F9EA;</div>
                            <div class="doc-info-name">Phytosanitary Certificate</div>
                        </div>
                        <div class="doc-info-desc">
                            Required for agricultural commodities. Certifies that the goods are free from plant
                            pests and diseases and meet the importing country's phytosanitary requirements. Issued
                            by the national plant protection organization (NPPO) of the exporting country.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x2622;</div>
                            <div class="doc-info-name">Fumigation Certificate</div>
                        </div>
                        <div class="doc-info-desc">
                            Certifies that the cargo has been treated (fumigated) to eliminate insects, pests, or
                            biological contaminants. Required for grains, timber, and other organic commodities
                            before import into many jurisdictions.
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-title">Shipping Documents</div>

            <div class="doc-highlight">
                <strong>Critical Role:</strong> Shipping documents are the backbone of international commodity trade. The
                ${tip('Bill of Lading')} (B/L) serves as a receipt for goods, evidence of the contract of carriage, and
                &mdash; most importantly &mdash; a document of title. Presentation of a clean, on-board B/L is typically
                required to trigger payment under a Letter of Credit or documentary collection.
            </div>

            <div class="doc-section">
                <div class="doc-section-title"><span class="doc-badge doc-badge-ship">SHIP</span> Key Shipping Documents</div>
                <div class="doc-info-grid">
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4C4;</div>
                            <div class="doc-info-name">Bill of Lading (B/L)</div>
                        </div>
                        <div class="doc-info-desc">
                            The primary document of title in maritime trade. An original negotiable B/L can be endorsed
                            and transferred, giving the holder the right to claim the goods at the port of discharge.
                            Types include: Clean B/L, Claused B/L, Through B/L, Combined Transport B/L.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4CB;</div>
                            <div class="doc-info-name">Commercial Invoice</div>
                        </div>
                        <div class="doc-info-desc">
                            The seller's bill to the buyer, detailing the goods, quantity, unit price, total amount,
                            Incoterms, and payment terms. Must match the Letter of Credit terms exactly. Used for
                            customs valuation and duty calculation.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4E6;</div>
                            <div class="doc-info-name">Packing List</div>
                        </div>
                        <div class="doc-info-desc">
                            Itemized list of the cargo showing number of packages, their marks and numbers,
                            description of contents, individual and total weights, and dimensions. Enables customs
                            and consignees to identify specific packages within a shipment.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F6A2;</div>
                            <div class="doc-info-name">Mate's Receipt</div>
                        </div>
                        <div class="doc-info-desc">
                            Issued by the ship's officer acknowledging receipt of cargo on board. Serves as the
                            basis for issuing the Bill of Lading. Notes any damage or discrepancy observed during
                            loading. A "clean" mate's receipt leads to a "clean" B/L.
                        </div>
                    </div>
                </div>

                        <tr><td><strong>Through B/L</strong></td><td>Covers entire journey including transhipment at intermediate ports</td><td>Yes</td></tr>
                        <tr><td><strong>Sea Waybill</strong></td><td>Non-negotiable receipt; consignee named directly, no endorsement needed</td><td>No</td></tr>
                        <tr><td><strong>Charter Party B/L</strong></td><td>Issued under a charter party agreement for bulk shipments</td><td>Yes (subject to C/P terms)</td></tr>
                        <tr><td><strong>Multimodal B/L</strong></td><td>Covers combined transport (sea + rail/road) under one document</td><td>Yes</td></tr>
                    </tbody>

    <!-- TAB 4: WAREHOUSE RECEIPTS -->
    <!-- ============================================ -->
    <div class="doc-panel" id="docPanel-warehouse">
        <div class="card">
            <div class="card-title">Warehouse Receipts</div>

            <div class="doc-highlight">
                <strong>Document of Title:</strong> A warehouse receipt is issued by a licensed warehouse operator confirming
                that specified goods have been received for storage. In commodities markets, warehouse receipts serve
                as negotiable documents of title &mdash; they can be pledged as collateral for financing, endorsed and
                transferred for delivery, or presented for physical withdrawal. Exchange-approved receipts (LME warrants,
                CME EWRs) are standardized and electronically managed.
            </div>

            <div class="doc-section">
                <div class="doc-section-title"><span class="doc-badge doc-badge-wr">W/R</span> Warehouse Receipt Types</div>
                <div class="doc-info-grid">
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F3ED;</div>
                            <div class="doc-info-name">LME Warrant</div>
                        </div>
                        <div class="doc-info-desc">
                            Electronic warehouse receipt in the LMEsword system representing one lot of metal
                            (e.g., 25 MT copper, 25 MT aluminium) stored in an LME-approved warehouse.
                            Fully negotiable, can be used for delivery against futures contracts.
                        </div>
                        <ul class="doc-checklist">
                            <li>Electronic via LMEsword &mdash; no physical document</li>
                            <li>One warrant per lot; specific brand, weight, location</li>
                            <li>Live / Cancelled status tracked in real time</li>
                            <li>Daily rent charged by warehouse operator</li>
                        </ul>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4DC;</div>
                            <div class="doc-info-name">CME Electronic Warehouse Receipt (EWR)</div>
                        </div>
                        <div class="doc-info-desc">
                            Electronic receipt system for agricultural commodities (grains, oilseeds) and COMEX
                            metals (gold, silver, copper). Title transfer occurs within the CME clearing system.
                            Replaced physical receipts for most delivery-grade commodities.
                        </div>
                        <ul class="doc-checklist">
                            <li>Covers COMEX gold (100 oz), silver (5,000 oz), copper</li>
                            <li>Grains: wheat, corn, soybeans at approved elevators</li>
                            <li>Linked to futures contract delivery process</li>
                            <li>Tracked via CME's online delivery system</li>
                        </ul>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4C4;</div>
                            <div class="doc-info-name">Field Warehouse Receipt</div>
                        </div>
                        <div class="doc-info-desc">
                            Issued when a third-party warehouse company takes control of goods stored at the
                            owner's premises (field warehousing). Used in commodity trade finance &mdash; the
                            collateral management agent (e.g., ACE Global, Cotecna) acts as custodian and
                            issues receipts acceptable to financing banks.
                        </div>
                        <ul class="doc-checklist">
                            <li>Goods remain at producer/trader's site</li>

            <div class="doc-highlight">
                <strong>Logistics Chain:</strong> Commodity transportation involves multiple modes (sea, rail, road, pipeline)
                and requires specific documentation at each stage. For sea freight, the Charter Party agreement
                governs the terms of vessel hire, while voyage details, loading/discharge rates, and demurrage/despatch
                calculations are critical cost components. Multimodal shipments require coordinated documentation
                across carriers.
            </div>

            <div class="doc-section">
                <div class="doc-section-title"><span class="doc-badge doc-badge-transport">TRANS</span> Transportation Document Types</div>
                <div class="doc-info-grid">
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F6A2;</div>
                            <div class="doc-info-name">Charter Party (C/P)</div>
                        </div>
                        <div class="doc-info-desc">
                            Contract between shipowner and charterer for the hire of a vessel. Voyage charter (for
                            specific voyage) or time charter (for a period). Standard forms include GENCON (general cargo),
                            Asbatankvoy (tankers), and Amwelsh (coal). Specifies freight rate, laytime, demurrage,
                            loading/discharge ports.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F682;</div>
                            <div class="doc-info-name">Rail Waybill (CIM/SMGS)</div>
                        </div>
                        <div class="doc-info-desc">
                            International rail consignment note. CIM covers European rail; SMGS covers CIS/Russia/Asia routes.
                            Used for overland transport of metals, coal, grain. Non-negotiable transport document,
                            but essential for cross-border rail customs clearance.
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F69A;</div>
                            <div class="doc-info-name">CMR (Road Consignment Note)</div>
                        </div>
                        <div class="doc-info-desc">
                            International road freight document under the CMR Convention. Covers truck transport between
                            countries. Records sender, carrier, consignee, goods description, weight, and delivery
                            instructions. Three original copies (sender, carrier, consignee).
                        </div>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x2708;</div>
                            <div class="doc-info-name">Air Waybill (AWB)</div>
                        </div>
                        <div class="doc-info-desc">
                            Used for high-value, time-sensitive commodity shipments (e.g., precious metals, diamonds,
                            critical spare parts). Non-negotiable. Issued by the airline or freight forwarder. IATA
                            standard format. Covers airport-to-airport carriage with door delivery as option.
                        </div>
                    </div>
                </div>

                <table class="doc-field-table">
                    <thead><tr><th>Term</th><th>Definition</th><th>Typical Rate</th></tr></thead>
                    <tbody>
                        <tr><td><strong>Laytime</strong></td><td>Agreed time allowed for loading/discharging cargo</td><td>Measured in running days or weather working days</td></tr>
                        <tr><td><strong>Demurrage</strong></td><td>Liquidated damages payable by charterer for exceeding laytime</td><td>USD 15,000-25,000/day (Handymax)</td></tr>
                        <tr><td><strong>Despatch</strong></td><td>Reward from owner to charterer for completing under laytime</td><td>Usually 50% of demurrage rate</td></tr>
                        <tr><td><strong>NOR</strong></td><td>Notice of Readiness &mdash; formal notice that vessel is ready to load/discharge</td><td>Triggers laytime commencement</td></tr>
                        <tr><td><strong>PWWD</strong></td><td>Per Weather Working Day &mdash; bad weather days excluded from laytime</td><td>Standard for dry bulk</td></tr>
                        <tr><td><strong>SHINC/SHEX</strong></td><td>Sundays &amp; Holidays Included / Excluded from laytime count</td><td>Negotiable per fixture</td></tr>
                        <tr><td><strong>FIOST</strong></td><td>Free In &amp; Out, Stowed &amp; Trimmed &mdash; loading/discharge costs for charterer</td><td>Reduces freight rate</td></tr>

    <div class="doc-panel" id="docPanel-insurance">
        <div class="card">
            <div class="card-title">Commodity Insurance</div>

            <div class="doc-highlight">
                <strong>Risk Transfer:</strong> Marine cargo insurance protects the owner of goods against physical loss or
                damage during transit. Under CIF or CIP Incoterms, the seller is obligated to procure insurance for
                the buyer. The Institute Cargo Clauses (ICC) &mdash; A, B, or C &mdash; define the scope of cover. ICC(A)
                provides "all risks" cover and is standard for high-value commodities. War Risks and Strikes cover
                are typically added separately.
            </div>

            <div class="doc-section">
                <div class="doc-section-title"><span class="doc-badge doc-badge-insurance">INS</span> Insurance Types in Commodity Trade</div>
                <div class="doc-info-grid">
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F6A2;</div>
                            <div class="doc-info-name">Marine Cargo Insurance</div>
                        </div>
                        <div class="doc-info-desc">
                            Covers goods in transit by sea, and often includes inland legs (warehouse-to-warehouse).
                            Typically insured at 110% of CIF value (industry standard, required by most L/Cs).
                            Governed by Institute Cargo Clauses issued by the International Underwriting Association.
                        </div>
                        <ul class="doc-checklist">
                            <li>ICC(A): All risks &mdash; broadest cover, excludes only named exclusions</li>
                            <li>ICC(B): Named perils &mdash; fire, explosion, stranding, collision, earthquake, volcanic eruption</li>
                            <li>ICC(C): Minimal &mdash; major casualties only (fire, sinking, collision)</li>
                            <li>War Risks &amp; SRCC (Strikes, Riots, Civil Commotion) added separately</li>
                        </ul>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F3ED;</div>
                            <div class="doc-info-name">Stock Throughput Insurance</div>
                        </div>
                        <div class="doc-info-desc">
                            Comprehensive policy covering commodities through the entire supply chain: in storage,
                            in transit, and at all intermediate points. Eliminates gaps between warehouse and transit
                            policies. Preferred by large commodity traders and banks providing inventory finance.
                        </div>
                        <ul class="doc-checklist">
                            <li>Seamless cover from origin to final destination</li>
                            <li>Includes warehouse storage, loading, transit, discharge</li>
                            <li>Valued at market price or replacement cost</li>
                            <li>Common for base metals, precious metals, soft commodities</li>
                        </ul>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F4B0;</div>
                            <div class="doc-info-name">P&amp;I Insurance</div>
                        </div>
                        <div class="doc-info-desc">
                            Protection &amp; Indemnity insurance covers the shipowner's third-party liabilities:
                            cargo damage claims, pollution, wreck removal, crew injury. Provided by P&amp;I Clubs
                            (mutual associations). Not directly purchased by cargo owners, but essential for vessel
                            chartering due diligence.
                        </div>
                        <ul class="doc-checklist">
                            <li>International Group of P&amp;I Clubs (13 clubs)</li>
                            <li>Covers ~90% of world's ocean-going tonnage</li>
                            <li>Charterers should verify vessel's P&amp;I club membership</li>
                            <li>Blue Card required for oil tankers (CLC Convention)</li>
                        </ul>
                    </div>
                    <div class="doc-info-card">
                        <div class="doc-info-header">
                            <div class="doc-info-icon">&#x1F525;</div>
                            <div class="doc-info-name">Warehouse Legal Liability</div>
                        </div>
                        <div class="doc-info-desc">
                            Insurance held by the warehouse operator covering their legal liability for loss or
                            damage to stored goods caused by the operator's negligence. Does NOT cover all risks &mdash;
                            depositors typically need their own stock insurance for comprehensive protection.
                        </div>
                        <ul class="doc-checklist">
                            <li>Covers operator negligence only (not Acts of God)</li>
                            <li>Limits may be per-incident and aggregate</li>
                            <li>LME warehouses must maintain minimum cover</li>
                            <li>Depositor should carry own "all risks" stock policy</li>
                        </ul>
                    </div>
                </div>
            </div>

    ];

        const spot = getMarketPrice(item.commodity);
        item.spotPrice = spot;

function sipCalculateWaterfall(structure, inventoryValue) {
    const s = SIP_STRUCTURES[structure];
    if (!s) return [];
    const ex = s.example;
    const loanAmt = inventoryValue * ex.loanPct;
    const interest = loanAmt * ex.rate * (ex.tenor / 365);
    const storageCost = inventoryValue * 0.003 * (ex.tenor / 365);
    const insuranceCost = inventoryValue * 0.001 * (ex.tenor / 365);
    const mgmtFee = loanAmt * 0.005;
    const totalCost = interest + storageCost + insuranceCost + mgmtFee;
    return [
        { label: 'Inventory Market Value', amount: inventoryValue, type: 'asset' },
        { label: 'Advance Rate', amount: ex.loanPct, type: 'pct' },
        { label: 'Loan / Financing Amount', amount: loanAmt, type: 'loan' },
        { label: 'Interest (' + (ex.rate * 100).toFixed(1) + '% x ' + ex.tenor + ' days)', amount: -interest, type: 'cost' },
        { label: 'Storage / Warehouse Rent', amount: -storageCost, type: 'cost' },
        { label: 'Insurance Premium', amount: -insuranceCost, type: 'cost' },
        { label: 'Arrangement / Management Fee', amount: -mgmtFee, type: 'cost' },
        { label: 'Total Financing Cost', amount: -totalCost, type: 'subtotal' },
        { label: 'Net Proceeds to Borrower', amount: loanAmt - totalCost, type: 'total' },
        { label: 'Effective All-In Cost (annualised)', amount: (totalCost / loanAmt) / (ex.tenor / 365), type: 'annpct' }
    ];
}
