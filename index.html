function renderBlotterHTML(highlightId) {
    if (state.trades.length === 0) {
        return `<div class="card"><div class="card-title">Position Blotter</div>
            <p class="text-muted">No trades yet. Capture a new trade or click "Seed 7 Demo Trades" to populate.</p></div>`;
    }

    let html = `<div class="card">
        <div class="card-title">Trade Blotter — Position Reporting</div>
        <div style="overflow-x:auto;">
        <table class="data-table">
            <thead><tr>
                <th>Trade ID</th><th>Commodity</th><th>B/S</th><th>Product</th><th>Qty</th>
                <th>Price</th><th>Strike</th><th>Premium</th><th>Type Detail</th>
                <th>Notional</th><th>Counterparty</th>
                <th>Value Date</th><th>Status</th><th>Stage</th><th>Unrealised P&L</th><th></th>
            </tr></thead><tbody>`;

    state.trades.forEach(t => {
        const com = COMMODITIES[t.commodity];
        const mkt = getMarketPrice(t.commodity);
        const isOpt = isOptionType(t.productType);
        let unrealPnL;
        if (isOpt) {
            const theo = t.optionTheoPrice || 0;
            const prem = t.premium || 0;
            unrealPnL = t.buySell === 'Buy'
                ? (theo - prem) * t.quantity * com.contractSize
                : (prem - theo) * t.quantity * com.contractSize;
        } else {
            const mult = t.quantity * com.contractSize * (t.productType === 'Swap' ? (t.swapTenor || 1) : 1);
            unrealPnL = t.buySell === 'Buy'
                ? (mkt - t.price) * mult
                : (t.price - mkt) * mult;
        }
        const pnlClass = unrealPnL >= 0 ? 'text-success' : 'text-danger';
        const rowClass = t.id === highlightId ? 'highlight' : '';

        let typeDetail = '---';
        if (isOpt) typeDetail = t.callPut;
        else if (t.productType === 'Swap') typeDetail = t.swapTenor + 'M';
        else if (t.productType === 'Future') typeDetail = t.exchangeTicker || (t.futurePromptDate ? datePretty(t.futurePromptDate) : '---');

        html += `<tr class="${rowClass}">
            <td class="fw-bold">${t.id}</td>
            <td>${com.name} (${t.commodity})</td>
            <td><span class="badge ${t.buySell === 'Buy' ? 'badge-buy' : 'badge-sell'}">${t.buySell}</span></td>
            <td>${t.productType}</td>
            <td>${t.quantity}</td>
            <td>${formatUSD(t.price)}</td>
            <td>${isOpt ? formatUSD(t.strike) : '---'}</td>
            <td>${isOpt ? formatUSD(t.premium) : '---'}</td>
            <td>${typeDetail}</td>
            <td>${formatUSD(t.notional)}</td>
            <td>${t.counterparty}</td>
            <td>${datePretty(t.valueDate)}</td>
            <td><span class="trade-status-badge status-${(t.tradeStatus || 'live').toLowerCase()}">${t.tradeStatus || 'LIVE'}</span></td>
            <td><span class="badge badge-stage">${STAGES[t.stage - 1]}</span></td>
            <td class="${pnlClass} fw-bold">${formatUSD(unrealPnL)}</td>
            <td><button class="btn btn-outline btn-sm" onclick="viewTrade('${t.id}')">View</button></td>
        </tr>`;
    });

    html += '</tbody></table></div></div>';

    // Aggregate panel
    const agg = {};
    state.trades.forEach(t => {
        const com = COMMODITIES[t.commodity];
        if (!agg[t.commodity]) {
            agg[t.commodity] = { name: com.name, symbol: t.commodity, totalNotional: 0, netQty: 0, unit: com.unit, contractSize: com.contractSize };
        }
        agg[t.commodity].totalNotional += t.notional;
        const sign = t.buySell === 'Buy' ? 1 : -1;
        agg[t.commodity].netQty += sign * t.quantity;
    });

    html += `<div class="card">
        <div class="card-title">Aggregate Positions</div>
        <div class="agg-grid">`;

    for (const [sym, a] of Object.entries(agg)) {
        const posLabel = a.netQty > 0 ? 'Long' : (a.netQty < 0 ? 'Short' : 'Flat');
        const posClass = a.netQty > 0 ? 'long' : (a.netQty < 0 ? 'short' : 'flat');
        html += `<div class="agg-card">
            <div class="agg-card-label">${a.name} (${sym})</div>
            <div class="agg-card-value">${formatUSD(a.totalNotional)}</div>
            <div class="agg-card-sub ${posClass}">Net: ${a.netQty > 0 ? '+' : ''}${a.netQty} lots &mdash; ${posLabel}</div>
        </div>`;
    }

    html += '</div></div>';

    // Regulatory Reports Section
    const reportableTrades = state.trades.filter(t => t.mifidFields || t.emirFields);
    if (reportableTrades.length > 0) {
        html += `<div class="card">
            <div class="card-title">Regulatory Reports — ${tip('MiFID II')} & ${tip('EMIR')}</div>
            <p style="font-size:0.82rem; margin-bottom:10px;">
                Sample regulatory reports for trades with enriched MiFID II / EMIR data.
                Select a trade to view its regulatory submissions.
            </p>
            <div style="margin-bottom:10px;">
                <select id="regReportTradeSelect" onchange="renderSelectedRegReport()" style="padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:0.85rem;">
                    ${reportableTrades.map(t => `<option value="${t.id}">${t.id} — ${COMMODITIES[t.commodity].name} ${t.productType} (${t.buySell})</option>`).join('')}
                </select>
            </div>
            <div id="regReportContainer"></div>
        </div>`;
        setTimeout(() => renderSelectedRegReport(), 50);
    }

    return html;
}

function renderSelectedRegReport() {
    const sel = document.getElementById('regReportTradeSelect');
    const container = document.getElementById('regReportContainer');
    if (!sel || !container) return;
    const trade = state.trades.find(t => t.id === sel.value);
    if (!trade) { container.innerHTML = ''; return; }
    container.innerHTML = renderMiFIDReport(trade) + renderEMIRReport(trade);
}


// ============================================================
// SECTION 18: STAGE ADVANCEMENT
// ============================================================

function advanceStage(tradeId, toStage) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade) return;
    trade.stage = toStage;

    if (toStage === 2) runValidation(trade);
    if (toStage === 3) trade.confirmationMessage = generateConfirmation(trade);
    if (toStage === 4) computeClearing(trade);

    updateSidebar();
    renderTradeView(trade);
}

// SECTION 19: RIGHT SIDEBAR — RISK & VALUATION PANELS
// ============================================================

function updateSidebar() {
    const sidebar = document.getElementById('riskSidebar');

    let totalMtmPnL = 0;
    state.trades.forEach(t => {
        const com = COMMODITIES[t.commodity];
        const mkt = getMarketPrice(t.commodity);
        if (isOptionType(t.productType)) {
            const theo = t.optionTheoPrice || 0;
            const prem = t.premium || 0;
            const pnl = t.buySell === 'Buy'
                ? (theo - prem) * t.quantity * com.contractSize
                : (prem - theo) * t.quantity * com.contractSize;
            totalMtmPnL += pnl;
        } else {
            const mult = t.quantity * com.contractSize * (t.productType === 'Swap' ? (t.swapTenor || 1) : 1);
            const pnl = t.buySell === 'Buy' ? (mkt - t.price) * mult : (t.price - mkt) * mult;
            totalMtmPnL += pnl;
        }
    });

    let totalNotional = 0;
    state.trades.forEach(t => { totalNotional += t.notional; });
    const var95 = totalNotional * 0.02;

    const creditLimit = 50000000;
    const cpExposure = {};
    state.trades.forEach(t => {
        if (!cpExposure[t.counterparty]) cpExposure[t.counterparty] = 0;
        cpExposure[t.counterparty] += t.notional;
    });

    let totalRealisedPnL = 0;
    state.trades.filter(t => t.settled).forEach(t => {
        totalRealisedPnL += t.realisedPnL;
    });

    const pnlClass = (v) => v >= 0 ? 'positive' : 'negative';

    // Greeks aggregation for options
    const optionTrades = state.trades.filter(t => isOptionType(t.productType) && t.optionGreeks);
    let aggDelta = 0, aggGamma = 0, aggVega = 0, aggTheta = 0;
    optionTrades.forEach(t => {
        const com = COMMODITIES[t.commodity];
        const mult = t.quantity * com.contractSize;
        const sign = t.buySell === 'Buy' ? 1 : -1;
        aggDelta += sign * t.optionGreeks.delta * mult;
        aggGamma += sign * t.optionGreeks.gamma * mult;
        aggVega += sign * t.optionGreeks.vega * mult;
        aggTheta += sign * t.optionGreeks.theta * mult;
    });

    sidebar.innerHTML = `
    <div class="sidebar-title">Parallel Functions</div>

    <div class="risk-panel">
        <div class="risk-panel-title">${tip('MTM')} Valuation</div>
        <div class="risk-row">
            <span>Daily Mark-to-Market P&L</span>
            <span class="risk-value ${pnlClass(totalMtmPnL)}">${formatUSD(totalMtmPnL)}</span>
        </div>
        <div class="risk-row">
            <span>Open Positions</span>
            <span class="risk-value">${state.trades.filter(t => !t.settled).length}</span>
        </div>
        <div style="font-size:0.65rem; color:var(--text-muted); margin-top:4px; line-height:1.4;">
            ${tip('MTM Formula')}: Futures: (Mkt-Trade)xQtyxCS<br>
            Options: (Theo-Prem)xQtyxCS (${tip('Black-76')})
        </div>
    </div>

    <div class="risk-panel">
        <div class="risk-panel-title">Market Risk</div>
        <div class="risk-row">
            <span>Total Notional Exposure</span>
            <span class="risk-value">${formatUSD(totalNotional)}</span>
        </div>
        <div class="risk-row">
            <span>${tip('VaR')} (2% of notional)</span>
            <span class="risk-value negative">${formatUSD(var95)}</span>
        </div>
    </div>

    <div class="risk-panel">
        <div class="risk-panel-title">Credit Risk</div>
        ${Object.entries(cpExposure).map(([cp, exp]) => {
            const pct = (exp / creditLimit) * 100;
            const barClass = pct > 100 ? 'red' : (pct > 80 ? 'amber' : 'safe');
            const warn = pct > 100 ? ' <span class="text-danger fw-bold">LIMIT BREACH</span>' : (pct > 80 ? ' <span class="text-warning fw-bold">WARNING</span>' : '');
            return `<div class="credit-bar-container">
                <div class="credit-bar-label">
                    <span>${cp}${warn}</span>
                    <span>${formatUSD(exp)} / ${formatUSD(creditLimit)}</span>
                </div>
                <div class="credit-bar">
                    <div class="credit-bar-fill ${barClass}" style="width: ${Math.min(pct, 100)}%"></div>
                </div>
            </div>`;
        }).join('')}
        ${Object.keys(cpExposure).length === 0 ? '<span class="text-muted" style="font-size:0.78rem;">No counterparty exposure</span>' : ''}
    </div>

    <div class="risk-panel">
        <div class="risk-panel-title">Accounting</div>
        <div class="risk-row">
            <span>Cumulative Realised P&L</span>
            <span class="risk-value ${pnlClass(totalRealisedPnL)}">${formatUSD(totalRealisedPnL)}</span>
        </div>
        <div class="risk-row">
            <span>Settled Trades</span>
            <span class="risk-value">${state.trades.filter(t => t.settled).length}</span>
        </div>
    </div>

    ${optionTrades.length > 0 ? `<div class="risk-panel">
        <div class="risk-panel-title">Portfolio Greeks</div>
        <div class="risk-row">
            <span>${tip('Delta')} Exposure</span>
            <span class="risk-value ${pnlClass(aggDelta)}">${formatNum(aggDelta, 2)}</span>
        </div>
        <div class="risk-row">
            <span>${tip('Gamma')}</span>
            <span class="risk-value">${formatNum(aggGamma, 4)}</span>
        </div>
        <div class="risk-row">
            <span>${tip('Vega')} (per 1% vol)</span>
            <span class="risk-value">${formatUSD(aggVega)}</span>
        </div>
        <div class="risk-row">
            <span>${tip('Theta')} (per day)</span>
            <span class="risk-value ${pnlClass(aggTheta)}">${formatUSD(aggTheta)}</span>
        </div>
    </div>` : ''}`;
}

            <strong>${tip('Partial Termination')}</strong> (EMIR: MODI/ETRM) — Reduce the notional quantity while the remainder continues.

        </div>

        <div class="about-section">
            <h3>Transfer &amp; Allocation</h3>
            <p><strong>${tip('Novation')}</strong> (EMIR: TERM/NOVA) — Transfer a trade to a new counterparty (step-in). The original

            <strong>${tip('Give-Up')}</strong> — Transfer from executing broker to clearing broker, common for exchange-traded products.
            <strong>${tip('Allocation')}</strong> (EMIR: MODI/ALOC) — Split a block trade into individual client sub-allocations.

        </div>

        <div class="about-section">
            <h3>Roll, Delivery &amp; Settlement</h3>

            delivery is via LME warrant transfer through ${tip('LMEsword')}. For precious metals, delivery goes through

            under the ISDA Master Agreement Section 6(e). All trades with the defaulting counterparty are terminated and netted.</p>
        </div>

// ============================================================
// SECTION 23: BLACK-76 PRICING ENGINE
// ============================================================

function cumulativeNormalDist(x) {
    const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
    const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
    const sign = x < 0 ? -1 : 1;
    const t = 1.0 / (1.0 + p * Math.abs(x));
    const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x / 2);
    return 0.5 * (1.0 + sign * y);
}

function standardNormalPDF(x) {
    return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
}

function timeToExpiry(expiryDate) {
    const now = new Date();
    const exp = new Date(expiryDate);
    const diffMs = exp - now;
    const years = diffMs / (365.25 * 24 * 60 * 60 * 1000);
    return Math.max(years, 1 / 365);
}

function black76Price(F, K, T, r, sigma, callPut) {
    if (T <= 0) T = 1 / 365;
    if (sigma <= 0) sigma = 0.01;
    const sqrtT = Math.sqrt(T);
    const d1 = (Math.log(F / K) + (sigma * sigma / 2) * T) / (sigma * sqrtT);
    const d2 = d1 - sigma * sqrtT;
    const df = Math.exp(-r * T);
    if (callPut === 'Call') {
        return df * (F * cumulativeNormalDist(d1) - K * cumulativeNormalDist(d2));
    } else {
        return df * (K * cumulativeNormalDist(-d2) - F * cumulativeNormalDist(-d1));
    }
}

function black76Greeks(F, K, T, r, sigma, callPut) {
    if (T <= 0) T = 1 / 365;
    if (sigma <= 0) sigma = 0.01;
    const sqrtT = Math.sqrt(T);
    const d1 = (Math.log(F / K) + (sigma * sigma / 2) * T) / (sigma * sqrtT);
    const d2 = d1 - sigma * sqrtT;
    const df = Math.exp(-r * T);

    let delta, theta;
    if (callPut === 'Call') {
        delta = df * cumulativeNormalDist(d1);
        theta = (-F * df * standardNormalPDF(d1) * sigma / (2 * sqrtT)
                 + r * df * (F * cumulativeNormalDist(d1) - K * cumulativeNormalDist(d2))) / 365;
    } else {
        delta = -df * cumulativeNormalDist(-d1);
        theta = (-F * df * standardNormalPDF(d1) * sigma / (2 * sqrtT)
                 - r * df * (K * cumulativeNormalDist(-d2) - F * cumulativeNormalDist(-d1))) / 365;
    }

    const gamma = df * standardNormalPDF(d1) / (F * sigma * sqrtT);
    const vega = F * df * standardNormalPDF(d1) * sqrtT / 100;

    return { delta, gamma, vega, theta };
}


// ============================================================
// SECTION 24: OPTION HELPER FUNCTIONS
// ============================================================

function isOptionType(productType) {
    return ['Vanilla Option', 'Asian Option', 'Barrier Option'].includes(productType);
}

function computeMoneyness(callPut, spot, strike) {
    const ratio = spot / strike;
    if (Math.abs(ratio - 1) < 0.02) return 'ATM';
    if (callPut === 'Call') return spot > strike ? 'ITM' : 'OTM';
    return spot < strike ? 'ITM' : 'OTM';
}

function computeBarrierStatus(trade) {
    if (trade.productType !== 'Barrier Option') return null;
    const spot = getMarketPrice(trade.commodity);
    const barrier = trade.barrierLevel;
    const bt = trade.barrierType;
    if (bt === 'Up-and-Out' || bt === 'Up-and-In') {
        if (spot >= barrier) return bt.includes('Out') ? 'KNOCKED-OUT' : 'KNOCKED-IN';
    } else {
        if (spot <= barrier) return bt.includes('Out') ? 'KNOCKED-OUT' : 'KNOCKED-IN';
    }
    return 'ALIVE';
}

function generateFixingSchedule(startDate, endDate, frequency) {
    const fixings = [];
    const start = new Date(startDate);
    const end = new Date(endDate);
    let d = new Date(start);
    while (d <= end) {
        if (isBusinessDay(d)) {
            fixings.push({ date: dateStr(d), status: 'pending', fixedPrice: null });
        }
        if (frequency === 'Monthly') {
            d = addMonths(d, 1);
            d = nextBusinessDay(d);
        } else if (frequency === 'Weekly') {
            d.setDate(d.getDate() + 7);
        } else {
            d.setDate(d.getDate() + 1);
        }
    }
    return fixings;
}

function computeAveragePrice(fixings) {
    const fixed = fixings.filter(f => f.fixedPrice !== null);
    if (fixed.length === 0) return 0;
    return fixed.reduce((sum, f) => sum + f.fixedPrice, 0) / fixed.length;
}

function computeAsianPayoff(trade) {
    const avg = computeAveragePrice(trade.fixingSchedule || []);
    const com = COMMODITIES[trade.commodity];
    const qty = trade.quantity * com.contractSize;
    if (!avg) {
        // If no fixings yet, use current price as proxy
        const spot = getMarketPrice(trade.commodity);
        if (trade.callPut === 'Call') return Math.max(spot - trade.strike, 0) * qty;
        return Math.max(trade.strike - spot, 0) * qty;
    }
    if (trade.callPut === 'Call') return Math.max(avg - trade.strike, 0) * qty;
    return Math.max(trade.strike - avg, 0) * qty;
}

function updateOptionMetrics(trade) {
    if (!isOptionType(trade.productType)) return;
    const F = getMarketPrice(trade.commodity);
    const K = trade.strike;
    const T = timeToExpiry(trade.expiryDate);
    const r = MARKET_DATA_CONFIG.riskFreeRate;
    const sigma = lookupImpliedVol(trade.commodity, K, T);

    trade.optionTheoPrice = black76Price(F, K, T, r, sigma, trade.callPut);
    trade.optionGreeks = black76Greeks(F, K, T, r, sigma, trade.callPut);
    trade.moneyness = computeMoneyness(trade.callPut, F, K);

    if (trade.productType === 'Barrier Option') {
        trade.barrierStatus = computeBarrierStatus(trade);
    }
}

const MARKET_DATA_CONFIG = {
    riskFreeRate: 0.0525,
    sofrRate: 0.0530,
    fxRates: { 'GBP/USD': 1.2650, 'EUR/USD': 1.0850 },
    baseVols: { Au: 0.15, Ag: 0.25, Pt: 0.22, Pd: 0.30, Cu: 0.20, Ni: 0.28 },
    convenienceYields: { Au: 0.005, Ag: 0.01, Pt: 0.008, Pd: 0.012, Cu: 0.03, Ni: 0.025 },
    tenors: ['1M', '3M', '6M', '12M'],
    tenorYears: { '1M': 1/12, '3M': 3/12, '6M': 6/12, '12M': 1.0 },
    strikePercents: [90, 95, 100, 105, 110]
};

function generateForwardCurves() {
    const curves = {};
    const r = MARKET_DATA_CONFIG.riskFreeRate;
    for (const [sym, com] of Object.entries(COMMODITIES)) {
        const spot = getMarketPrice(sym);
        const y = MARKET_DATA_CONFIG.convenienceYields[sym];
        curves[sym] = { spot: spot };
        MARKET_DATA_CONFIG.tenors.forEach(tenor => {
            const T = MARKET_DATA_CONFIG.tenorYears[tenor];
            curves[sym][tenor] = spot * Math.exp((r - y) * T);
        });
    }
    return curves;
}

function generateVolSurface() {
    const surface = {};
    for (const [sym] of Object.entries(COMMODITIES)) {
        const baseVol = MARKET_DATA_CONFIG.baseVols[sym];
        surface[sym] = {};
        MARKET_DATA_CONFIG.strikePercents.forEach(pct => {
            surface[sym][pct] = {};
            MARKET_DATA_CONFIG.tenors.forEach(tenor => {
                const T = MARKET_DATA_CONFIG.tenorYears[tenor];
                const skew = Math.abs(pct - 100) * 0.001;
                const termAdj = (1 - T) * 0.01;
                const jitter = (Math.random() - 0.5) * 0.005;
                surface[sym][pct][tenor] = Math.max(0.05, baseVol + skew + termAdj + jitter);
            });
        });
    }
    return surface;
}

function generateMarginRequirements() {
    const margins = {};
    for (const [sym, com] of Object.entries(COMMODITIES)) {
        const spot = getMarketPrice(sym);
        const notionalPerLot = spot * com.contractSize;
        margins[sym] = {
            initial: notionalPerLot * 0.10,
            maintenance: notionalPerLot * 0.075,
            spanRate: 0.10
        };
    }
    return margins;
}

function refreshMarketData() {
    state.marketData = {
        riskFreeRate: MARKET_DATA_CONFIG.riskFreeRate,
        sofrRate: MARKET_DATA_CONFIG.sofrRate,
        fxRates: { ...MARKET_DATA_CONFIG.fxRates },
        forwardCurves: generateForwardCurves(),
        volSurface: generateVolSurface(),
        marginRequirements: generateMarginRequirements(),
        lastUpdated: new Date()
    };
}

function lookupImpliedVol(commodity, strike, tenorYears) {
    if (!state.marketData || !state.marketData.volSurface[commodity]) {
        return MARKET_DATA_CONFIG.baseVols[commodity] || 0.20;
    }
    const spot = getMarketPrice(commodity);
    const pct = Math.round((strike / spot) * 100);
    const closestPct = MARKET_DATA_CONFIG.strikePercents.reduce((prev, curr) =>
        Math.abs(curr - pct) < Math.abs(prev - pct) ? curr : prev
    );
    let closestTenor = '3M';
    let minDiff = Infinity;
    for (const [t, y] of Object.entries(MARKET_DATA_CONFIG.tenorYears)) {
        const diff = Math.abs(y - tenorYears);
        if (diff < minDiff) { minDiff = diff; closestTenor = t; }
    }
    return state.marketData.volSurface[commodity]?.[closestPct]?.[closestTenor] || MARKET_DATA_CONFIG.baseVols[commodity];
}

function renderMiniCalendar(date) {
    const yr = date.getFullYear();
    const mo = date.getMonth();
    const monthName = date.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    const firstDay = new Date(yr, mo, 1).getDay();
    const daysInMonth = new Date(yr, mo + 1, 0).getDate();
    const todayDate = new Date();

    let html = `<div style="margin-bottom:12px;">
        <strong style="font-size:0.82rem; color:var(--primary);">${monthName}</strong>
        <table style="width:100%; font-size:0.72rem; margin-top:4px; border-collapse:collapse;">
        <tr>`;
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
        html += `<th style="padding:3px; text-align:center; color:var(--text-muted);">${d}</th>`;
    });
    html += `</tr><tr>`;

    for (let i = 0; i < firstDay; i++) html += `<td></td>`;

    for (let day = 1; day <= daysInMonth; day++) {
        const dt = new Date(yr, mo, day);
        const isWknd = dt.getDay() === 0 || dt.getDay() === 6;
        const isToday = dt.toDateString() === todayDate.toDateString();
        let style = 'padding:3px; text-align:center;';
        if (isWknd) style += ' background:var(--danger-bg); color:var(--danger);';
        if (isToday) style += ' background:var(--primary); color:#fff; border-radius:3px; font-weight:700;';
        html += `<td style="${style}">${day}</td>`;
        if ((firstDay + day) % 7 === 0 && day < daysInMonth) html += `</tr><tr>`;
    }

    html += `</tr></table></div>`;
    return html;
}

function renderPayoffDiagram(trade) {
    if (!isOptionType(trade.productType)) return '';
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);
    const K = trade.strike;
    const prem = trade.premium || 0;
    const isBuy = trade.buySell === 'Buy';
    const isCall = trade.callPut === 'Call';
    const canvasId = 'payoffCanvas_' + trade.id.replace(/-/g, '_');

    let html = `<div class="card">
        <div class="card-title">Option Payoff Diagram — ${trade.callPut} ${trade.buySell} @ Strike ${formatUSD(K)}</div>
        <div class="payoff-container">
            <canvas id="${canvasId}" class="payoff-canvas"></canvas>
        </div>
        <div class="payoff-legend">
            <div class="payoff-legend-item"><div class="payoff-legend-swatch" style="background:#3182ce;"></div> Payoff at Expiry</div>
            <div class="payoff-legend-item"><div class="payoff-legend-swatch" style="background:#e53e3e;"></div> P&L (incl. premium)</div>
            <div class="payoff-legend-item"><div class="payoff-legend-swatch" style="background:#718096; border-top:1px dashed #718096;"></div> Break-even</div>
        </div>
        <div style="font-size:0.72rem; color:var(--text-muted); margin-top:6px;">
            Strike: ${formatUSD(K)} | Premium: ${formatUSD(prem)}/unit | Spot: ${formatUSD(spot)} |
            Break-even: ${formatUSD(isCall ? K + prem : K - prem)} |
            Max ${isBuy ? 'Loss' : 'Gain'}: ${formatUSD(prem * trade.quantity * com.contractSize)}
            ${trade.productType === 'Barrier Option' ? ' | Barrier: ' + formatUSD(trade.barrierLevel) + ' (' + trade.barrierType + ')' : ''}
        </div>
    </div>`;

    setTimeout(() => drawPayoffCanvas(canvasId, trade), 50);
    return html;
}

function drawPayoffCanvas(canvasId, trade) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 20, right: 30, bottom: 35, left: 60 };

    const K = trade.strike;
    const prem = trade.premium || 0;
    const isCall = trade.callPut === 'Call';
    const isBuy = trade.buySell === 'Buy';
    const spot = getMarketPrice(trade.commodity);

    const minPrice = K * 0.7;
    const maxPrice = K * 1.3;
    const range = maxPrice - minPrice;
    const toX = (p) => pad.left + ((p - minPrice) / range) * (W - pad.left - pad.right);
    const numPts = 200;

    // Calculate payoff values to find Y range
    const payoffs = [], pnls = [];
    for (let i = 0; i <= numPts; i++) {
        const price = minPrice + (range * i / numPts);
        let payoff;
        if (isCall) payoff = Math.max(price - K, 0);
        else payoff = Math.max(K - price, 0);
        if (!isBuy) payoff = -payoff;
        payoffs.push(payoff);
        pnls.push(isBuy ? payoff - prem : payoff + prem);
    }
    const allVals = [...payoffs, ...pnls];
    let minY = Math.min(...allVals, -prem * 1.2);
    let maxY = Math.max(...allVals, prem * 1.2);
    const yRange = maxY - minY || 1;
    minY -= yRange * 0.1; maxY += yRange * 0.1;
    const toY = (v) => pad.top + ((maxY - v) / (maxY - minY)) * (H - pad.top - pad.bottom);

    // Background
    ctx.fillStyle = '#f0f2f7';
    ctx.fillRect(0, 0, W, H);

    // Zero line
    ctx.strokeStyle = '#cbd5e0';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, toY(0)); ctx.lineTo(W - pad.right, toY(0)); ctx.stroke();
    ctx.setLineDash([]);

    // Strike line
    ctx.strokeStyle = '#718096';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(toX(K), pad.top); ctx.lineTo(toX(K), H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);

    // Spot line
    ctx.strokeStyle = '#38a169';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(toX(spot), pad.top); ctx.lineTo(toX(spot), H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);

    // Barrier line
    if (trade.productType === 'Barrier Option' && trade.barrierLevel) {
        ctx.strokeStyle = '#e53e3e';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
        ctx.beginPath(); ctx.moveTo(toX(trade.barrierLevel), pad.top); ctx.lineTo(toX(trade.barrierLevel), H - pad.bottom); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Payoff line
    ctx.strokeStyle = '#3182ce';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= numPts; i++) {
        const price = minPrice + (range * i / numPts);
        const x = toX(price), y = toY(payoffs[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // P&L line (with premium)
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= numPts; i++) {
        const price = minPrice + (range * i / numPts);
        const x = toX(price), y = toY(pnls[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Fill profit area (green) and loss area (red) for P&L
    for (let i = 0; i < numPts; i++) {
        const price = minPrice + (range * i / numPts);
        const x1 = toX(price), x2 = toX(minPrice + (range * (i + 1) / numPts));
        const y1 = toY(pnls[i]), y0 = toY(0);
        ctx.fillStyle = pnls[i] >= 0 ? 'rgba(56,161,105,0.08)' : 'rgba(229,62,62,0.08)';
        ctx.fillRect(x1, Math.min(y1, y0), x2 - x1, Math.abs(y1 - y0));
    }

    // Axes
    ctx.strokeStyle = '#2d3748';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();

    // Labels
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Underlying Price at Expiry', W / 2, H - 5);
    ctx.fillText('K=' + K.toFixed(0), toX(K), H - pad.bottom + 14);
    ctx.fillText('Spot', toX(spot), H - pad.bottom + 24);

    ctx.textAlign = 'right';
    ctx.fillText('P&L', pad.left - 8, pad.top + 10);
    const ySteps = 5;
    for (let i = 0; i <= ySteps; i++) {
        const v = minY + (maxY - minY) * i / ySteps;
        const y = toY(v);
        ctx.fillText(v.toFixed(0), pad.left - 5, y + 3);
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    }

    // Moneyness labels
    ctx.font = 'bold 11px Inter, sans-serif';
    const mLabel = trade.moneyness || 'ATM';
    const mColor = mLabel === 'ITM' ? '#2f855a' : (mLabel === 'OTM' ? '#c53030' : '#b7791f');
    ctx.fillStyle = mColor;
    ctx.textAlign = 'left';
    ctx.fillText(mLabel, toX(spot) + 5, pad.top + 15);
}

        instrumentCFI: cfi,

        venueOfExecution: mic,
        tradingDateTime: now.toISOString().replace('Z', '') + '+00:00',
        transactionRefNumber: trade.id,
        quantity: trade.quantity,
        quantityUnit: 'LOTS',
        price: trade.price,
        priceCurrency: 'USD',
        notionalAmount: trade.notional,
        notionalCurrency: 'USD',
        buySellIndicator: trade.buySell === 'Buy' ? 'BUYI' : 'SELL',
        tradingCapacity: 'DEAL',
        investmentDecisionWithinFirm: trade.traderInitials,
        executionWithinFirm: trade.traderInitials,

        shortSellingIndicator: 'SELL',
        commodityDerivativeIndicator: 'true',

    };

function generateEMIRFields(trade) {
    const com = COMMODITIES[trade.commodity];
    const cpData = COUNTERPARTIES[trade.counterparty];
    const uti = generateUTI(trade);
    const upi = generateUPI(trade);

    return {
        uti: uti,
        upi: upi,
        reportingCounterpartyLEI: '529900T8BM49AURSDO55',
        otherCounterpartyLEI: cpData?.lei || 'N/A',
        counterpartyClassification: 'FC',
        reportingCounterpartySide: trade.buySell === 'Buy' ? 'BYER' : 'SLLR',
        actionType: 'NEWT',
        eventType: 'TRAD',
        executionTimestamp: new Date().toISOString(),
        effectiveDate: trade.tradeDate,
        maturityDate: isOptionType(trade.productType) ? trade.expiryDate : trade.valueDate,
        notionalAmount1: trade.notional,
        notionalCurrency1: 'USD',
        priceType: 'MONE',
        price: trade.price,
        priceCurrency: 'USD',
        underlyingIdentificationType: 'ISIN',
        underlyingIdentification: generateISIN(trade),
        deliveryType: trade.venue === 'OTC' ? 'CASH' : 'PHYS',
        executionVenueType: trade.venue === 'OTC' ? 'XXXX' : getMIC(trade.venue),
        tradeRepository: 'DTCC GTR (EU)',
        reportFormat: 'ISO 20022 XML',
        clearingObligation: trade.venue === 'OTC' ? 'N' : 'Y',
        cleared: trade.clearer ? 'Y' : 'N',
        clearingVenueLEI: trade.clearer || 'N/A',
        interimEntityIdentifier: 'N/A',
        valuationAmount: trade.notional,
        valuationCurrency: 'USD',
        valuationTimestamp: new Date().toISOString(),
        valuationType: 'MTMA',
        collateralisationType: trade.initialMargin > 0 ? 'PRC1' : 'UNCL',

    };
}

function generateISIN(trade) {
    const com = COMMODITIES[trade.commodity];
    const prefix = com.exchange === 'LME' ? 'GB' : 'US';
    const hash = (trade.commodity + trade.productType + (trade.expiryDate || trade.valueDate)).split('')
        .reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0x7FFFFFFF, 0);
    return prefix + String(Math.abs(hash) % 10000000000).padStart(10, '0');
}

function generateCFI(trade) {
    if (isOptionType(trade.productType)) {
        const c1 = 'O';
        const c2 = trade.callPut === 'Call' ? 'C' : 'P';
        const c3 = trade.exerciseStyle === 'American' ? 'A' : 'E';
        const c4 = trade.productType === 'Vanilla Option' ? 'F' : 'X';
        const c5 = trade.venue === 'OTC' ? 'C' : 'P';
        const c6 = 'S';
        return c1 + c2 + c3 + c4 + c5 + c6;
    }
    if (trade.productType === 'Future') return 'FCEPSS';
    if (trade.productType === 'Swap') return 'SRCCSS';
    if (trade.productType === 'Forward') return 'FFCPSS';
    return 'MMCPSS';
}

function getMIC(venue) {
    const mics = {
        'LME': 'XLME', 'COMEX': 'XCEC', 'NYMEX': 'XNYM',
        'LBMA': 'XLBA', 'LPPM': 'XLPP', 'OTC': 'XXXX'
    };
    return mics[venue] || 'XXXX';
}

function generateUTI(trade) {
    const prefix = '529900T8BM49AURSDO55';
    const hash = (trade.id + trade.tradeDate).split('').reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0x7FFFFFFF, 0);
    return prefix + String(Math.abs(hash) % 100000000).padStart(8, '0') + String(Math.abs(hash * 7) % 10000).padStart(4, '0');
}

function generateUPI(trade) {
    const com = COMMODITIES[trade.commodity];
    const assetClass = 'CO';
    const baseProduct = com.type === 'precious' ? 'PRME' : 'NPRM';
    let subProduct = 'METL';
    let txnType;
    if (isOptionType(trade.productType)) txnType = 'OPTN';
    else if (trade.productType === 'Future') txnType = 'FUTR';
    else if (trade.productType === 'Swap') txnType = 'SWAP';
    else if (trade.productType === 'Forward') txnType = 'FWRD';
    else txnType = 'SPOT';
    return 'QJ' + assetClass + baseProduct + subProduct + txnType + '01';
}

function renderGreekExplanations(trade) {
    if (!isOptionType(trade.productType) || !trade.optionGreeks) return '';
    const g = trade.optionGreeks;
    const com = COMMODITIES[trade.commodity];
    const mult = trade.quantity * com.contractSize;
    const sign = trade.buySell === 'Buy' ? 1 : -1;
    const posDelta = sign * g.delta * mult;
    const futuresHedge = Math.abs(posDelta / com.contractSize);

    const greeks = [
        {
            name: 'Delta', symbol: '\u0394', value: g.delta.toFixed(4),
            definition: 'Rate of change of option price per $1 move in the underlying. A delta of 0.55 means the option gains $0.55 for each $1 rise in spot.',
            formula: '\u0394 = e^(-rT) \u00b7 N(d\u2081) for calls; -e^(-rT) \u00b7 N(-d\u2081) for puts',
            hedgeAction: posDelta > 0
                ? `Portfolio is long ${formatNum(Math.abs(posDelta), 1)} delta. SELL ${futuresHedge.toFixed(1)} futures to delta-neutralise.`
                : `Portfolio is short ${formatNum(Math.abs(posDelta), 1)} delta. BUY ${futuresHedge.toFixed(1)} futures to delta-neutralise.`
        },
        {
            name: 'Gamma', symbol: '\u0393', value: g.gamma.toFixed(6),
            definition: 'Rate of change of delta per $1 move in underlying. High gamma means delta changes rapidly — rebalance hedges more frequently.',
            formula: '\u0393 = e^(-rT) \u00b7 n(d\u2081) / (F \u00b7 \u03c3 \u00b7 \u221aT)',
            hedgeAction: g.gamma > 0.001
                ? 'High gamma: hedge will need frequent rebalancing. Consider gamma scalping or reducing position.'
                : 'Low gamma: delta hedge is relatively stable. Less frequent rebalancing needed.'
        },
        {
            name: 'Vega', symbol: '\u03bd', value: g.vega.toFixed(4),
            definition: 'Sensitivity of option price to a 1% change in implied volatility. If vega = 2.5, a 1% vol rise increases option price by $2.50.',
            formula: '\u03bd = F \u00b7 e^(-rT) \u00b7 n(d\u2081) \u00b7 \u221aT / 100',
            hedgeAction: sign * g.vega > 0
                ? 'Long vega: benefits from rising vol. Hedge by selling options or variance swaps if bearish on vol.'
                : 'Short vega: loses from rising vol. Hedge by buying options or vol products if concerned about vol spike.'
        },
        {
            name: 'Theta', symbol: '\u0398', value: g.theta.toFixed(4),
            definition: 'Daily time decay — how much option value erodes per calendar day. Accelerates as expiry approaches (especially last 30 days).',
            formula: '\u0398 = [-F \u00b7 e^(-rT) \u00b7 n(d\u2081) \u00b7 \u03c3 / (2\u221aT) \u00b1 r \u00b7 PV] / 365',
            hedgeAction: sign * g.theta < 0
                ? 'Negative theta: losing ' + formatUSD(Math.abs(sign * g.theta * mult)) + '/day to time decay. Consider rolling to longer expiry.'
                : 'Positive theta: earning ' + formatUSD(Math.abs(sign * g.theta * mult)) + '/day from time decay. Time is on your side.'
        }
    ];

    let html = `<div class="card">
        <div class="card-title">Greek Definitions & Hedging Guidance (${tip('Black-76')} Model)</div>
        <div class="greek-explain-grid">`;

    greeks.forEach(gk => {
        html += `<div class="greek-explain-card">
            <h4>${gk.symbol} ${gk.name}: ${gk.value}</h4>
            <div class="definition">${gk.definition}</div>
            <div class="formula">${gk.formula}</div>
            <div class="hedge-action">${gk.hedgeAction}</div>
        </div>`;
    });

    html += `</div>
        <div class="mtm-formula-box mt-2">
            <div style="font-weight:700; font-size:0.82rem; color:var(--primary); margin-bottom:4px;">
                ${tip('Delta Neutral')} Hedge Calculation
            </div>
            <div class="formula-line">Hedge Lots = |Position Delta| / Contract Size</div>
            <div class="formula-line">         = |${formatNum(Math.abs(posDelta), 2)}| / ${com.contractSize}</div>
            <div class="formula-line">         = ${futuresHedge.toFixed(2)} lots of ${com.name} futures</div>
            <div class="formula-line">Direction: ${posDelta > 0 ? 'SELL' : 'BUY'} futures to neutralise</div>
            <div class="source">Source: Black-76 model (Fischer Black, 1976). Standard for commodity options on futures.</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary btn-sm" onclick="bookDeltaHedge('${trade.id}')">
                Book ${tip('Delta Neutral')} Hedge Trade
            </button>
        </div>
    </div>`;
    return html;
}

function renderMTMFormula(trade) {
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);
    const mult = trade.quantity * com.contractSize;
    const isOpt = isOptionType(trade.productType);

    let formula, calc, mtmValue, source;

    if (isOpt) {
        const theo = trade.optionTheoPrice || 0;
        const prem = trade.premium || 0;
        mtmValue = trade.buySell === 'Buy'
            ? (theo - prem) * mult
            : (prem - theo) * mult;
        formula = 'MTM P&L = (Theoretical Price - Premium Paid) x Quantity x Contract Size';
        calc = `       = (${formatUSD(theo)} - ${formatUSD(prem)}) x ${trade.quantity} x ${com.contractSize}`;
        source = 'Black-76 model (Fischer Black, "The Pricing of Commodity Contracts", Journal of Financial Economics, 1976)';
    } else if (trade.productType === 'Future') {
        mtmValue = trade.buySell === 'Buy'
            ? (spot - trade.price) * mult
            : (trade.price - spot) * mult;
        formula = `MTM P&L = (Current Market - Trade Price) x Quantity x Contract Size`;
        calc = `       = (${formatUSD(spot)} - ${formatUSD(trade.price)}) x ${trade.quantity} x ${com.contractSize}`;
        source = 'LME / CME daily settlement price methodology. Mark-to-market per IFRS 13 (Fair Value Measurement).';
    } else if (trade.productType === 'Swap') {
        const swapMult = mult * (trade.swapTenor || 1);
        mtmValue = trade.buySell === 'Buy'
            ? (spot - trade.price) * swapMult
            : (trade.price - spot) * swapMult;
        formula = `MTM P&L = (Current Market - Fixed Rate) x Qty x Contract Size x Tenor`;
        calc = `       = (${formatUSD(spot)} - ${formatUSD(trade.price)}) x ${trade.quantity} x ${com.contractSize} x ${trade.swapTenor}M`;
        source = 'Discounted cash flow (DCF) methodology. Reference: Hull, "Options, Futures, and Other Derivatives".';
    } else {
        mtmValue = trade.buySell === 'Buy'
            ? (spot - trade.price) * mult
            : (trade.price - spot) * mult;
        formula = `MTM P&L = (Current Market - Trade Price) x Quantity x Contract Size`;
        calc = `       = (${formatUSD(spot)} - ${formatUSD(trade.price)}) x ${trade.quantity} x ${com.contractSize}`;
        source = 'Spot/Forward revaluation at prevailing market price. Reference: LBMA / LME settlement prices.';
    }

    const pnlClass = mtmValue >= 0 ? 'text-success' : 'text-danger';

    return `<div class="card">
        <div class="card-title">${tip('MTM Formula')} — Mark-to-Market Valuation</div>
        <div class="mtm-formula-box">
            <div class="formula-line">${formula}</div>
            <div class="formula-line">${calc}</div>
            <div class="formula-line fw-bold">       = <span class="${pnlClass}">${formatUSD(mtmValue)}</span></div>
            <div class="source">${source}</div>
        </div>
        <table class="enrich-table mt-2">
            <tr><td>Current Market Price</td><td class="fw-bold">${formatUSD(spot)}</td></tr>
            <tr><td>Trade Price</td><td>${formatUSD(trade.price)}</td></tr>
            <tr><td>Quantity</td><td>${trade.quantity} lots (${formatNum(mult, 0)} ${com.unit})</td></tr>
            ${isOpt ? '<tr><td>Theoretical Option Price</td><td>' + formatUSD(trade.optionTheoPrice || 0) + '</td></tr>' : ''}
            ${isOpt ? '<tr><td>Premium Paid</td><td>' + formatUSD(trade.premium) + '/unit</td></tr>' : ''}
            <tr><td>Unrealised P&L</td><td class="${pnlClass} fw-bold">${formatUSD(mtmValue)}</td></tr>
        </table>
    </div>`;
}

function renderHedgingStrategies(commoditySym) {
    const com = COMMODITIES[commoditySym];
    const spot = getMarketPrice(commoditySym);

    let html = '';
    for (const [name, strategy] of Object.entries(HEDGING_STRATEGIES)) {
        html += `<div class="hedge-panel">
            <div class="hedge-panel-title">${tip(name)}</div>
            <p style="font-size:0.78rem; margin-bottom:6px;">${strategy.description}</p>
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:6px;">
                <strong>Legs:</strong> ${strategy.legs.join(' + ')} |
                <strong>Best for:</strong> ${strategy.bestFor}
            </div>
            <div class="hedge-example">
                <div class="hedge-example-title">Worked Example — ${com.name} @ ${formatUSD(spot)}</div>`;

        if (name === 'Zero-Cost Collar') {
            const putK = Math.round(spot * 0.95);
            const callK = Math.round(spot * 1.05);
            const vol = MARKET_DATA_CONFIG.baseVols[commoditySym] || 0.20;
            const T = 0.25;
            const r = MARKET_DATA_CONFIG.riskFreeRate;
            const putPrem = black76Price(spot, putK, T, r, vol, 'Put');
            const callPrem = black76Price(spot, callK, T, r, vol, 'Call');
            html += `<div class="hedge-calc">Spot: ${formatUSD(spot)}
Buy ${formatUSD(putK)} Put  (premium: ${formatUSD(putPrem)}/unit)  — FLOOR
Sell ${formatUSD(callK)} Call (premium: ${formatUSD(callPrem)}/unit) — CAP
Net Premium: ${formatUSD(Math.abs(callPrem - putPrem))}/unit (${callPrem >= putPrem ? 'credit' : 'debit'})
Protected below ${formatUSD(putK)}, capped above ${formatUSD(callK)}
Max loss: ${formatUSD(spot - putK)}/unit + net premium</div>`;
        } else if (name === 'Protective Put') {
            const putK = Math.round(spot * 0.95);
            const vol = MARKET_DATA_CONFIG.baseVols[commoditySym] || 0.20;
            const prem = black76Price(spot, putK, 0.25, MARKET_DATA_CONFIG.riskFreeRate, vol, 'Put');
            html += `<div class="hedge-calc">Long ${com.name} @ ${formatUSD(spot)}
Buy ${formatUSD(putK)} Put for ${formatUSD(prem)}/unit
Max loss = (${formatUSD(spot)} - ${formatUSD(putK)}) + ${formatUSD(prem)} = ${formatUSD(spot - putK + prem)}/unit
Upside: Unlimited (minus premium paid)</div>`;
        } else if (name === 'Covered Call') {
            const callK = Math.round(spot * 1.05);
            const vol = MARKET_DATA_CONFIG.baseVols[commoditySym] || 0.20;
            const prem = black76Price(spot, callK, 0.25, MARKET_DATA_CONFIG.riskFreeRate, vol, 'Call');
            html += `<div class="hedge-calc">Long ${com.name} @ ${formatUSD(spot)}
Sell ${formatUSD(callK)} Call for ${formatUSD(prem)}/unit (income)
Max gain = (${formatUSD(callK)} - ${formatUSD(spot)}) + ${formatUSD(prem)} = ${formatUSD(callK - spot + prem)}/unit
Downside: Spot falls, offset by ${formatUSD(prem)} premium received</div>`;
        } else if (name === 'Delta Neutral Hedge') {
            html += `<div class="hedge-calc">Example: Long 10 ${com.name} Call contracts (delta ~0.55)
Position Delta = 0.55 x 10 x ${com.contractSize} = ${formatNum(0.55 * 10 * com.contractSize, 0)} ${com.unit}
Hedge: SELL ${formatNum(0.55 * 10 * com.contractSize / com.contractSize, 1)} ${com.name} futures
Rebalance when delta shifts by >0.05 (gamma-dependent)</div>`;
        }

        html += `</div></div>`;
    }
    return html;
}

function bookDeltaHedge(tradeId) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade || !trade.optionGreeks) return;

    const com = COMMODITIES[trade.commodity];
    const sign = trade.buySell === 'Buy' ? 1 : -1;
    const posDelta = sign * trade.optionGreeks.delta * trade.quantity * com.contractSize;
    const hedgeLots = Math.abs(posDelta / com.contractSize);
    const hedgeDir = posDelta > 0 ? 'Sell' : 'Buy';
    const roundedLots = Math.max(1, Math.round(hedgeLots));

    const hedgeTrade = createTradeObject({
        tradeDate: today(),
        counterparty: trade.counterparty,
        buySell: hedgeDir,
        productType: 'Future',
        commodity: trade.commodity,
        quantity: String(roundedLots),
        price: String(getMarketPrice(trade.commodity)),
        valueDate: dateStr(addBusinessDays(today(), 3)),
        futurePromptDate: trade.expiryDate || dateStr(addBusinessDays(today(), 30)),
        metalAccount: trade.metalAccount || 'Unallocated'
    });

    hedgeTrade.stage = 2;
    runValidation(hedgeTrade);
    state.trades.push(hedgeTrade);
    trade.deltaHedgeTrade = hedgeTrade.id;

    state.currentTradeId = hedgeTrade.id;
    updateSidebar();
    renderTradeView(hedgeTrade);

    alert('Delta Neutral Hedge booked: ' + hedgeTrade.id + '\n' + hedgeDir + ' ' + roundedLots + ' ' + com.name + ' Future(s)\nLinked to option: ' + trade.id);
}

// SECTION 34: LIFECYCLE EVENTS ENGINE
// ============================================================

function addEvent(trade, type, detail, extra) {
    const evt = LIFECYCLE_EVENTS[type];
    if (!evt) return;
    trade.eventLog.push({
        type: type,
        timestamp: new Date().toISOString(),
        detail: detail,
        emirAction: evt.emirAction,
        emirEvent: evt.emirEvent,
        user: trade.traderInitials || 'SYS',
        ...(extra || {})
    });
}

function getApplicableEvents(trade) {
    return Object.entries(LIFECYCLE_EVENTS)
        .filter(([key, evt]) => key !== 'NEW' && evt.applicable(trade))
        .map(([key, evt]) => ({ key, ...evt }));
}

function renderLifecycleEventsPanel(trade) {
    const applicable = getApplicableEvents(trade);
    const statusClass = 'status-' + (trade.tradeStatus || 'live').toLowerCase();

    let html = `<div class="card">
        <div class="card-title">
            Lifecycle Events
            <span class="trade-status-badge ${statusClass}" style="margin-left:10px;">${trade.tradeStatus}</span>
        </div>`;

    // Event Actions Grid
    if (trade.tradeStatus === 'LIVE') {
        html += `<p style="font-size:0.78rem; color:var(--text-body); margin-bottom:8px;">
            Available actions for this ${trade.productType} trade. Each triggers an EMIR-reportable lifecycle event.
        </p>
        <div class="event-actions-grid">`;

        applicable.forEach(evt => {
            html += `<button class="event-action-btn" onclick="showEventModal('${trade.id}', '${evt.key}')">
                <span class="evt-btn-icon">${evt.icon}</span>
                <span class="evt-btn-label">${evt.label}</span>
                <span class="evt-btn-desc">EMIR: ${evt.emirAction}/${evt.emirEvent}</span>
            </button>`;
        });
        html += `</div>`;
    } else {
        html += `<p style="font-size:0.82rem; color:var(--text-muted);">
            This trade is <strong>${trade.tradeStatus}</strong>. No further lifecycle actions available.
        </p>`;
    }

    // Event Log
    html += `<div style="margin-top:16px;">
        <h4 style="font-size:0.85rem; color:var(--primary); margin-bottom:8px;">Event Audit Trail</h4>
        <div class="event-log">`;

    // Show events in reverse chronological order
    const events = [...trade.eventLog].reverse();
    events.forEach(evt => {
        const evtDef = LIFECYCLE_EVENTS[evt.type] || { label: evt.type, icon: '?', iconClass: 'evt-default' };
        const time = new Date(evt.timestamp);
        const timeStr = time.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr2 = time.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

        html += `<div class="event-entry">
            <div class="event-icon ${evtDef.iconClass}">${evtDef.icon}</div>
            <div class="event-body">
                <div class="event-title">${evtDef.label}</div>
                <div class="event-detail">${evt.detail}</div>
                <div class="event-emir">EMIR: Action=${evt.emirAction} Event=${evt.emirEvent} | User: ${evt.user}</div>
            </div>
            <div class="event-time">${dateStr2}<br>${timeStr}</div>
        </div>`;
    });

    html += `</div></div></div>`;
    return html;
}

    document.body.appendChild(overlay);
}

function executeEvent(tradeId, eventKey) {
    const trade = state.trades.find(t => t.id === tradeId);
    if (!trade) return;
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);

    switch (eventKey) {
        case 'AMEND': {
            const newPrice = parseFloat(document.getElementById('evtAmendPrice')?.value) || trade.price;
            const newQty = parseInt(document.getElementById('evtAmendQty')?.value) || trade.quantity;
            const newVD = document.getElementById('evtAmendValueDate')?.value || trade.valueDate;
            const reason = document.getElementById('evtAmendReason')?.value || 'Amendment';
            trade.priorVersions.push({ price: trade.price, quantity: trade.quantity, valueDate: trade.valueDate, timestamp: new Date().toISOString() });
            const changes = [];
            if (newPrice !== trade.price) changes.push(`Price: ${formatUSD(trade.price)} -> ${formatUSD(newPrice)}`);
            if (newQty !== trade.quantity) changes.push(`Qty: ${trade.quantity} -> ${newQty}`);
            if (newVD !== trade.valueDate) changes.push(`Value Date: ${trade.valueDate} -> ${newVD}`);
            trade.price = newPrice; trade.quantity = newQty; trade.valueDate = newVD;
            trade.notional = trade.quantity * trade.price * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            if (isOptionType(trade.productType)) trade.notional = trade.quantity * trade.strike * com.contractSize;
            trade.amendCount++;
            trade.tradeStatus = 'AMENDED';
            setTimeout(() => { trade.tradeStatus = 'LIVE'; }, 100);
            addEvent(trade, 'AMEND', `${reason}: ${changes.join('; ') || 'No changes'}. Version ${trade.amendCount}.`);
            break;
        }
        case 'CANCEL': {
            const reason = document.getElementById('evtCancelReason')?.value || 'Cancelled';
            trade.tradeStatus = 'CANCELLED';
            addEvent(trade, 'CANCEL', `Trade cancelled. Reason: ${reason}. EMIR EROR report submitted to TR.`);
            break;
        }
        case 'EXERCISE': {
            const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            const payoff = intrinsic * trade.quantity * com.contractSize;
            const settlement = document.getElementById('evtExerciseSettlement')?.value || 'cash';
            trade.tradeStatus = 'EXERCISED';
            trade.exerciseResult = { intrinsic, payoff, settlement, spot, timestamp: new Date().toISOString() };
            trade.realisedPnL = payoff - trade.premiumTotal;
            addEvent(trade, 'EXERCISE', `${trade.callPut} exercised at spot ${formatUSD(spot)}. Intrinsic: ${formatUSD(intrinsic)}/unit. Payoff: ${formatUSD(payoff)}. Settlement: ${settlement}.`);
            break;
        }
        case 'AUTO_EXERCISE': {
            const autoIntrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            if (autoIntrinsic > 0) {
                const payoff = autoIntrinsic * trade.quantity * com.contractSize;
                trade.tradeStatus = 'EXERCISED';
                trade.exerciseResult = { intrinsic: autoIntrinsic, payoff, settlement: 'auto', spot, timestamp: new Date().toISOString() };
                trade.realisedPnL = trade.buySell === 'Buy' ? payoff - trade.premiumTotal : trade.premiumTotal - payoff;
                addEvent(trade, 'AUTO_EXERCISE', `Auto-exercised at expiry. Spot: ${formatUSD(spot)}, Intrinsic: ${formatUSD(autoIntrinsic)}/unit. CME Rule 812.01.`);
            } else {
                trade.tradeStatus = 'EXPIRED';
                trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
                addEvent(trade, 'ABANDONMENT', `OTM at expiry — auto-abandoned. Spot: ${formatUSD(spot)}, Strike: ${formatUSD(trade.strike)}. Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
            }
            break;
        }
        case 'ASSIGNMENT': {
            const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
            const payoff = intrinsic * trade.quantity * com.contractSize;
            trade.tradeStatus = 'EXERCISED';
            trade.exerciseResult = { intrinsic, payoff, settlement: 'assignment', spot, timestamp: new Date().toISOString() };
            trade.realisedPnL = trade.premiumTotal - payoff;
            addEvent(trade, 'ASSIGNMENT', `Assigned on short ${trade.callPut}. Must ${trade.callPut === 'Call' ? 'sell' : 'buy'} ${trade.quantity * com.contractSize} ${com.unit} @ ${formatUSD(trade.strike)}. Loss on exercise: ${formatUSD(payoff)}.`);
            break;
        }
        case 'ABANDONMENT': {
            trade.tradeStatus = 'EXPIRED';
            trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
            addEvent(trade, 'ABANDONMENT', `Option abandoned (expired worthless). Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
            break;
        }
        case 'EXPIRY': {
            trade.tradeStatus = 'EXPIRED';
            if (isOptionType(trade.productType)) {
                const intrinsic = trade.callPut === 'Call' ? Math.max(spot - trade.strike, 0) : Math.max(trade.strike - spot, 0);
                if (intrinsic > 0) {
                    const payoff = intrinsic * trade.quantity * com.contractSize;
                    trade.exerciseResult = { intrinsic, payoff, settlement: 'expiry-auto', spot, timestamp: new Date().toISOString() };
                    trade.realisedPnL = trade.buySell === 'Buy' ? payoff - trade.premiumTotal : trade.premiumTotal - payoff;
                    addEvent(trade, 'EXPIRY', `Expired ITM. Auto-exercised. Payoff: ${formatUSD(payoff)}.`);
                } else {
                    trade.realisedPnL = trade.buySell === 'Buy' ? -trade.premiumTotal : trade.premiumTotal;
                    addEvent(trade, 'EXPIRY', `Expired OTM. No exercise. Premium ${trade.buySell === 'Buy' ? 'lost' : 'earned'}: ${formatUSD(trade.premiumTotal)}.`);
                }
            } else {
                addEvent(trade, 'EXPIRY', `Future contract expired at prompt date. Final settlement price: ${formatUSD(spot)}.`);
            }
            break;
        }
        case 'EARLY_TERMINATION': {
            const termDate = document.getElementById('evtTermDate')?.value || today();
            const fee = parseFloat(document.getElementById('evtTermFee')?.value) || 0;
            const reason = document.getElementById('evtTermReason')?.value || 'Mutual agreement';
            trade.tradeStatus = 'TERMINATED';
            trade.terminationDate = termDate;
            const mult = trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            const closeOut = trade.buySell === 'Buy' ? (spot - trade.price) * mult : (trade.price - spot) * mult;
            trade.realisedPnL = closeOut - fee;
            addEvent(trade, 'EARLY_TERMINATION', `Terminated early. Reason: ${reason}. Close-out: ${formatUSD(closeOut)}. Fee: ${formatUSD(fee)}. Net: ${formatUSD(trade.realisedPnL)}. Per ISDA Section 6.`);
            break;
        }
        case 'PARTIAL_TERMINATION': {
            const termedQty = parseInt(document.getElementById('evtPartialQty')?.value) || 1;
            const remaining = trade.quantity - termedQty;
            if (remaining < 1) { alert('Cannot terminate all lots — use full termination instead.'); return; }
            trade.priorVersions.push({ quantity: trade.quantity, notional: trade.notional, timestamp: new Date().toISOString() });
            trade.quantity = remaining;
            trade.notional = remaining * trade.price * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            if (isOptionType(trade.productType)) {
                trade.notional = remaining * trade.strike * com.contractSize;
                trade.premiumTotal = trade.premium * remaining * com.contractSize;
            }
            addEvent(trade, 'PARTIAL_TERMINATION', `Partially terminated ${termedQty} lot(s). Remaining: ${remaining} lot(s). New notional: ${formatUSD(trade.notional)}.`);
            break;
        }
        case 'NOVATION': {
            const newCP = document.getElementById('evtNovationCP')?.value;
            const fee = parseFloat(document.getElementById('evtNovationFee')?.value) || 0;
            if (!newCP) return;
            const oldCP = trade.counterparty;
            // Terminate original trade
            trade.tradeStatus = 'NOVATED';
            trade.novatedTo = newCP;
            addEvent(trade, 'NOVATION', `Novated from ${oldCP} to ${newCP}. Fee: ${formatUSD(fee)}. Original trade terminated, new trade created.`);
            // Create new trade with new counterparty
            const newTradeData = {
                tradeDate: today(), counterparty: newCP, buySell: trade.buySell,
                productType: trade.productType, commodity: trade.commodity,
                quantity: String(trade.quantity), price: String(trade.price),
                valueDate: trade.valueDate, metalAccount: trade.metalAccount,
                callPut: trade.callPut, strike: trade.strike ? String(trade.strike) : null,
                premium: trade.premium ? String(trade.premium) : null,
                expiryDate: trade.expiryDate, exerciseStyle: trade.exerciseStyle,
                swapTenor: trade.swapTenor ? String(trade.swapTenor) : null,
                futurePromptDate: trade.futurePromptDate
            };
            const novTrade = createTradeObject(newTradeData);
            novTrade.stage = trade.stage;
            novTrade.novatedFrom = trade.id;
            novTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Created via novation from ${trade.id}. Step-in: ${newCP}. Step-out: ${oldCP}.`, emirAction: 'NEWT', emirEvent: 'NOVA', user: 'SYS' }];
            state.trades.push(novTrade);
            runValidation(novTrade);
            break;
        }
        case 'GIVE_UP': {
            const broker = document.getElementById('evtGiveUpBroker')?.value;
            if (!broker) return;
            addEvent(trade, 'GIVE_UP', `Given up from executing broker to clearing broker: ${broker}. Trade now cleared under ${broker}'s account.`);
            trade.clearer = broker + ' Clearing';
            break;
        }
        case 'ALLOCATION': {
            const allocCount = parseInt(document.getElementById('evtAllocCount')?.value) || 2;
            const perAlloc = Math.floor(trade.quantity / allocCount);
            const remainder = trade.quantity - (perAlloc * allocCount);
            trade.tradeStatus = 'CANCELLED';
            addEvent(trade, 'ALLOCATION', `Block trade allocated into ${allocCount} sub-trades of ${perAlloc} lots each.`);
            for (let i = 0; i < allocCount; i++) {
                const qty = i === 0 ? perAlloc + remainder : perAlloc;
                const allocData = {
                    tradeDate: trade.tradeDate, counterparty: trade.counterparty, buySell: trade.buySell,
                    productType: trade.productType, commodity: trade.commodity,
                    quantity: String(qty), price: String(trade.price),
                    valueDate: trade.valueDate, metalAccount: trade.metalAccount,
                    callPut: trade.callPut, strike: trade.strike ? String(trade.strike) : null,
                    premium: trade.premium ? String(trade.premium) : null,
                    expiryDate: trade.expiryDate, exerciseStyle: trade.exerciseStyle,
                    swapTenor: trade.swapTenor ? String(trade.swapTenor) : null,
                    futurePromptDate: trade.futurePromptDate
                };
                const allocTrade = createTradeObject(allocData);
                allocTrade.stage = 2;
                allocTrade.allocationParent = trade.id;
                allocTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Allocation ${i + 1}/${allocCount} from block ${trade.id}. Qty: ${qty} lots.`, emirAction: 'NEWT', emirEvent: 'ALOC', user: 'SYS' }];
                trade.allocationChildren.push(allocTrade.id);
                state.trades.push(allocTrade);
                runValidation(allocTrade);
            }
            break;
        }
        case 'ROLL': {
            const rollDate = document.getElementById('evtRollDate')?.value;
            const rollCost = parseFloat(document.getElementById('evtRollCost')?.value) || 0;
            // Close existing position
            trade.tradeStatus = 'TERMINATED';
            addEvent(trade, 'ROLL', `Position rolled. Near-month closed at ${formatUSD(spot)}. Roll cost: ${formatUSD(rollCost)}. New prompt: ${rollDate}.`);
            // Create new position
            const rollData = {
                tradeDate: today(), counterparty: trade.counterparty, buySell: trade.buySell,
                productType: trade.productType, commodity: trade.commodity,
                quantity: String(trade.quantity), price: String(spot + rollCost * (trade.buySell === 'Buy' ? 1 : -1)),
                valueDate: rollDate, metalAccount: trade.metalAccount,
                futurePromptDate: rollDate
            };
            const rollTrade = createTradeObject(rollData);
            rollTrade.stage = 2;
            rollTrade.eventLog = [{ type: 'NEW', timestamp: new Date().toISOString(), detail: `Rolled from ${trade.id}. New prompt date: ${rollDate}. Carry cost: ${formatUSD(rollCost)}.`, emirAction: 'NEWT', emirEvent: 'TRAD', user: 'SYS' }];
            state.trades.push(rollTrade);
            runValidation(rollTrade);
            break;
        }
        case 'PHYSICAL_DELIVERY': {
            trade.deliveryStatus = 'DELIVERED';
            trade.tradeStatus = 'DELIVERED';
            addEvent(trade, 'PHYSICAL_DELIVERY', `Physical delivery completed. ${trade.buySell === 'Buy' ? 'Received' : 'Delivered'} ${trade.quantity * com.contractSize} ${com.unit} of ${com.name}. ${com.type === 'base' ? 'Warrant transferred via LMEsword.' : 'Account: ' + (trade.metalAccount || 'Unallocated')}.`);
            break;
        }
        case 'CASH_SETTLEMENT': {
            const mtm = isOptionType(trade.productType) ? ((trade.optionTheoPrice || 0) - (trade.premium || 0)) : (spot - trade.price);
            const cashAmt = mtm * trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            trade.realisedPnL = trade.buySell === 'Buy' ? cashAmt : -cashAmt;
            trade.tradeStatus = 'TERMINATED';
            addEvent(trade, 'CASH_SETTLEMENT', `Cash settled at ${formatUSD(spot)}. Settlement amount: ${formatUSD(Math.abs(cashAmt))} (${cashAmt >= 0 ? 'received' : 'paid'}).`);
            break;
        }
        case 'MARGIN_CALL': {
            const addlMargin = trade.notional * 0.02;
            trade.variationMargin += addlMargin;
            addEvent(trade, 'MARGIN_CALL', `Margin call: ${formatUSD(addlMargin)} additional collateral required. Total VM: ${formatUSD(trade.variationMargin)}. Deadline: T+1 10:00 London.`);
            break;
        }
        case 'CREDIT_EVENT': {
            const eventType = document.getElementById('evtCreditType')?.value || 'Failure to Pay';
            trade.tradeStatus = 'TERMINATED';
            const mult = trade.quantity * com.contractSize * (trade.productType === 'Swap' ? (trade.swapTenor || 1) : 1);
            const closeOut = trade.buySell === 'Buy' ? (spot - trade.price) * mult : (trade.price - spot) * mult;
            trade.realisedPnL = closeOut;
            addEvent(trade, 'CREDIT_EVENT', `Credit event: ${eventType} by ${trade.counterparty}. ISDA close-out netting triggered. Close-out amount: ${formatUSD(closeOut)}. All trades with this counterparty terminated.`);
            break;
        }
    }

    // Close modal
    document.getElementById('eventModal')?.remove();

    // Update UI
    updateSidebar();
    const t = getCurrentTrade();
    if (t && t.id === tradeId) renderTradeView(t);
    else if (state.currentView === 'blotter') renderBlotterView();
}
</script>

================================================================
LIFECYCLE STAGE EXPLANATIONS — How Each Stage Maps to Real-World
Commodity Operations
================================================================

This section provides a brief commentary on how the six lifecycle
stages implemented in this simulator correspond to actual processes
in a physical commodities trading house or bank metals desk.

STAGE 1 — CAPTURE
In the real world, trade capture happens via electronic platforms
(e.g., LMEselect, CME Globex), voice broking, or direct dealer
negotiation. The trade is booked into an ETRM (Energy Trading and
Risk Management) system such as Endur, Aspect, or a proprietary
platform. Key data includes the commodity, tenor, quantity in
standardised lot sizes, and the counterparty.

STAGE 2 — VALIDATION & ENRICHMENT
Operations and middle-office teams verify trade details against
market conventions (T+2 for spot, business-day rules, lot sizes).
Static data enrichment pulls from reference databases: SSIs from
SWIFT's SWIFTRef, LEIs from the GLEIF database, internal book
mappings, and trader authorisation checks.

STAGE 3 — CONFIRMATION
For OTC precious metals, confirmations follow LBMA/LPPM
guidelines and may use SWIFT MT600/MT604 messages. For exchange-
traded futures, the exchange itself acts as the confirmation
mechanism (matched trades). For swaps, ISDA Master Agreement terms
govern, and electronic matching platforms like MarkitWire or
Traiana are common.

STAGE 4 — CLEARING & SETTLEMENT
Exchange futures clear through CCPs (LME Clear, CME Clearing
House) with daily margining. OTC precious metals in London clear
via LPMCL's AURUM system (for gold) or Platinum/Palladium
clearing. Base metal forwards settle via LME warrants. Cash
settlement flows through correspondent banking networks.

STAGE 5 — RECONCILIATION
Daily reconciliation ("rec") processes compare positions across
front-office booking systems, middle-office risk engines, and
custodian/clearer statements. Breaks are escalated according to
severity thresholds. Common tools include Duco, Gresham's Clareti,
or proprietary rec engines. Timely break resolution is a
regulatory requirement.

STAGE 6 — POSITION REPORTING
End-of-day position reports feed into regulatory reporting (EMIR,
MiFID II transaction reporting, CFTC large trader reports), internal
risk dashboards (VaR, stress tests, concentration limits), P&L
attribution, and management MI. The blotter view in this simulator
is a simplified version of what a real-time position-keeping
system provides.

PARALLEL FUNCTIONS
Throughout the lifecycle, valuation (daily MTM), market risk
(VaR computation), credit risk (counterparty exposure vs. limits),
and accounting (realised P&L, accruals) operate as independent
but interconnected processes, typically managed by separate teams
with distinct system access and controls.
================================================================
