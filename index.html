function drawSpotDeltaChart(canvasId) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    var W = canvas.width, H = canvas.height;
    var pad = { top: 30, right: 40, bottom: 45, left: 75 };
    var plotW = W - pad.left - pad.right;
    var plotH = H - pad.top - pad.bottom;

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    // Spot price range: entry +/- $50
    var entryPrice = Math.round(getMarketPrice('Au'));
    var range = 50;
    var maxPnL = range * 1000; // 1000 oz delta x $50
    var toX = function(price) { return pad.left + ((price - (entryPrice - range)) / (range * 2)) * plotW; };
    var toY = function(pnl) { return pad.top + ((maxPnL - pnl) / (maxPnL * 2)) * plotH; };
    var zeroY = toY(0);

    // Grid lines
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (var p = -40000; p <= 40000; p += 10000) {
        var y = toY(p);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('$' + (p / 1000).toFixed(0) + 'K', pad.left - 5, y + 3);
    }

    // Price labels on x-axis
    for (var dp = -range; dp <= range; dp += 10) {
        var x = toX(entryPrice + dp);
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('$' + (entryPrice + dp), x, H - pad.bottom + 16);
    }

    // Zero line
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(W - pad.right, zeroY); ctx.stroke();

    // Entry price vertical line
    var entryX = toX(entryPrice);
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(entryX, pad.top); ctx.lineTo(entryX, H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Entry: $' + entryPrice, entryX, pad.top - 5);

    // Long position P&L line (blue)
    ctx.strokeStyle = '#3182ce';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (var i = 0; i <= 100; i++) {
        var price = entryPrice - range + (range * 2) * (i / 100);
        var pnl = (price - entryPrice) * 1000;
        var px = toX(price), py = toY(pnl);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Short position P&L line (red, dashed)
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    for (var i = 0; i <= 100; i++) {
        var price = entryPrice - range + (range * 2) * (i / 100);
        var pnl = (entryPrice - price) * 1000;
        var px = toX(price), py = toY(pnl);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Shade profit zone for long (green fill above zero on right side)
    ctx.fillStyle = 'rgba(47,133,90,0.08)';
    ctx.beginPath();
    ctx.moveTo(entryX, zeroY);
    ctx.lineTo(W - pad.right, toY(range * 1000));
    ctx.lineTo(W - pad.right, zeroY);
    ctx.closePath();
    ctx.fill();

    // Shade loss zone for long (red fill below zero on left side)
    ctx.fillStyle = 'rgba(229,62,62,0.08)';
    ctx.beginPath();
    ctx.moveTo(pad.left, zeroY);
    ctx.lineTo(pad.left, toY(-range * 1000));
    ctx.lineTo(entryX, zeroY);
    ctx.closePath();
    ctx.fill();

    // Annotate key points
    ctx.fillStyle = '#2f855a';
    ctx.font = 'bold 10px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('+$' + (30 * 1000 / 1000).toFixed(0) + 'K if gold +$30', toX(entryPrice + 30) + 6, toY(30000) + 4);

    ctx.fillStyle = '#c53030';
    ctx.fillText('-$' + (20 * 1000 / 1000).toFixed(0) + 'K if gold -$20', toX(entryPrice - 20) + 6, toY(-20000) - 6);

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Gold Spot Price ($/oz)', W / 2, H - 5);
    ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('P&L (USD)', 0, 0); ctx.restore();
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Spot Delta: P&L vs Gold Price (Long 10 lots = 1,000 oz, Delta = +1,000)', pad.left, pad.top - 14);
}

function drawForwardDeltaChart(canvasId) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    var W = canvas.width, H = canvas.height;
    var pad = { top: 35, right: 40, bottom: 50, left: 75 };
    var plotW = W - pad.left - pad.right;
    var plotH = H - pad.top - pad.bottom;

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    var rate = 0.05;
    var spotDelta = 1000;
    var tenors = [
        { label: 'Spot', t: 0 },
        { label: '1M', t: 1/12 },
        { label: '3M', t: 3/12 },
        { label: '6M', t: 6/12 },
        { label: '9M', t: 9/12 },
        { label: '1Y', t: 1 },
        { label: '18M', t: 1.5 },
        { label: '2Y', t: 2 },
        { label: '3Y', t: 3 },
    ];

    var maxY = 1050, minY = 800;
    var toX = function(i) { return pad.left + (i / (tenors.length - 1)) * plotW; };
    var toY = function(v) { return pad.top + ((maxY - v) / (maxY - minY)) * plotH; };

    // Grid
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (var v = 850; v <= 1050; v += 50) {
        var y = toY(v);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(v.toFixed(0) + ' oz', pad.left - 5, y + 3);
    }

    // Spot delta reference line (dashed grey)
    ctx.strokeStyle = '#cbd5e0';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    var spotY = toY(spotDelta);
    ctx.beginPath(); ctx.moveTo(pad.left, spotY); ctx.lineTo(W - pad.right, spotY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#a0aec0';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Spot Delta = 1,000 oz', W - pad.right - 120, spotY - 6);

    // Forward delta curve (blue with area fill)
    var points = tenors.map(function(t, i) {
        var fwdDelta = spotDelta * Math.exp(-rate * t.t);
        return { x: toX(i), y: toY(fwdDelta), val: fwdDelta, label: t.label, tenor: t.t };
    });

    // Area fill
    ctx.fillStyle = 'rgba(49,130,206,0.12)';
    ctx.beginPath();
    ctx.moveTo(points[0].x, spotY);
    points.forEach(function(p) { ctx.lineTo(p.x, p.y); });
    ctx.lineTo(points[points.length-1].x, spotY);
    ctx.closePath();
    ctx.fill();

    // Line
    ctx.strokeStyle = '#3182ce';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    points.forEach(function(p, i) {
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();

    // Points and labels
    points.forEach(function(p, i) {
        ctx.fillStyle = '#3182ce';
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();

        // Tenor label on x-axis
        ctx.fillStyle = '#4a5568';
        ctx.font = '10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.label, p.x, H - pad.bottom + 16);

        // Value label above point (every other one to avoid clutter)
        if (i === 0 || i === 3 || i === 5 || i === 7 || i === 8) {
            ctx.fillStyle = '#2c5282';
            ctx.font = 'bold 9px Inter, sans-serif';
            ctx.fillText(p.val.toFixed(1), p.x, p.y - 10);
        }
    });

    // Annotation: delta difference for 2Y
    var p2y = points[7]; // 2Y
    var diff = spotDelta - p2y.val;
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 2]);
    ctx.beginPath(); ctx.moveTo(p2y.x + 8, spotY); ctx.lineTo(p2y.x + 8, p2y.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e53e3e';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('-' + diff.toFixed(1) + ' oz', p2y.x + 12, (spotY + p2y.y) / 2 + 3);
    ctx.font = '8px Inter, sans-serif';
    ctx.fillText('(' + (diff / spotDelta * 100).toFixed(1) + '% discount)', p2y.x + 12, (spotY + p2y.y) / 2 + 14);

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Delivery Tenor', W / 2, H - 8);
    ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('Delta (oz equivalent)', 0, 0); ctx.restore();
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Forward Delta Decay: 1,000 oz Gold Position Across Tenors (r = 5%)', pad.left, pad.top - 14);
}

function drawWeightedDeltaChart(canvasId) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    var W = canvas.width, H = canvas.height;
    var pad = { top: 35, right: 40, bottom: 55, left: 75 };
    var plotW = W - pad.left - pad.right;
    var plotH = H - pad.top - pad.bottom;

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    var rate = 0.05;
    var spotDelta = 1000;
    var tRef = 1.0;
    var tenors = [
        { label: '1M',  t: 1/12 },
        { label: '2M',  t: 2/12 },
        { label: '3M',  t: 3/12 },
        { label: '6M',  t: 6/12 },
        { label: '9M',  t: 9/12 },
        { label: '1Y',  t: 1 },
        { label: '18M', t: 1.5 },
        { label: '2Y',  t: 2 },
        { label: '3Y',  t: 3 },
        { label: '5Y',  t: 5 },
    ];

    var maxY = 1800, minY = 0;
    var toX = function(i) { return pad.left + (i / (tenors.length - 1)) * plotW; };
    var toY = function(v) { return pad.top + ((maxY - v) / (maxY - minY)) * plotH; };

    // Grid
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (var v = 200; v <= 1600; v += 200) {
        var y = toY(v);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(v.toFixed(0) + ' oz', pad.left - 5, y + 3);
    }

    // Calculate data
    var spotPts = [], fwdPts = [], wtdPts = [];
    tenors.forEach(function(t, i) {
        var x = toX(i);
        var fwdDelta = spotDelta * Math.exp(-rate * t.t);
        var weight = Math.sqrt(t.t / tRef);
        var weightedDelta = fwdDelta * weight;
        spotPts.push({ x: x, y: toY(spotDelta), val: spotDelta });
        fwdPts.push({ x: x, y: toY(fwdDelta), val: fwdDelta });
        wtdPts.push({ x: x, y: toY(weightedDelta), val: weightedDelta });
    });

    // Spot delta line (grey dashed)
    ctx.strokeStyle = '#cbd5e0';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    spotPts.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
    ctx.stroke();
    ctx.setLineDash([]);

    // Forward delta line (blue)
    ctx.strokeStyle = '#3182ce';
    ctx.lineWidth = 2;
    ctx.beginPath();
    fwdPts.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
    ctx.stroke();

    // Forward delta dots
    fwdPts.forEach(function(p, i) {
        ctx.fillStyle = '#3182ce';
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });

    // Weighted delta area fill
    ctx.fillStyle = 'rgba(229,62,62,0.10)';
    ctx.beginPath();
    ctx.moveTo(wtdPts[0].x, toY(0));
    wtdPts.forEach(function(p) { ctx.lineTo(p.x, p.y); });
    ctx.lineTo(wtdPts[wtdPts.length-1].x, toY(0));
    ctx.closePath();
    ctx.fill();

    // Weighted delta line (red)
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    wtdPts.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
    ctx.stroke();

    // Weighted delta dots and labels
    wtdPts.forEach(function(p, i) {
        ctx.fillStyle = '#e53e3e';
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    });

    // Tenor labels on x-axis
    tenors.forEach(function(t, i) {
        ctx.fillStyle = '#4a5568';
        ctx.font = '10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t.label, toX(i), H - pad.bottom + 16);
    });

    // Annotate key values
    // At 1M - weighted delta is low (short tenor, low weight)
    ctx.fillStyle = '#c53030';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(wtdPts[0].val.toFixed(0), wtdPts[0].x + 6, wtdPts[0].y - 4);

    // At 1Y - weighted delta ~ forward delta (weight = 1.0)
    ctx.fillText(wtdPts[5].val.toFixed(0), wtdPts[5].x + 6, wtdPts[5].y - 4);

    // At 5Y - weighted delta > spot delta (weight > 1)
    ctx.fillText(wtdPts[9].val.toFixed(0), wtdPts[9].x - 30, wtdPts[9].y - 8);

    // Forward delta labels at key points
    ctx.fillStyle = '#2c5282';
    ctx.fillText(fwdPts[5].val.toFixed(0), fwdPts[5].x + 6, fwdPts[5].y + 14);
    ctx.fillText(fwdPts[9].val.toFixed(0), fwdPts[9].x + 6, fwdPts[9].y + 14);

    // Annotation box: explain the crossover
    var crossIdx = -1;
    for (var i = 1; i < wtdPts.length; i++) {
        if (wtdPts[i].val >= spotDelta && wtdPts[i-1].val < spotDelta) { crossIdx = i; break; }
    }
    if (crossIdx > 0) {
        ctx.fillStyle = 'rgba(229,62,62,0.12)';
        ctx.fillRect(wtdPts[crossIdx].x - 2, pad.top + 4, plotW - (wtdPts[crossIdx].x - pad.left) + 2, 32);
        ctx.fillStyle = '#c53030';
        ctx.font = 'bold 9px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Weighted > Spot: longer tenor = more risk', wtdPts[crossIdx].x + 4, pad.top + 18);
        ctx.font = '8px Inter, sans-serif';
        ctx.fillText('Time weight sqrt(T) > 1 when T > 1yr, amplifying delta', wtdPts[crossIdx].x + 4, pad.top + 30);
    }

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Delivery Tenor', W / 2, H - 8);
    ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('Delta (oz equivalent)', 0, 0); ctx.restore();
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Spot vs Forward vs Weighted Delta: 1,000 oz Gold Position', pad.left, pad.top - 14);

    // Data table below chart
    ctx.font = '8px Inter, sans-serif';
    ctx.fillStyle = '#718096';
    var tableY = H - pad.bottom + 28;
    tenors.forEach(function(t, i) {
        var x = toX(i);
        ctx.textAlign = 'center';
        var wt = Math.sqrt(t.t / tRef);
        ctx.fillText('wt:' + wt.toFixed(2), x, tableY);
    });
    ctx.textAlign = 'right';
    ctx.fillText('Weight:', pad.left - 5, tableY);
}


function drawBucketedDeltaChart(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 30, right: 30, bottom: 55, left: 70 };

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    const buckets = [
        { label: '0-1M', long: 450000, short: -280000 },
        { label: '1-3M', long: 820000, short: -650000 },
        { label: '3-6M', long: 1200000, short: -900000 },
        { label: '6-12M', long: 750000, short: -1100000 },
        { label: '1-2Y', long: 400000, short: -500000 },
        { label: '2-5Y', long: 150000, short: -80000 },
    ];

    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;
    const maxVal = 1400000;
    const barGroupW = plotW / buckets.length;
    const barW = barGroupW * 0.3;

    const toY = (v) => pad.top + ((maxVal - v) / (maxVal * 2)) * plotH;
    const zeroY = toY(0);

    // Grid
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (let v = -1200000; v <= 1200000; v += 400000) {
        const y = toY(v);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText((v / 1000).toFixed(0) + 'K', pad.left - 5, y + 3);
    }

    // Zero line
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(W - pad.right, zeroY); ctx.stroke();

    buckets.forEach((b, i) => {
        const cx = pad.left + i * barGroupW + barGroupW / 2;

        // Long bar (positive - blue)
        const longH = (b.long / maxVal) * (plotH / 2);
        ctx.fillStyle = 'rgba(49,130,206,0.75)';
        ctx.fillRect(cx - barW - 1, zeroY - longH, barW, longH);

        // Short bar (negative - red)
        const shortH = (Math.abs(b.short) / maxVal) * (plotH / 2);
        ctx.fillStyle = 'rgba(229,62,62,0.75)';
        ctx.fillRect(cx + 1, zeroY, barW, shortH);

        // Net line marker
        const net = b.long + b.short;
        const netY = toY(net);
        ctx.fillStyle = '#1a202c';
        ctx.beginPath();
        ctx.arc(cx, netY, 4, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = '#4a5568';
        ctx.font = '10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(b.label, cx, H - pad.bottom + 16);
    });

    // Connect net dots
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    buckets.forEach((b, i) => {
        const cx = pad.left + i * barGroupW + barGroupW / 2;
        const net = b.long + b.short;
        const netY = toY(net);
        if (i === 0) ctx.moveTo(cx, netY); else ctx.lineTo(cx, netY);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Legend
    ctx.fillStyle = 'rgba(49,130,206,0.75)';
    ctx.fillRect(pad.left + 10, pad.top, 12, 8);
    ctx.fillStyle = '#4a5568';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Long Delta', pad.left + 26, pad.top + 8);
    ctx.fillStyle = 'rgba(229,62,62,0.75)';
    ctx.fillRect(pad.left + 100, pad.top, 12, 8);
    ctx.fillStyle = '#4a5568';
    ctx.fillText('Short Delta', pad.left + 116, pad.top + 8);
    ctx.fillStyle = '#1a202c';
    ctx.beginPath(); ctx.arc(pad.left + 200, pad.top + 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4a5568';
    ctx.fillText('Net Delta', pad.left + 208, pad.top + 8);

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Time Bucket', W / 2, H - 8);
    ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('Delta Exposure (USD)', 0, 0); ctx.restore();
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Bucketed Delta Exposure by Tenor', pad.left, pad.top - 10);
}

function drawBasisRiskChart(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 30, right: 30, bottom: 45, left: 65 };

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Simulate 30 days of physical vs financial prices
    const days = 30;
    const basePrice = 2350;
    const physPrices = [];
    const finPrices = [];
    const basis = [];
    let physP = basePrice + 5;
    let finP = basePrice;
    for (let i = 0; i < days; i++) {
        physP += (Math.random() - 0.48) * 12;
        finP += (Math.random() - 0.48) * 14;
        physPrices.push(physP);
        finPrices.push(finP);
        basis.push(physP - finP);
    }

    const allPrices = [...physPrices, ...finPrices];
    let minP = Math.min(...allPrices) - 10;
    let maxP = Math.max(...allPrices) + 10;

    const toX = (i) => pad.left + (i / (days - 1)) * plotW;
    const toY = (p) => pad.top + ((maxP - p) / (maxP - minP)) * plotH;

    // Grid
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
        const val = minP + (maxP - minP) * i / 4;
        const y = toY(val);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('$' + val.toFixed(0), pad.left - 5, y + 3);
    }

    // Physical price line
    ctx.strokeStyle = '#d69e2e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    physPrices.forEach((p, i) => { if (i === 0) ctx.moveTo(toX(i), toY(p)); else ctx.lineTo(toX(i), toY(p)); });
    ctx.stroke();

    // Financial price line
    ctx.strokeStyle = '#3182ce';
    ctx.lineWidth = 2;
    ctx.beginPath();
    finPrices.forEach((p, i) => { if (i === 0) ctx.moveTo(toX(i), toY(p)); else ctx.lineTo(toX(i), toY(p)); });
    ctx.stroke();

    // Shade basis area
    ctx.beginPath();
    physPrices.forEach((p, i) => { if (i === 0) ctx.moveTo(toX(i), toY(p)); else ctx.lineTo(toX(i), toY(p)); });
    for (let i = finPrices.length - 1; i >= 0; i--) ctx.lineTo(toX(i), toY(finPrices[i]));
    ctx.closePath();
    ctx.fillStyle = 'rgba(107,70,193,0.1)';
    ctx.fill();

    // Legend
    ctx.fillStyle = '#d69e2e';
    ctx.fillRect(pad.left + 10, pad.top, 14, 3);
    ctx.fillStyle = '#4a5568';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Physical Price', pad.left + 28, pad.top + 5);
    ctx.fillStyle = '#3182ce';
    ctx.fillRect(pad.left + 110, pad.top, 14, 3);
    ctx.fillStyle = '#4a5568';
    ctx.fillText('Financial (Futures) Price', pad.left + 128, pad.top + 5);

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Trading Days', W / 2, H - 8);

    // Basis annotation
    const midIdx = Math.floor(days / 2);
    const basisVal = basis[midIdx];
    ctx.fillStyle = '#6b46c1';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'left';
    const annotX = toX(midIdx) + 6;
    const annotY = (toY(physPrices[midIdx]) + toY(finPrices[midIdx])) / 2;
    ctx.fillText('Basis: $' + basisVal.toFixed(2), annotX, annotY);

    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Physical vs Financial Price & Basis', pad.left, pad.top - 10);
}

function drawVaRHistogram(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 30, right: 30, bottom: 50, left: 55 };

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Generate normal distribution histogram
    const numBins = 40;
    const bins = [];
    const mean = 0;
    const stdDev = 1;
    for (let i = 0; i < numBins; i++) {
        const x = -3.5 + (7 * i / numBins);
        const freq = Math.exp(-0.5 * Math.pow((x - mean) / stdDev, 2)) / (stdDev * Math.sqrt(2 * Math.PI));
        bins.push({ x, freq });
    }

    const maxFreq = Math.max(...bins.map(b => b.freq));
    const binW = plotW / numBins;
    const var95 = -1.645; // 95% VaR z-score
    const var99 = -2.326; // 99% VaR z-score

    bins.forEach((b, i) => {
        const x = pad.left + i * binW;
        const barH = (b.freq / maxFreq) * plotH * 0.9;
        const y = pad.top + plotH - barH;

        if (b.x <= var99) ctx.fillStyle = 'rgba(229,62,62,0.8)';
        else if (b.x <= var95) ctx.fillStyle = 'rgba(237,137,54,0.7)';
        else ctx.fillStyle = 'rgba(49,130,206,0.6)';

        ctx.fillRect(x, y, binW - 1, barH);
    });

    // VaR 95% line
    const var95X = pad.left + ((var95 + 3.5) / 7) * plotW;
    ctx.strokeStyle = '#ed8936';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(var95X, pad.top); ctx.lineTo(var95X, pad.top + plotH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ed8936';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('VaR 95%', var95X + 4, pad.top + 14);

    // VaR 99% line
    const var99X = pad.left + ((var99 + 3.5) / 7) * plotW;
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(var99X, pad.top); ctx.lineTo(var99X, pad.top + plotH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e53e3e';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('VaR 99%', var99X + 4, pad.top + 26);

    // Labels
    ctx.fillStyle = '#718096';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    for (let s = -3; s <= 3; s++) {
        const x = pad.left + ((s + 3.5) / 7) * plotW;
        ctx.fillText(s + 'σ', x, H - pad.bottom + 14);
    }

    // Axes
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Portfolio Return (Standard Deviations)', W / 2, H - 8);

    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('VaR Distribution — Portfolio P&L', pad.left, pad.top - 10);

    // Legend
    const lx = W - pad.right - 200;
    ctx.fillStyle = 'rgba(229,62,62,0.8)';
    ctx.fillRect(lx, pad.top, 10, 8);
    ctx.fillStyle = '#4a5568'; ctx.font = '8px Inter, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('99% tail', lx + 14, pad.top + 7);
    ctx.fillStyle = 'rgba(237,137,54,0.7)';
    ctx.fillRect(lx + 65, pad.top, 10, 8);
    ctx.fillStyle = '#4a5568';
    ctx.fillText('95-99% tail', lx + 79, pad.top + 7);
    ctx.fillStyle = 'rgba(49,130,206,0.6)';
    ctx.fillRect(lx + 145, pad.top, 10, 8);
    ctx.fillStyle = '#4a5568';
    ctx.fillText('Within VaR', lx + 159, pad.top + 7);
}

                <div class="rp-concept-grid">
                    <div class="rp-concept-card" style="border-left: 3px solid #3182ce;">
                        <h4>1. Parametric (Variance-Covariance)</h4>
                        <p>Assumes returns follow a normal distribution. Fast to compute, but may underestimate tail risk.</p>
                        <div class="rp-formula">VaR = Portfolio Value x z x &sigma; x &radic;T</div>
                        <p style="margin-top: 6px; font-size: 0.75rem; color: var(--text-muted);">z = confidence factor (1.645 for 95%, 2.326 for 99%), &sigma; = daily volatility, T = holding period in days.</p>
                    </div>
                    <div class="rp-concept-card" style="border-left: 3px solid #38a169;">
                        <h4>2. Historical Simulation</h4>
                        <p>Uses actual historical price changes (e.g., last 500 trading days) applied to the current portfolio. No distribution assumption needed.</p>
                        <div class="rp-formula">Sort all 500 historical P&Ls<br/>95% VaR = 25th worst loss<br/>99% VaR = 5th worst loss</div>
                    </div>
                    <div class="rp-concept-card" style="border-left: 3px solid #d69e2e;">
                        <h4>3. Monte Carlo Simulation</h4>
                        <p>Generates thousands of random price scenarios using statistical models. Most flexible but computationally expensive.</p>
                        <div class="rp-formula">Generate 10,000 price paths<br/>Calculate P&L for each path<br/>VaR = percentile of P&L distribution</div>

                <div class="rp-step-line" style="font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;">

                </div>

            <div class="rp-section" style="margin-top: 16px;">

                        <tr><td class="fw-bold">Best For</td><td>Linear portfolios</td><td>Regulatory reporting</td><td>Complex derivatives</td></tr>
                    </tbody>

// ============================================================
// SECTION 42: CREDIT RISK — PD, LGD, EAD, RWA
// ============================================================

/**
 * Credit rating data for counterparties.
 * Maps rating to PD (1-year), LGD assumptions, and Basel risk weights.
 */
const CREDIT_RATINGS = {
    'AAA': { pd: 0.0002, lgd: 0.45, riskWeight: 0.20, cssClass: 'cr-rating-aaa', color: '#276749' },
    'AA':  { pd: 0.0005, lgd: 0.45, riskWeight: 0.20, cssClass: 'cr-rating-aa',  color: '#276749' },
    'A':   { pd: 0.0010, lgd: 0.45, riskWeight: 0.50, cssClass: 'cr-rating-a',   color: '#2b6cb0' },
    'BBB': { pd: 0.0020, lgd: 0.45, riskWeight: 0.50, cssClass: 'cr-rating-bbb', color: '#b7791f' },
    'BB':  { pd: 0.0100, lgd: 0.45, riskWeight: 1.00, cssClass: 'cr-rating-bb',  color: '#c05621' },
    'B':   { pd: 0.0400, lgd: 0.45, riskWeight: 1.50, cssClass: 'cr-rating-b',   color: '#c53030' }
};

/**
 * Map counterparties to credit ratings
 */
const COUNTERPARTY_RATINGS = {
    'HSBC': 'AA',
    'JP Morgan': 'AA',
    'Standard Chartered': 'A',
    'Goldman Sachs': 'AA',
    'Citi': 'A'
};

/**
 * SA-CCR add-on factors for commodity derivatives by product type.
 * Supervisory factors from Basel III SA-CCR framework.
 */
const SACCR_FACTORS = {
    'Spot': { supervisoryFactor: 0.18, maturityFactor: 1.0, ccf: 1.0 },
    'Forward': { supervisoryFactor: 0.18, maturityFactor: 1.0, ccf: 1.0 },
    'Future': { supervisoryFactor: 0.18, maturityFactor: 1.0, ccf: 1.0 },
    'Swap': { supervisoryFactor: 0.18, maturityFactor: 1.5, ccf: 1.0 },
    'Vanilla Option': { supervisoryFactor: 0.18, maturityFactor: 1.0, ccf: 0.6 },
    'Asian Option': { supervisoryFactor: 0.18, maturityFactor: 1.2, ccf: 0.8 },
    'Barrier Option': { supervisoryFactor: 0.18, maturityFactor: 1.0, ccf: 0.7 }
};

/**
 * Calculate credit risk metrics for a single trade.
 * Implements a simplified SA-CCR + IRB approach.
 */
function calculateCreditRisk(trade) {
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);
    const notional = trade.quantity * spot * com.contractSize;
    const tradePrice = trade.price || spot;
    const rating = COUNTERPARTY_RATINGS[trade.counterparty] || 'BBB';
    const ratingData = CREDIT_RATINGS[rating];
    const saccrData = SACCR_FACTORS[trade.productType] || SACCR_FACTORS['Spot'];

    // --- EAD Calculation (SA-CCR approach) ---
    // Replacement Cost (RC): max(MTM, 0)
    const vmDirection = trade.buySell === 'Buy' ? 1 : -1;
    const mtm = (spot - tradePrice) * vmDirection * trade.quantity * com.contractSize;
    const replacementCost = Math.max(mtm, 0);

    // Potential Future Exposure (PFE)
    // PFE = multiplier x AddOn
    // AddOn = Notional x SupervisoryFactor x MaturityFactor
    const addOn = notional * saccrData.supervisoryFactor * saccrData.maturityFactor;
    const multiplier = replacementCost > 0 ? 1 : Math.min(1, 0.05 + 0.95 * Math.exp(mtm / (2 * addOn)));
    const pfe = multiplier * addOn;

    // EAD = alpha x (RC + PFE), alpha = 1.4 (Basel standard)
    const alpha = 1.4;
    const ead = alpha * (replacementCost + pfe);

    // --- PD ---
    const pd = ratingData.pd;

    // --- LGD ---
    // Adjust LGD for collateral held
    const collateral = trade.collateral;
    let lgd = ratingData.lgd;
    if (collateral && collateral.totalAfterHaircut > 0) {
        // LGD reduced by collateral coverage (floor at 10%)
        const collateralCoverage = Math.min(collateral.totalAfterHaircut / ead, 1);
        lgd = Math.max(ratingData.lgd * (1 - collateralCoverage * 0.8), 0.10);
    }

    // --- Expected Loss ---
    const expectedLoss = pd * lgd * ead;

    // --- RWA Calculation (IRB approach, simplified Basel formula) ---
    // Correlation factor R = 0.12 x (1 - e^(-50*PD))/(1 - e^(-50)) + 0.24 x (1 - (1 - e^(-50*PD))/(1 - e^(-50)))
    const expFactor = (1 - Math.exp(-50 * pd)) / (1 - Math.exp(-50));
    const correlation = 0.12 * expFactor + 0.24 * (1 - expFactor);

    // Maturity adjustment
    const maturity = trade.productType === 'Spot' ? 0.25 : trade.productType === 'Forward' ? 0.5 : 1.0;
    const b = (0.11852 - 0.05478 * Math.log(pd)) ** 2; // maturity adjustment factor
    const maturityAdj = (1 + (maturity - 2.5) * b) / (1 - 1.5 * b);

    // N^(-1)(PD) using approximation
    const normInv = (p) => {
        // Rational approximation of inverse normal
        if (p <= 0) return -4;
        if (p >= 1) return 4;
        const a = [-3.969683028665376e1, 2.209460984245205e2, -2.759285104469687e2, 1.383577518672690e2, -3.066479806614716e1, 2.506628277459239e0];
        const b2 = [-5.447609879822406e1, 1.615858368580409e2, -1.556989798598866e2, 6.680131188771972e1, -1.328068155288572e1];
        const c = [-7.784894002430293e-3, -3.223964580411365e-1, -2.400758277161838e0, -2.549732539343734e0, 4.374664141464968e0, 2.938163982698783e0];
        const d = [7.784695709041462e-3, 3.224671290700398e-1, 2.445134137142996e0, 3.754408661907416e0];
        const pLow = 0.02425, pHigh = 1 - pLow;
        let q, r;
        if (p < pLow) {
            q = Math.sqrt(-2 * Math.log(p));
            return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) / ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
        } else if (p <= pHigh) {
            q = p - 0.5; r = q * q;
            return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5]) * q / (((((b2[0]*r+b2[1])*r+b2[2])*r+b2[3])*r+b2[4])*r+1);
        } else {
            q = Math.sqrt(-2 * Math.log(1 - p));
            return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) / ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
        }
    };

    // Normal CDF approximation
    const normCDF = (x) => {
        const t = 1 / (1 + 0.2316419 * Math.abs(x));
        const d2 = 0.3989422804014327;
        const p = d2 * Math.exp(-x * x / 2) * (t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274)))));
        return x > 0 ? 1 - p : p;
    };

    // K (capital requirement per unit of EAD)
    const normInvPD = normInv(pd);
    const normInv999 = normInv(0.999); // 3.09 approx
    const conditionalPD = normCDF((normInvPD + Math.sqrt(correlation) * normInv999) / Math.sqrt(1 - correlation));
    const K = Math.max((lgd * conditionalPD - expectedLoss / Math.max(ead, 1)) * maturityAdj, 0);

    // RWA = K x 12.5 x EAD
    const rwa = K * 12.5 * ead;

    // Capital requirement (8% of RWA under Basel III, with 2.5% conservation buffer = 10.5%)
    const capitalReq8 = rwa * 0.08;
    const capitalReqTotal = rwa * 0.105; // including conservation buffer

    // Standardised approach RWA for comparison
    const rwaStandardised = ead * ratingData.riskWeight;

    // CVA charge (simplified)
    const cvaCharge = ead * pd * lgd * 0.5 * maturity;

    return {
        rating, ratingData,
        notional, mtm, replacementCost, pfe, ead, alpha,
        pd, lgd, expectedLoss,
        correlation, maturity, maturityAdj, conditionalPD, K,
        rwa, rwaStandardised, capitalReq8, capitalReqTotal,
        cvaCharge,
        saccrData,
        status: pd <= 0.001 ? 'LOW' : pd <= 0.01 ? 'MEDIUM' : 'HIGH'
    };
}

/**
 * Calculate portfolio-level credit risk across all trades.
 */
function calculatePortfolioCreditRisk() {
    const portfolio = { trades: [], totalEAD: 0, totalRWA: 0, totalEL: 0, totalCVA: 0, byCounterparty: {}, byRating: {} };

    state.trades.forEach(trade => {
        const cr = calculateCreditRisk(trade);
        portfolio.trades.push({ trade, cr });
        portfolio.totalEAD += cr.ead;
        portfolio.totalRWA += cr.rwa;
        portfolio.totalEL += cr.expectedLoss;
        portfolio.totalCVA += cr.cvaCharge;

        // By counterparty
        if (!portfolio.byCounterparty[trade.counterparty]) {
            portfolio.byCounterparty[trade.counterparty] = { ead: 0, rwa: 0, el: 0, rating: cr.rating, count: 0 };
        }
        portfolio.byCounterparty[trade.counterparty].ead += cr.ead;
        portfolio.byCounterparty[trade.counterparty].rwa += cr.rwa;
        portfolio.byCounterparty[trade.counterparty].el += cr.expectedLoss;
        portfolio.byCounterparty[trade.counterparty].count++;

        // By rating
        if (!portfolio.byRating[cr.rating]) {
            portfolio.byRating[cr.rating] = { ead: 0, rwa: 0, el: 0, count: 0 };
        }
        portfolio.byRating[cr.rating].ead += cr.ead;
        portfolio.byRating[cr.rating].rwa += cr.rwa;
        portfolio.byRating[cr.rating].el += cr.expectedLoss;
        portfolio.byRating[cr.rating].count++;
    });

    portfolio.capitalReq = portfolio.totalRWA * 0.105;
    return portfolio;
}

    // Expected Loss
    html += `<div class="cr-section-title">5. ${tip('EL')} &mdash; Expected Loss</div>

            <span class="formula-label">&nbsp;&nbsp;&nbsp;=</span> <span class="formula-result">${formatUSD(cr.expectedLoss)}</span>
        </div>`;

    // CVA
    html += `<div class="cr-section-title">6. ${tip('CVA')} &mdash; Credit Valuation Adjustment</div>
        <div class="cr-explain">
            <div class="cr-explain-title">What is CVA?</div>
            <p><strong>CVA</strong> is the market-priced expected loss from counterparty default on OTC derivatives.

        </div>
        <div class="cr-formula-box">
            <span class="formula-label">CVA (simplified) =</span> EAD &times; PD &times; LGD &times; 0.5 &times; Maturity<br>
            <span class="formula-label">&nbsp;&nbsp;&nbsp;=</span> ${formatUSD(cr.ead)} &times; ${(cr.pd*100).toFixed(4)}% &times; ${(cr.lgd*100).toFixed(1)}% &times; 0.5 &times; ${cr.maturity.toFixed(1)}<br>
            <span class="formula-label">&nbsp;&nbsp;&nbsp;=</span> <span class="formula-result">${formatUSD(cr.cvaCharge)}</span>
        </div>`;

    // Comparison: IRB vs Standardised
    html += `<div class="cr-section-title">7. IRB vs Standardised Approach Comparison</div>
        <table class="cr-table">
            <thead><tr><th>Metric</th><th>${tip('IRB')} Approach</th><th>Standardised Approach</th></tr></thead>
            <tbody>
                <tr><td>EAD</td><td>${formatUSD(cr.ead)}</td><td>${formatUSD(cr.ead)}</td></tr>
                <tr><td>Risk Weight</td><td>${(cr.K * 12.5 * 100).toFixed(1)}% (model-derived)</td><td>${(cr.ratingData.riskWeight * 100).toFixed(0)}% (regulatory table)</td></tr>
                <tr><td>RWA</td><td>${formatUSD(cr.rwa)}</td><td>${formatUSD(cr.rwaStandardised)}</td></tr>
                <tr><td>Capital (8%)</td><td>${formatUSD(cr.capitalReq8)}</td><td>${formatUSD(cr.rwaStandardised * 0.08)}</td></tr>
                <tr><td>Capital (10.5%)</td><td>${formatUSD(cr.capitalReqTotal)}</td><td>${formatUSD(cr.rwaStandardised * 0.105)}</td></tr>
            </tbody>
        </table>`;

    html += `</div>`;
    return html;
}

            <thead><tr><th>Parameter</th><th>Value</th><th>Methodology</th></tr></thead>
            <tbody>
                <tr><td style="font-weight:600;">Trade ID</td><td>${trade.id}</td><td>Internal reference</td></tr>
                <tr><td style="font-weight:600;">Counterparty</td><td>${trade.counterparty} (${cpData?.lei || 'N/A'})</td><td>LEI lookup</td></tr>
                <tr><td style="font-weight:600;">Credit Rating</td><td><span class="cr-rating-badge ${cr.ratingData.cssClass}">${cr.rating}</span></td><td>External rating (S&P equivalent)</td></tr>
                <tr><td style="font-weight:600;">Product Type</td><td>${trade.productType}</td><td>Trade capture</td></tr>
                <tr><td style="font-weight:600;">Notional</td><td>${formatUSD(cr.notional)}</td><td>Qty &times; Spot &times; Contract Size</td></tr>
                <tr><td style="font-weight:600;">${tip('PD')} (1-Year)</td><td>${(cr.pd * 100).toFixed(4)}%</td><td>Rating-implied PD (Foundation IRB)</td></tr>
                <tr><td style="font-weight:600;">${tip('LGD')}</td><td>${(cr.lgd * 100).toFixed(1)}%</td><td>Foundation IRB (45% base, adjusted for collateral)</td></tr>
                <tr><td style="font-weight:600;">${tip('Recovery Rate')}</td><td>${((1 - cr.lgd) * 100).toFixed(1)}%</td><td>1 - LGD</td></tr>
                <tr><td style="font-weight:600;">Replacement Cost</td><td>${formatUSD(cr.replacementCost)}</td><td>max(MTM, 0) per SA-CCR</td></tr>
                <tr><td style="font-weight:600;">Potential Future Exposure</td><td>${formatUSD(cr.pfe)}</td><td>SA-CCR add-on (SF=${(cr.saccrData.supervisoryFactor*100)}%, MF=${cr.saccrData.maturityFactor})</td></tr>
                <tr><td style="font-weight:600;">${tip('EAD')}</td><td>${formatUSD(cr.ead)}</td><td>&alpha;(${cr.alpha}) &times; (RC + PFE)</td></tr>
                <tr><td style="font-weight:600;">${tip('EL')}</td><td style="color:var(--danger);">${formatUSD(cr.expectedLoss)}</td><td>PD &times; LGD &times; EAD</td></tr>
                <tr><td style="font-weight:600;">${tip('RWA')} (IRB)</td><td style="font-weight:700;">${formatUSD(cr.rwa)}</td><td>K &times; 12.5 &times; EAD (IRB formula)</td></tr>
                <tr><td style="font-weight:600;">RWA (Standardised)</td><td>${formatUSD(cr.rwaStandardised)}</td><td>EAD &times; ${(cr.ratingData.riskWeight*100).toFixed(0)}% risk weight</td></tr>
                <tr><td style="font-weight:600;">Capital Requirement (8%)</td><td>${formatUSD(cr.capitalReq8)}</td><td>RWA &times; 8% (Pillar 1 minimum)</td></tr>
                <tr><td style="font-weight:600;">Capital Requirement (10.5%)</td><td style="font-weight:700;">${formatUSD(cr.capitalReqTotal)}</td><td>RWA &times; 10.5% (incl. conservation buffer)</td></tr>
                <tr><td style="font-weight:600;">${tip('CVA')} Charge</td><td>${formatUSD(cr.cvaCharge)}</td><td>EAD &times; PD &times; LGD &times; 0.5 &times; M</td></tr>
            </tbody>
        </table>
        <div style="margin-top:12px; font-size:0.75rem; color:var(--text-muted); line-height:1.5;">
            <strong>Methodology:</strong> EAD computed under ${tip('SA-CCR')} (Basel III CRE52). RWA computed under Foundation ${tip('IRB')} approach
            using the asymptotic single-risk-factor model with Vasicek formula for conditional PD at 99.9% confidence.
            ${tip('CVA')} charge is the simplified standardised approach per CRE65.
        </div>
    </div>`;

    return html;
}

</script>

<!--
================================================================
LIFECYCLE STAGE EXPLANATIONS — How Each Stage Maps to Real-World
Commodity Operations
================================================================

This section provides a brief commentary on how the six lifecycle
stages implemented in this simulator correspond to actual processes
in a physical commodities trading house or bank metals desk.

STAGE 1 — CAPTURE
In the real world, trade capture happens via electronic platforms
(e.g., LMEselect, CME Globex), voice broking, or direct dealer
negotiation. The trade is booked into an ETRM (Energy Trading and
Risk Management) system such as Endur, Aspect, or a proprietary
platform. Key data includes the commodity, tenor, quantity in
standardised lot sizes, and the counterparty.

STAGE 2 — VALIDATION & ENRICHMENT
Operations and middle-office teams verify trade details against
market conventions (T+2 for spot, business-day rules, lot sizes).
Static data enrichment pulls from reference databases: SSIs from
SWIFT's SWIFTRef, LEIs from the GLEIF database, internal book
mappings, and trader authorisation checks.

STAGE 3 — CONFIRMATION
For OTC precious metals, confirmations follow LBMA/LPPM
guidelines and may use SWIFT MT600/MT604 messages. For exchange-
traded futures, the exchange itself acts as the confirmation
mechanism (matched trades). For swaps, ISDA Master Agreement terms
govern, and electronic matching platforms like MarkitWire or
Traiana are common.

STAGE 4 — CLEARING & SETTLEMENT
Exchange futures clear through CCPs (LME Clear, CME Clearing
House) with daily margining. OTC precious metals in London clear
via LPMCL's AURUM system (for gold) or Platinum/Palladium
clearing. Base metal forwards settle via LME warrants. Cash
settlement flows through correspondent banking networks.

STAGE 5 — RECONCILIATION
Daily reconciliation ("rec") processes compare positions across
front-office booking systems, middle-office risk engines, and
custodian/clearer statements. Breaks are escalated according to
severity thresholds. Common tools include Duco, Gresham's Clareti,
or proprietary rec engines. Timely break resolution is a
regulatory requirement.

STAGE 6 — POSITION REPORTING
End-of-day position reports feed into regulatory reporting (EMIR,
MiFID II transaction reporting, CFTC large trader reports), internal
risk dashboards (VaR, stress tests, concentration limits), P&L
attribution, and management MI. The blotter view in this simulator
is a simplified version of what a real-time position-keeping
system provides.

PARALLEL FUNCTIONS
Throughout the lifecycle, valuation (daily MTM), market risk
(VaR computation), credit risk (counterparty exposure vs. limits),
and accounting (realised P&L, accruals) operate as independent
but interconnected processes, typically managed by separate teams
with distinct system access and controls.
================================================================
-->
