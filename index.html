function sipRunSimulation() {
    const structKey = document.getElementById('sipSimStructure')?.value || 'REPO';
    const comKey = document.getElementById('sipSimCommodity')?.value || 'Au';
    const qty = parseFloat(document.getElementById('sipSimQty')?.value) || 100;
    const container = document.getElementById('sipSimResults');
    if (!container) return;

    const s = SIP_STRUCTURES[structKey];
    const com = COMMODITIES[comKey];
    const spot = getMarketPrice(comKey);
    const invValue = qty * spot;
    const ex = s.example;
    const loanAmt = invValue * ex.loanPct;
    const dailyRate = ex.rate / 365;
    const storageDailyRate = 0.003 / 365;
    const insuranceDailyRate = 0.001 / 365;
    const days = Math.min(ex.tenor, 180);
    const timeline = [];
    let currentPrice = spot;
    let cumulativeInterest = 0;
    let cumulativeStorage = 0;
    let marginCallCount = 0;
    const currentLoan = loanAmt;
    const stepSize = days <= 30 ? 1 : 7;

    for (let d = 0; d <= days; d += stepSize) {
        if (d > 0) { currentPrice *= (1 + (Math.random() - 0.48) * 0.015); }
        const currentInvValue = qty * currentPrice;
        const currentLTV = currentLoan / currentInvValue;
        cumulativeInterest += currentLoan * dailyRate * stepSize;
        cumulativeStorage += currentInvValue * storageDailyRate * stepSize;
        let event = 'Normal';
        if (currentLTV > 0.85) { event = 'MARGIN CALL'; marginCallCount++; }
        else if (currentLTV > 0.75) { event = 'Warning'; }
        timeline.push({ day: d, price: currentPrice, invValue: currentInvValue, loan: currentLoan, ltv: currentLTV, cumInterest: cumulativeInterest, cumStorage: cumulativeStorage, event: event });
    }

    const finalState = timeline[timeline.length - 1];
    const totalCost = cumulativeInterest + cumulativeStorage + invValue * insuranceDailyRate * days + loanAmt * 0.005;
    const netProceeds = loanAmt - totalCost;

    let html = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div><h4 style="font-size:0.82rem; margin-bottom:8px; color:var(--primary);">Deal Summary</h4>
            <table class="sip-inv-table"><tbody>
                <tr><td class="sip-param-key">Structure</td><td style="font-weight:700;">${s.name}</td></tr>
                <tr><td class="sip-param-key">Commodity</td><td style="font-weight:700;">${com.name} (${comKey})</td></tr>
                <tr><td class="sip-param-key">Quantity</td><td style="font-weight:700;">${qty.toLocaleString()} ${com.unit}</td></tr>
                <tr><td class="sip-param-key">Entry Spot</td><td style="font-weight:700;">${formatUSD(spot)}</td></tr>
                <tr><td class="sip-param-key">Inventory Value (t=0)</td><td style="font-weight:700;">${formatUSD(invValue)}</td></tr>
                <tr><td class="sip-param-key">Loan Amount</td><td style="font-weight:700;">${formatUSD(loanAmt)}</td></tr>
                <tr><td class="sip-param-key">${tip('Advance Rate')}</td><td style="font-weight:700;">${(ex.loanPct * 100).toFixed(0)}%</td></tr>
                <tr><td class="sip-param-key">Financing Rate</td><td style="font-weight:700;">${(ex.rate * 100).toFixed(1)}% p.a.</td></tr>
                <tr><td class="sip-param-key">Tenor</td><td style="font-weight:700;">${days} days</td></tr>
            </tbody></table></div>
        <div><h4 style="font-size:0.82rem; margin-bottom:8px; color:var(--primary);">Outcome at Maturity (Day ${days})</h4>
            <table class="sip-inv-table"><tbody>
                <tr><td class="sip-param-key">Final Spot Price</td><td style="font-weight:700;">${formatUSD(finalState.price)}</td></tr>
                <tr><td class="sip-param-key">Final Inventory Value</td><td style="font-weight:700;">${formatUSD(finalState.invValue)}</td></tr>
                <tr><td class="sip-param-key">Price Change</td><td style="font-weight:700; color:${finalState.price >= spot ? '#276749' : '#c53030'};">${((finalState.price / spot - 1) * 100).toFixed(2)}%</td></tr>
                <tr><td class="sip-param-key">Final ${tip('LTV')}</td><td style="font-weight:700; color:${finalState.ltv > 0.85 ? '#c53030' : '#276749'};">${(finalState.ltv * 100).toFixed(1)}%</td></tr>
                <tr><td class="sip-param-key">Total Interest Paid</td><td style="font-weight:700; color:#c53030;">-${formatUSD(cumulativeInterest)}</td></tr>
                <tr><td class="sip-param-key">Total Storage Cost</td><td style="font-weight:700; color:#c53030;">-${formatUSD(cumulativeStorage)}</td></tr>
                <tr><td class="sip-param-key">All-In Financing Cost</td><td style="font-weight:700; color:#c53030;">-${formatUSD(totalCost)}</td></tr>
                <tr><td class="sip-param-key">Net Proceeds</td><td style="font-weight:700; color:${netProceeds >= 0 ? '#276749' : '#c53030'};">${formatUSD(netProceeds)}</td></tr>
                <tr><td class="sip-param-key">Margin Calls Triggered</td><td style="font-weight:700; color:${marginCallCount > 0 ? '#c53030' : '#276749'};">${marginCallCount}</td></tr>
            </tbody></table></div></div>`;

    html += `<h4 style="font-size:0.82rem; margin:16px 0 8px; color:var(--primary);">Lifecycle Timeline (${stepSize === 1 ? 'Daily' : 'Weekly'} Snapshots)</h4>
        <div style="overflow-x:auto; max-height:320px; overflow-y:auto;">
        <table class="sip-inv-table"><thead style="position:sticky; top:0;"><tr>
            <th>Day</th><th>Spot Price</th><th>Inv. Value</th><th>Loan O/S</th><th>${tip('LTV')}</th><th>Cum. Interest</th><th>Cum. Storage</th><th>Event</th>
        </tr></thead><tbody>`;
    timeline.forEach(t => {
        const ltvColor = t.ltv > 0.85 ? '#c53030' : t.ltv > 0.75 ? '#b7791f' : '#276749';
        const evtStyle = t.event === 'MARGIN CALL' ? 'color:#fff; background:#c53030; padding:1px 6px; border-radius:3px; font-weight:700;' : t.event === 'Warning' ? 'color:#b7791f; font-weight:600;' : 'color:var(--text-muted);';
        html += `<tr><td style="font-weight:600;">T+${t.day}</td><td style="text-align:right;">${formatUSD(t.price)}</td><td style="text-align:right;">${formatUSD(t.invValue)}</td><td style="text-align:right;">${formatUSD(t.loan)}</td><td style="text-align:center; font-weight:700; color:${ltvColor};">${(t.ltv * 100).toFixed(1)}%</td><td style="text-align:right; color:#c53030;">${formatUSD(t.cumInterest)}</td><td style="text-align:right; color:#b7791f;">${formatUSD(t.cumStorage)}</td><td><span style="${evtStyle}">${t.event}</span></td></tr>`;
    });
    html += `</tbody></table></div>`;
    container.innerHTML = html;
}

var CREDIT_RATING_PD = {
    'AAA': 0.0002, 'AA+': 0.0003, 'AA': 0.0005, 'AA-': 0.0008,
    'A+': 0.0010, 'A': 0.0015, 'A-': 0.0025,
    'BBB+': 0.0040, 'BBB': 0.0070, 'BBB-': 0.0120,
    'BB+': 0.0200, 'BB': 0.0350, 'BB-': 0.0550,
    'B+': 0.0800, 'B': 0.1200, 'B-': 0.1800,
    'CCC+': 0.2500, 'CCC': 0.3500, 'D': 1.0000
};

var COUNTERPARTY_CREDIT = {
    'HSBC':               { rating: 'A+',  pd: 0.0010, lgd: 0.45, sector: 'G-SIB Bank' },
    'JP Morgan':          { rating: 'A+',  pd: 0.0010, lgd: 0.45, sector: 'G-SIB Bank' },
    'Standard Chartered': { rating: 'A',   pd: 0.0015, lgd: 0.45, sector: 'G-SIB Bank' },
    'Goldman Sachs':      { rating: 'A+',  pd: 0.0010, lgd: 0.45, sector: 'G-SIB Bank' },
    'Citi':               { rating: 'A+',  pd: 0.0010, lgd: 0.45, sector: 'G-SIB Bank' }
};

function baselRiskWeight(pd, lgd) {
    if (pd <= 0.0003) return 0.20;
    if (pd <= 0.001)  return 0.50;
    if (pd <= 0.005)  return 0.75;
    if (pd <= 0.015)  return 1.00;
    if (pd <= 0.05)   return 1.50;
    if (pd <= 0.15)   return 2.50;
    return 4.00;
}

function calculateEAD(trade) {
    var ce = Math.max(trade.notional, 0);
    var pfe = 0;
    if (trade.productType === 'Forward' || trade.productType === 'Future') pfe = trade.notional * 0.10;
    else if (trade.productType === 'Swap') pfe = trade.notional * 0.15;
    else if (trade.productType === 'Spot') pfe = trade.notional * 0.02;
    else pfe = trade.notional * 0.12;
    return ce + pfe;
}

function calculateTradeCreditRisk(trade) {
    var cp = COUNTERPARTY_CREDIT[trade.counterparty] || { rating: 'BBB', pd: 0.007, lgd: 0.45, sector: 'Corporate' };
    var ead = calculateEAD(trade);
    var rw = baselRiskWeight(cp.pd, cp.lgd);
    var rwa = ead * rw;
    var el = cp.pd * cp.lgd * ead;
    return { counterparty: trade.counterparty, rating: cp.rating, pd: cp.pd, lgd: cp.lgd, ead: ead, riskWeight: rw, rwa: rwa, el: el, capitalRequired: rwa * 0.08, sector: cp.sector, tradeId: trade.id, commodity: trade.commodity, productType: trade.productType, notional: trade.notional };
}

function aggregatePortfolioCreditRisk() {
    var byCounterparty = {};
    var totalEAD = 0, totalRWA = 0, totalEL = 0, totalCapital = 0;
    state.trades.forEach(function(t) {
        var cr = calculateTradeCreditRisk(t);
        if (!byCounterparty[t.counterparty]) byCounterparty[t.counterparty] = { counterparty: t.counterparty, rating: cr.rating, pd: cr.pd, lgd: cr.lgd, sector: cr.sector, ead: 0, rwa: 0, el: 0, capitalRequired: 0, tradeCount: 0 };
        byCounterparty[t.counterparty].ead += cr.ead;
        byCounterparty[t.counterparty].rwa += cr.rwa;
        byCounterparty[t.counterparty].el += cr.el;
        byCounterparty[t.counterparty].capitalRequired += cr.capitalRequired;
        byCounterparty[t.counterparty].tradeCount++;
        totalEAD += cr.ead; totalRWA += cr.rwa; totalEL += cr.el; totalCapital += cr.capitalRequired;
    });
    return { byCounterparty: byCounterparty, totalEAD: totalEAD, totalRWA: totalRWA, totalEL: totalEL, totalCapital: totalCapital };
}

    html += '<div class="rp-section"><div class="rp-section-title">Trade-Level Credit Risk Detail</div><table class="cr-portfolio-table"><thead><tr><th>Trade ID</th><th>Commodity</th><th>Product</th><th>Counterparty</th><th>Notional</th><th>PFE Add-On</th><th>' + tip('EAD') + '</th><th>' + tip('RWA') + '</th><th>' + tip('EL') + '</th></tr></thead><tbody>';
    state.trades.forEach(function(t) { var cr = calculateTradeCreditRisk(t); var pfe = cr.ead - t.notional; html += '<tr><td class="fw-bold">' + t.id + '</td><td>' + t.commodity + '</td><td>' + t.productType + '</td><td>' + t.counterparty + '</td><td>' + formatUSD(t.notional) + '</td><td>' + formatUSD(pfe) + '</td><td>' + formatUSD(cr.ead) + '</td><td>' + formatUSD(cr.rwa) + '</td><td class="neg">' + formatUSD(cr.el) + '</td></tr>'; });
    html += '</tbody></table></div>';
    container.innerHTML = html;

    var el = pd * lgd * ead, rw = baselRiskWeight(pd, lgd), rwa = ead * rw, capital = rwa * 0.08, rr = 1 - lgd;
    document.getElementById('crCalcResults').innerHTML =
        '<div class="cr-el-banner"><span class="cr-el-formula">' + tip('EL') + ' = ' + tip('PD') + ' x ' + tip('LGD') + ' x ' + tip('EAD') + '</span><span class="cr-el-formula">= ' + (pd * 100).toFixed(2) + '% x ' + (lgd * 100).toFixed(0) + '% x ' + formatUSD(ead) + '</span><span class="cr-el-equals">= ' + formatUSD(el) + '</span></div>' +
        '<div class="cr-metric-grid"><div class="cr-metric-card"><div class="cr-metric-abbr pd">' + (pd * 100).toFixed(2) + '%</div><div class="cr-metric-name">' + tip('PD') + ' (' + rating + ')</div><div class="cr-metric-detail">1-year default probability</div></div><div class="cr-metric-card"><div class="cr-metric-abbr lgd">' + (lgd * 100).toFixed(0) + '%</div><div class="cr-metric-name">' + tip('LGD') + '</div><div class="cr-metric-detail">' + tip('Recovery Rate') + ': ' + (rr * 100).toFixed(0) + '%</div></div><div class="cr-metric-card"><div class="cr-metric-abbr ead">' + formatUSD(ead) + '</div><div class="cr-metric-name">' + tip('EAD') + '</div><div class="cr-metric-detail">Total exposure at default</div></div><div class="cr-metric-card highlight"><div class="cr-metric-abbr rwa">' + formatUSD(rwa) + '</div><div class="cr-metric-name">' + tip('RWA') + '</div><div class="cr-metric-detail">' + tip('Risk Weight') + ': ' + (rw * 100).toFixed(0) + '% | Capital: ' + formatUSD(capital) + '</div></div></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step-by-Step Calculation</div>' +
        '<div class="rp-step-line">1. Counterparty rated <strong>' + rating + '</strong> &rarr; PD = ' + (pd * 100).toFixed(4) + '% (annualised probability of default)</div>' +
        '<div class="rp-step-line">2. LGD = ' + (lgd * 100).toFixed(0) + '% (loss severity if default occurs, recovery rate = ' + (rr * 100).toFixed(0) + '%)</div>' +
        '<div class="rp-step-line">3. EAD = ' + formatUSD(ead) + ' (current exposure + potential future exposure)</div>' +
        '<div class="rp-step-line">4. <strong>Expected Loss</strong> = PD x LGD x EAD = ' + (pd * 100).toFixed(4) + '% x ' + (lgd * 100).toFixed(0) + '% x ' + formatUSD(ead) + ' = <span class="neg">' + formatUSD(el) + '</span></div>' +
        '<div class="rp-step-line">5. Risk Weight (Basel standardised) = ' + (rw * 100).toFixed(0) + '% for PD = ' + (pd * 100).toFixed(2) + '%</div>' +
        '<div class="rp-step-line">6. <strong>RWA</strong> = EAD x Risk Weight = ' + formatUSD(ead) + ' x ' + (rw * 100).toFixed(0) + '% = <span class="neg">' + formatUSD(rwa) + '</span></div>' +
        '<div class="rp-step-line result">7. <strong>Minimum Capital (8% of RWA)</strong> = ' + formatUSD(rwa) + ' x 8% = <span class="neg">' + formatUSD(capital) + '</span></div></div>';
}

function getCreditRiskHTML() {
    return '<div class="rp-section"><div class="rp-section-title" style="font-size:1.05rem;">Credit Risk: PD, LGD, EAD & RWA</div><div class="rp-hero-sub">Credit risk is the risk of financial loss arising from a counterparty\'s failure to fulfil its contractual obligations. In commodities trading, this manifests when a counterparty defaults on a forward delivery, swap payment, or margin call. The four pillars &mdash; PD, LGD, EAD, and RWA &mdash; form the foundation of modern credit risk measurement under the Basel III regulatory framework.</div></div>' +
    '<div class="card" style="padding: 0;"><div class="cr-tab-bar">' +
        '<button class="cr-tab active" onclick="switchCRTab(\'concepts\')">Core Concepts</button>' +
        '<button class="cr-tab" onclick="switchCRTab(\'example\')">Worked Trade Example</button>' +
        '<button class="cr-tab" onclick="switchCRTab(\'portfolio\')">Live Portfolio Risk</button>' +
        '<button class="cr-tab" onclick="switchCRTab(\'calculator\')">Interactive Calculator</button>' +
        '<button class="cr-tab" onclick="switchCRTab(\'basel\')">Basel Framework</button></div>' +
    // TAB 1: CORE CONCEPTS
    '<div class="cr-tab-content active" id="crTab_concepts" style="padding: 18px;">' +
        '<div class="rp-section"><div class="rp-section-title">How the Four Pillars Fit Together</div>' +
        '<p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">When a bank or trading house extends credit to a counterparty (by entering a trade, lending money, or granting a credit line), it needs to answer three fundamental questions: <strong>How likely is the counterparty to default?</strong> (PD), <strong>How much will we lose if they do?</strong> (LGD), and <strong>How much are we exposed to them for?</strong> (EAD). The answers feed into the calculation of <strong>RWA</strong>, which determines how much regulatory capital must be held.</p>' +
        '<div class="cr-flow">' +
            '<div class="cr-flow-step"><div class="cr-flow-step-icon" style="color:#e53e3e;">&#x26A0;</div><div class="cr-flow-step-label">' + tip('PD') + '</div><div class="cr-flow-step-sub">Will they default?</div></div>' +
            '<div class="cr-flow-arrow">&times;</div>' +
            '<div class="cr-flow-step"><div class="cr-flow-step-icon" style="color:#dd6b20;">&#x1F4C9;</div><div class="cr-flow-step-label">' + tip('LGD') + '</div><div class="cr-flow-step-sub">How much do we lose?</div></div>' +
            '<div class="cr-flow-arrow">&times;</div>' +
            '<div class="cr-flow-step"><div class="cr-flow-step-icon" style="color:#3182ce;">&#x1F4B0;</div><div class="cr-flow-step-label">' + tip('EAD') + '</div><div class="cr-flow-step-sub">How much is at risk?</div></div>' +
            '<div class="cr-flow-arrow">=</div>' +
            '<div class="cr-flow-step" style="border-color:var(--success); background:#f0fff4;"><div class="cr-flow-step-icon" style="color:var(--success);">&#x2714;</div><div class="cr-flow-step-label">' + tip('EL') + '</div><div class="cr-flow-step-sub">Expected Loss</div></div>' +
            '<div class="cr-flow-arrow">&rarr;</div>' +
            '<div class="cr-flow-step" style="border-color:#805ad5; background:#faf5ff;"><div class="cr-flow-step-icon" style="color:#805ad5;">&#x1F3E6;</div><div class="cr-flow-step-label">' + tip('RWA') + '</div><div class="cr-flow-step-sub">Capital required</div></div>' +
        '</div></div>' +
        '<div class="cr-el-banner"><span class="cr-el-formula">Expected Loss (EL) = PD &times; LGD &times; EAD</span><span style="font-size:0.75rem; opacity:0.8;">&nbsp;&nbsp;|&nbsp;&nbsp;</span><span class="cr-el-formula">RWA = EAD &times; Risk Weight(PD, LGD)</span><span style="font-size:0.75rem; opacity:0.8;">&nbsp;&nbsp;|&nbsp;&nbsp;</span><span class="cr-el-formula">Capital = RWA &times; 8%</span></div>' +
        '<div class="rp-concept-grid">' +
            '<div class="rp-concept-card"><h4><span style="color:#e53e3e; font-size:1.1rem;">&#x26A0;</span> ' + tip('PD') + ' &mdash; Probability of Default</h4><p>The likelihood that a counterparty will default on its obligations within a specified time horizon, typically <strong>one year</strong>. PD is the starting point of all credit risk measurement.</p><div class="rp-formula">PD = Number of defaults / Total obligors in rating grade</div><p style="margin-top:8px;"><strong>How it\'s determined:</strong> External credit ratings (S&P, Moody\'s, Fitch) map to historical default frequencies. For unrated counterparties, banks use internal scorecards based on financial ratios (leverage, interest coverage, profitability), industry risk, and qualitative factors (management quality, country risk).</p><p style="margin-top:6px;"><strong>In commodities:</strong> A gold producer rated BBB with PD = 0.70% means that out of 1,000 similar producers, approximately 7 are expected to default within one year.</p></div>' +
            '<div class="rp-concept-card"><h4><span style="color:#dd6b20; font-size:1.1rem;">&#x1F4C9;</span> ' + tip('LGD') + ' &mdash; Loss Given Default</h4><p>The fraction of the exposure that is actually lost when a counterparty defaults, expressed as a percentage. LGD = 1 &minus; Recovery Rate. A higher recovery rate means lower LGD.</p><div class="rp-formula">LGD = 1 - Recovery Rate = (EAD - Amount Recovered) / EAD</div><p style="margin-top:8px;"><strong>Key drivers:</strong> Collateral quality and coverage (e.g., physical metal held as security), seniority of the claim (senior secured vs. unsecured), jurisdiction (recovery rates vary by legal system), and the type of counterparty (banks typically have higher recovery than corporates).</p><p style="margin-top:6px;"><strong>Typical values:</strong> Senior secured commodity finance: LGD 20-35% (metal collateral). Senior unsecured bank exposure: LGD 45% (Basel foundation IRB default). Subordinated claims: LGD 75%.</p></div>' +
            '<div class="rp-concept-card"><h4><span style="color:#3182ce; font-size:1.1rem;">&#x1F4B0;</span> ' + tip('EAD') + ' &mdash; Exposure at Default</h4><p>The total economic exposure to a counterparty at the moment of default. For on-balance-sheet items, EAD is typically the outstanding balance. For derivatives and off-balance-sheet items, it requires modelling <strong>potential future exposure (PFE)</strong>.</p><div class="rp-formula">EAD = Current Exposure + PFE Add-on (SA-CCR for derivatives)</div><p style="margin-top:8px;"><strong>' + tip('SA-CCR') + ' for commodities:</strong> Under Basel III\'s Standardised Approach for Counterparty Credit Risk, EAD = max(0, Replacement Cost) + PFE. The PFE add-on uses supervisory factors: 18% for electricity, 18% for oil/gas, 18% for metals, 18% for agricultural, applied to notional adjusted for maturity.</p><p style="margin-top:6px;"><strong>Off-balance-sheet:</strong> Undrawn credit lines use a ' + tip('CCF') + ' (Credit Conversion Factor). E.g., a $10M undrawn facility with 50% CCF &rarr; EAD = $5M.</p></div>' +
            '<div class="rp-concept-card"><h4><span style="color:#805ad5; font-size:1.1rem;">&#x1F3E6;</span> ' + tip('RWA') + ' &mdash; Risk-Weighted Assets</h4><p>RWA translates exposure amounts into a risk-adjusted measure that determines how much regulatory capital a bank must hold. Riskier exposures receive higher risk weights, requiring more capital.</p><div class="rp-formula">RWA = EAD &times; Risk Weight(PD, LGD, Maturity)</div><p style="margin-top:8px;"><strong>Capital charge:</strong> Under ' + tip('Basel III') + ', banks must hold minimum ' + tip('CET1') + ' capital of <strong>4.5%</strong> of RWA, with buffers bringing the effective minimum to <strong>8-13%</strong> depending on the bank\'s systemic importance. So RWA of $50M requires $4-6.5M in capital.</p><p style="margin-top:6px;"><strong>Why it matters in trading:</strong> Every trade consumes RWA and therefore capital. Desks must earn a return (RAROC) above the cost of that capital. Low-RWA trades with G-SIB bank counterparties are more capital-efficient than high-RWA trades with unrated corporates.</p></div>' +
        '</div>' +
        '<div class="rp-section"><div class="rp-section-title">Credit Rating to PD Mapping</div>' +
        '<p style="font-size: 0.8rem; color: var(--text-body); margin-bottom: 10px;">Rating agencies publish historical default studies mapping each rating grade to an observed default frequency. The table below shows typical 1-year PDs used by banks for capital calculation:</p>' +
        '<div class="cr-rating-grid">' + Object.entries(CREDIT_RATING_PD).map(function(e) { var cls = e[1] <= 0.003 ? 'inv-grade' : e[1] < 0.2 ? 'spec-grade' : 'default-grade'; return '<div class="cr-rating-cell ' + cls + '"><div class="grade">' + e[0] + '</div><div class="pd-val">PD: ' + (e[1] * 100).toFixed(2) + '%</div></div>'; }).join('') + '</div>' +
        '<div class="rp-legend" style="margin-top:8px;"><div class="rp-legend-item"><div class="rp-legend-swatch" style="background:var(--success);"></div> Investment Grade (AAA to BBB-)</div><div class="rp-legend-item"><div class="rp-legend-swatch" style="background:var(--warning);"></div> Speculative Grade (BB+ to B-)</div><div class="rp-legend-item"><div class="rp-legend-swatch" style="background:var(--danger);"></div> Default / Near Default (CCC+, D)</div></div></div>' +
    '</div>' +
    // TAB 2: WORKED TRADE EXAMPLE
    '<div class="cr-tab-content" id="crTab_example" style="padding: 18px;">' +
        '<div class="rp-section"><div class="rp-section-title">Worked Example: Gold Forward Trade</div>' +
        '<p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">Let\'s walk through a complete credit risk calculation for a single commodities trade, step by step, showing how PD, LGD, EAD, and RWA are computed and what they mean in practice.</p>' +
        '<div class="rp-callout"><div class="rp-callout-title">Trade Details</div><p><strong>Product:</strong> Gold Forward (OTC, 6-month tenor)<br><strong>Counterparty:</strong> Standard Chartered Bank (S&P: A, Moody\'s: A1)<br><strong>Direction:</strong> We buy 100 lots (100 x 100 troy oz = 10,000 oz) at $2,350/oz<br><strong>Notional Value:</strong> $23,500,000<br><strong>Collateral:</strong> None (unsecured interbank, under ISDA Master Agreement with CSA)</p></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step 1: Determine PD (Probability of Default)</div><div class="rp-step-line">Standard Chartered rated A by S&P</div><div class="rp-step-line">Historical 1-year default rate for A-rated financial institutions: <strong>0.15%</strong></div><div class="rp-step-line">Internal model adjustment for country risk (emerging market revenue mix): +0.00%</div><div class="rp-step-line result">PD = <span class="neg">0.15%</span> (1.5 basis points)</div><div class="rp-step-line" style="font-style:italic; color:var(--text-muted);">Interpretation: Out of 10,000 similar A-rated banks, ~15 would be expected to default within one year.</div></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step 2: Determine LGD (Loss Given Default)</div><div class="rp-step-line">Exposure type: Senior unsecured (no specific collateral pledged)</div><div class="rp-step-line">Basel Foundation IRB default LGD for senior unsecured: <strong>45%</strong></div><div class="rp-step-line">ISDA CSA with daily margin calls could reduce effective LGD</div><div class="rp-step-line">However, for regulatory capital, floor of 45% applies</div><div class="rp-step-line result">LGD = <span class="neg">45%</span></div><div class="rp-step-line" style="font-style:italic; color:var(--text-muted);">Interpretation: If Standard Chartered defaults, we expect to recover 55 cents on the dollar (Recovery Rate = 55%), losing 45% of whatever we are owed.</div></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step 3: Calculate EAD (Exposure at Default)</div><div class="rp-step-line"><strong>Current Exposure (Replacement Cost):</strong></div><div class="rp-step-line">&nbsp;&nbsp;Current gold price: $2,380/oz (market moved in our favour)</div><div class="rp-step-line">&nbsp;&nbsp;MTM gain = (2,380 - 2,350) x 10,000 oz = <span class="pos">+$300,000</span></div><div class="rp-step-line">&nbsp;&nbsp;Replacement Cost (RC) = max(MTM, 0) = $300,000</div><div class="rp-step-line">&nbsp;</div><div class="rp-step-line"><strong>Potential Future Exposure (PFE) under SA-CCR:</strong></div><div class="rp-step-line">&nbsp;&nbsp;Supervisory factor for metals: 18%</div><div class="rp-step-line">&nbsp;&nbsp;Maturity factor for 6-month trade: sqrt(min(1, 0.5)) = 0.707</div><div class="rp-step-line">&nbsp;&nbsp;Adjusted notional = $23,500,000 x 0.707 = $16,614,500</div><div class="rp-step-line">&nbsp;&nbsp;PFE add-on = $16,614,500 x 18% = <span class="neg">$2,990,610</span></div><div class="rp-step-line">&nbsp;</div><div class="rp-step-line"><strong>EAD = RC + PFE = $300,000 + $2,990,610</strong></div><div class="rp-step-line result">EAD = <span class="neg">$3,290,610</span></div><div class="rp-step-line" style="font-style:italic; color:var(--text-muted);">Interpretation: Although our current mark-to-market gain is only $300K, the potential for gold to move further before the 6-month settlement means our exposure could grow to ~$3.3M.</div></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step 4: Calculate RWA (Risk-Weighted Assets)</div><div class="rp-step-line"><strong>Under Basel Standardised Approach:</strong></div><div class="rp-step-line">&nbsp;&nbsp;A-rated bank counterparty &rarr; Risk Weight = 50%</div><div class="rp-step-line">&nbsp;&nbsp;RWA = EAD x Risk Weight = $3,290,610 x 50%</div><div class="rp-step-line result">RWA = <span class="neg">$1,645,305</span></div><div class="rp-step-line">&nbsp;</div><div class="rp-step-line"><strong>Minimum Capital Requirement (Pillar 1):</strong></div><div class="rp-step-line">&nbsp;&nbsp;Capital = RWA x 8% = $1,645,305 x 8%</div><div class="rp-step-line result">Capital Required = <span class="neg">$131,624</span></div><div class="rp-step-line" style="font-style:italic; color:var(--text-muted);">Interpretation: The bank must hold at least $131,624 in CET1 capital against this single gold forward trade. The trading desk must earn more than this cost of capital to generate positive economic profit.</div></div>' +
        '<div class="rp-worked-example"><div class="rp-worked-title">Step 5: Expected Loss (EL)</div><div class="rp-step-line">EL = PD x LGD x EAD</div><div class="rp-step-line">EL = 0.15% x 45% x $3,290,610</div><div class="rp-step-line">EL = 0.0015 x 0.45 x $3,290,610</div><div class="rp-step-line result">Expected Loss = <span class="neg">$2,221</span> (per annum)</div><div class="rp-step-line" style="font-style:italic; color:var(--text-muted);">Interpretation: The bank expects to lose about $2,221 per year on average from credit risk on this trade. This is provisioned through credit reserves (loan loss provisions), not capital. Capital covers unexpected losses above this level.</div></div>' +
        '<div class="cr-metric-grid" style="margin-top:18px;"><div class="cr-metric-card"><div class="cr-metric-abbr pd">0.15%</div><div class="cr-metric-name">PD</div><div class="cr-metric-value" style="font-size:0.9rem;">S&P: A</div></div><div class="cr-metric-card"><div class="cr-metric-abbr lgd">45%</div><div class="cr-metric-name">LGD</div><div class="cr-metric-value" style="font-size:0.9rem;">Sr. Unsecured</div></div><div class="cr-metric-card"><div class="cr-metric-abbr ead">$3.29M</div><div class="cr-metric-name">EAD</div><div class="cr-metric-value" style="font-size:0.9rem;">RC + PFE</div></div><div class="cr-metric-card highlight"><div class="cr-metric-abbr rwa">$1.65M</div><div class="cr-metric-name">RWA</div><div class="cr-metric-value" style="font-size:0.9rem;">Capital: $131.6K</div></div></div></div>' +
        '<div class="rp-section"><div class="rp-section-title">Portfolio Example: 5-Trade Commodity Book</div><p style="font-size: 0.8rem; color: var(--text-body); margin-bottom: 10px;">Credit risk is always assessed at the portfolio level. Below is a sample 5-trade book showing how different counterparties, products, and tenors produce varying risk profiles:</p>' +
        '<table class="cr-portfolio-table"><thead><tr><th>#</th><th>Trade</th><th>Counterparty</th><th>Rating</th><th>Notional</th><th>PD</th><th>LGD</th><th>EAD</th><th>Risk Wt</th><th>RWA</th><th>EL</th></tr></thead><tbody>' +
        '<tr><td>1</td><td>Gold Forward 6M</td><td>Standard Chartered</td><td><span class="rp-badge rp-badge-delta">A</span></td><td>$23,500,000</td><td>0.15%</td><td>45%</td><td>$3,290,610</td><td>50%</td><td>$1,645,305</td><td>$2,221</td></tr>' +
        '<tr><td>2</td><td>Copper Swap 12M</td><td>JP Morgan</td><td><span class="rp-badge rp-badge-delta">A+</span></td><td>$15,000,000</td><td>0.10%</td><td>45%</td><td>$2,850,000</td><td>50%</td><td>$1,425,000</td><td>$1,283</td></tr>' +
        '<tr><td>3</td><td>Silver Spot</td><td>HSBC</td><td><span class="rp-badge rp-badge-delta">A+</span></td><td>$5,200,000</td><td>0.10%</td><td>45%</td><td>$5,304,000</td><td>50%</td><td>$2,652,000</td><td>$2,387</td></tr>' +
        '<tr><td>4</td><td>Oil Future 3M</td><td>Goldman Sachs</td><td><span class="rp-badge rp-badge-delta">A+</span></td><td>$8,750,000</td><td>0.10%</td><td>45%</td><td>$1,662,500</td><td>50%</td><td>$831,250</td><td>$748</td></tr>' +
        '<tr style="background: var(--warning-bg);"><td>5</td><td>Platinum Fwd 9M</td><td>Mining Corp (Unrated)</td><td><span class="rp-badge rp-badge-var">BB</span></td><td>$4,000,000</td><td>3.50%</td><td>55%</td><td>$760,000</td><td>150%</td><td>$1,140,000</td><td>$14,630</td></tr>' +
        '</tbody><tfoot><tr><td colspan="7" style="text-align:right;">Portfolio Total</td><td>$13,867,110</td><td>&mdash;</td><td>$7,693,555</td><td>$21,269</td></tr></tfoot></table>' +
        '<div class="rp-callout" style="margin-top:14px;"><div class="rp-callout-title">Key Observation</div><p>Trade #5 (Platinum Forward with the unrated mining company) has the <strong>smallest notional</strong> ($4M) but generates <strong>$14,630 in Expected Loss</strong> &mdash; nearly 7x more than the $23.5M gold forward with Standard Chartered. This illustrates why counterparty credit quality (PD) is the dominant driver of credit risk cost. A single BB-rated trade can consume disproportionate capital relative to its size.</p></div>' +
        '<div class="rp-callout rp-callout-warn"><div class="rp-callout-title">Concentration Risk</div><p>Although individual trade ELs look small, a trading house with 500 trades across 30 counterparties must also consider <strong>concentration risk</strong> (large exposure to a single name or sector), <strong>wrong-way risk</strong> (exposure increases when counterparty credit deteriorates, common in commodities where a producer\'s default risk rises as the commodity price falls), and <strong>correlation</strong> between defaults.</p></div></div>' +
    '</div>' +
    // TAB 3: LIVE PORTFOLIO
    '<div class="cr-tab-content" id="crTab_portfolio" style="padding: 18px;"><div id="crPortfolioContent"><div class="rp-callout"><div class="rp-callout-title">No Trades Booked</div><p>Seed demo trades or book trades to see live portfolio credit risk metrics. Use the "Seed 7 Demo Trades" button in the navigation bar.</p></div></div></div>' +
    // TAB 4: CALCULATOR
    '<div class="cr-tab-content" id="crTab_calculator" style="padding: 18px;"><div id="crCalculatorContent"></div></div>' +
    // TAB 5: BASEL FRAMEWORK
    '<div class="cr-tab-content" id="crTab_basel" style="padding: 18px;">' +
        '<div class="rp-section"><div class="rp-section-title">Basel III/IV Credit Risk Framework</div><p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">The Basel framework, set by the Basel Committee on Banking Supervision (BCBS), provides two main approaches for calculating credit risk capital requirements. Both aim to ensure banks hold sufficient capital to absorb credit losses, but they differ in how PD, LGD, and EAD are determined.</p>' +
        '<table class="rp-table"><thead><tr><th style="width:20%;">Aspect</th><th style="width:40%;">Standardised Approach (SA)</th><th style="width:40%;">' + tip('IRB') + ' Approach</th></tr></thead><tbody>' +
        '<tr><td class="fw-bold">PD</td><td>Implied by external credit ratings (S&P, Moody\'s, Fitch) &mdash; fixed risk weight buckets per rating grade</td><td>Bank\'s own internal estimate based on historical default data, scorecards, and statistical models (subject to regulatory floors)</td></tr>' +
        '<tr><td class="fw-bold">LGD</td><td>Fixed supervisory values: 45% senior unsecured, 75% subordinated. No bank estimation.</td><td><strong>Foundation IRB:</strong> Supervisory LGD (45%/75%). <strong>Advanced IRB:</strong> Bank\'s own LGD estimates from workout/recovery data.</td></tr>' +
        '<tr><td class="fw-bold">EAD</td><td>SA-CCR for derivatives (RC + PFE). CCFs for off-balance-sheet: 20-100% depending on facility type.</td><td><strong>Foundation IRB:</strong> Supervisory CCFs. <strong>Advanced IRB:</strong> Bank\'s own EAD/CCF estimates.</td></tr>' +
        '<tr><td class="fw-bold">RWA Calculation</td><td>RWA = EAD x Regulatory Risk Weight (from lookup table by rating/asset class)</td><td>RWA = EAD x K(PD, LGD, M, R) x 12.5 &mdash; where K uses the Basel IRB risk weight function (Vasicek single-factor model)</td></tr>' +
        '<tr><td class="fw-bold">Complexity</td><td>Simple, transparent, but less risk-sensitive. Suitable for smaller banks.</td><td>Complex, requires regulatory approval, significant data infrastructure. Used by large/G-SIB banks.</td></tr>' +

function generateForwardCurveData(commodity, shape, months) {
    const spot = getMarketPrice(commodity);
    const points = [];
    const now = new Date();

    for (let i = 0; i <= months; i++) {
        const dt = new Date(now);
        dt.setMonth(dt.getMonth() + i);
        const tenor = i === 0 ? 'Spot' : i + 'M';
        let price;

        if (shape === 'contango') {
            const storageCost = spot * 0.002 * i;
            const financingCost = spot * 0.004 * i;
            const noise = (Math.random() - 0.5) * spot * 0.003;
            price = spot + storageCost + financingCost + noise;
        } else if (shape === 'backwardation') {
            const convenienceYield = spot * 0.008 * i;
            const carryCost = spot * 0.003 * i;
            const noise = (Math.random() - 0.5) * spot * 0.003;
            price = spot - (convenienceYield - carryCost) + noise;
        } else {
            const noise = (Math.random() - 0.5) * spot * 0.005;
            price = spot + noise;
        }

        points.push({
            month: i,
            tenor: tenor,
            date: dateStr(dt),
            price: parseFloat(price.toFixed(2)),
            spread: parseFloat((price - spot).toFixed(2)),
            spreadPct: parseFloat(((price - spot) / spot * 100).toFixed(3))
        });
    }

    return { commodity, spot, points, shape };
}

function drawForwardCurveChart(canvasId, data, showAnnotations) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 30, right: 40, bottom: 50, left: 75 };

    const pts = data.points;
    const prices = pts.map(p => p.price);
    let minP = Math.min(...prices);
    let maxP = Math.max(...prices);
    const range = maxP - minP || 1;
    minP -= range * 0.15;
    maxP += range * 0.15;

    const toX = (i) => pad.left + (i / (pts.length - 1)) * (W - pad.left - pad.right);
    const toY = (p) => pad.top + ((maxP - p) / (maxP - minP)) * (H - pad.top - pad.bottom);

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    const yTicks = 6;
    for (let i = 0; i <= yTicks; i++) {
        const val = minP + (maxP - minP) * i / yTicks;
        const y = toY(val);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '10px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('$' + val.toFixed(2), pad.left - 6, y + 3);
    }

    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    pts.forEach((p, i) => {
        if (i % Math.max(1, Math.floor(pts.length / 12)) === 0 || i === pts.length - 1) {
            ctx.fillText(p.tenor, toX(i), H - pad.bottom + 16);
        }
    });

    ctx.strokeStyle = '#38a169';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, toY(data.spot));
    ctx.lineTo(W - pad.right, toY(data.spot));
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#38a169';
    ctx.font = 'bold 10px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Spot: $' + data.spot.toFixed(2), pad.left + 4, toY(data.spot) - 6);

    const curveColor = data.shape === 'contango' ? '#3182ce' : data.shape === 'backwardation' ? '#e53e3e' : '#718096';
    const fillColor = data.shape === 'contango' ? 'rgba(49,130,206,0.08)' : data.shape === 'backwardation' ? 'rgba(229,62,62,0.08)' : 'rgba(113,128,150,0.06)';

    ctx.beginPath();
    ctx.moveTo(toX(0), toY(data.spot));
    pts.forEach((p, i) => ctx.lineTo(toX(i), toY(p.price)));
    ctx.lineTo(toX(pts.length - 1), toY(data.spot));
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    ctx.strokeStyle = curveColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    pts.forEach((p, i) => {
        if (i === 0) ctx.moveTo(toX(i), toY(p.price));
        else ctx.lineTo(toX(i), toY(p.price));
    });
    ctx.stroke();

    pts.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(toX(i), toY(p.price), 3, 0, Math.PI * 2);
        ctx.fillStyle = curveColor;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    });

    if (showAnnotations) {
        const annotation = data.shape === 'contango'
            ? 'Futures > Spot (Contango)'
            : data.shape === 'backwardation'
            ? 'Futures < Spot (Backwardation)'
            : 'Futures ~ Spot (Flat)';
        ctx.fillStyle = curveColor;
        ctx.font = 'bold 11px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(annotation, W - pad.right - 5, pad.top + 14);

        if (data.shape === 'contango' || data.shape === 'backwardation') {
            const midIdx = Math.floor(pts.length / 2);
            const midX = toX(midIdx);
            const midY = toY(pts[midIdx].price);
            const spotY = toY(data.spot);
            ctx.strokeStyle = curveColor;
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 2]);
            ctx.beginPath(); ctx.moveTo(midX, spotY); ctx.lineTo(midX, midY); ctx.stroke();
            ctx.setLineDash([]);
            const spread = pts[midIdx].spread;
            ctx.fillStyle = curveColor;
            ctx.font = '9px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText((spread >= 0 ? '+' : '') + '$' + spread.toFixed(2), midX + 6, (spotY + midY) / 2 + 3);
        }
    }

    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 12px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(COMMODITIES[data.commodity].name + ' Forward Curve', pad.left, pad.top - 10);

    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, H - pad.bottom);
    ctx.lineTo(W - pad.right, H - pad.bottom);
    ctx.stroke();

    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Delivery Month', W / 2, H - 8);
    ctx.save();
    ctx.translate(12, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Price (USD)', 0, 0);
    ctx.restore();
}

function drawRollYieldDiagram(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    const pad = { top: 30, right: 30, bottom: 50, left: 60 };

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;
    const months = ['M1', 'M2', 'M3', 'M4', 'M5', 'M6'];
    const barWidth = plotW / months.length * 0.55;
    const gapWidth = plotW / months.length;
    const rollYields = [-0.7, -0.65, -0.55, -0.5, -0.4, -0.3];
    const rollYieldsBack = [0.99, 0.85, 0.7, 0.6, 0.45, 0.35];
    const maxVal = 1.2;
    const toY = (v) => pad.top + ((maxVal - v) / (maxVal * 2)) * plotH;
    const zeroY = toY(0);

    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (let v = -1; v <= 1; v += 0.5) {
        const y = toY(v);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#718096';
        ctx.font = '9px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(v.toFixed(1) + '%', pad.left - 5, y + 3);
    }

    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(W - pad.right, zeroY); ctx.stroke();

    months.forEach((m, i) => {
        const x = pad.left + i * gapWidth + gapWidth * 0.15;
        const negH = Math.abs(rollYields[i]) / maxVal * (plotH / 2);
        ctx.fillStyle = 'rgba(229,62,62,0.7)';
        ctx.fillRect(x, zeroY, barWidth / 2 - 1, negH);
        const posH = rollYieldsBack[i] / maxVal * (plotH / 2);
        ctx.fillStyle = 'rgba(49,130,206,0.7)';
        ctx.fillRect(x + barWidth / 2 + 1, zeroY - posH, barWidth / 2 - 1, posH);
        ctx.fillStyle = '#4a5568';
        ctx.font = '10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(m, x + barWidth / 2, H - pad.bottom + 16);
    });

    ctx.fillStyle = 'rgba(49,130,206,0.7)';
    ctx.fillRect(pad.left + 10, pad.top, 12, 8);
    ctx.fillStyle = '#4a5568';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Positive Roll Yield (Backwardation)', pad.left + 26, pad.top + 8);
    ctx.fillStyle = 'rgba(229,62,62,0.7)';
    ctx.fillRect(pad.left + 10, pad.top + 14, 12, 8);
    ctx.fillStyle = '#4a5568';
    ctx.fillText('Negative Roll Yield (Contango)', pad.left + 26, pad.top + 22);

    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();
    ctx.fillStyle = '#718096';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Roll Period (Front Month to Next Month)', W / 2, H - 8);
    ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('Roll Yield (%)', 0, 0); ctx.restore();
}

function drawCostOfCarryDiagram(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, W, H);

    const centerX = W / 2;
    const boxW = W * 0.65;
    const boxH = 42;
    const startY = 20;
    const gap = 6;

    const components = [
        { label: 'Futures Price (F)', color: '#1e3a5f', desc: 'The observed forward/futures price' },
        { label: '= Spot Price (S)', color: '#38a169', desc: 'Current spot/cash price' },
        { label: '+ Storage Cost (u)', color: '#d69e2e', desc: 'Warehousing, insurance, handling' },
        { label: '+ Financing Cost (r x T)', color: '#3182ce', desc: 'Interest rate x time to delivery' },
        { label: '- Convenience Yield (y)', color: '#e53e3e', desc: 'Benefit of holding physical inventory' },
    ];

    components.forEach((comp, i) => {
        const y = startY + i * (boxH + gap);
        const x = centerX - boxW / 2;
        ctx.fillStyle = comp.color;
        ctx.beginPath();
        ctx.roundRect(x, y, boxW, boxH, 6);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(comp.label, centerX, y + 18);
        ctx.font = '9px Inter, sans-serif';
        ctx.globalAlpha = 0.85;
        ctx.fillText(comp.desc, centerX, y + 32);
        ctx.globalAlpha = 1;
    });

    const formulaY = startY + components.length * (boxH + gap) + 10;
    ctx.fillStyle = '#1a202c';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('F = S x e^{(r + u - y) x T}', centerX, formulaY);
    ctx.fillStyle = '#718096';
    ctx.font = '9px Inter, sans-serif';
    ctx.fillText('Cost of Carry Model (Continuous Compounding)', centerX, formulaY + 16);
}

        <div class="fc-hero-title">Forward Curve Construction</div>
        <div class="fc-hero-sub">
            A forward curve (also called a futures curve or term structure) plots the prices of a commodity
            for delivery at different dates in the future. It is one of the most important tools in commodities
            trading, used for pricing, hedging, risk management, and understanding market expectations about
            future supply and demand.
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <div class="fc-tab-bar">
            <button class="fc-tab active" onclick="switchFCTab('overview')">How Curves are Built</button>
            <button class="fc-tab" onclick="switchFCTab('interactive')">Interactive Curve</button>
            <button class="fc-tab" onclick="switchFCTab('contango')">Contango & Backwardation</button>
            <button class="fc-tab" onclick="switchFCTab('roll')">Roll Yield</button>
            <button class="fc-tab" onclick="switchFCTab('convenience')">Convenience Yield</button>
        </div>

        <!-- TAB 1: OVERVIEW -->
        <div class="fc-tab-content active" id="fcTab_overview" style="padding: 18px;">
            <div class="fc-section">
                <div class="fc-section-title">What Is a Forward Curve?</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 12px;">
                    Imagine you want to buy gold &mdash; not today, but for delivery in 3 months, 6 months, or even 2 years.
                    The price you'd pay for each of those future deliveries will typically be different from today's spot price.
                    When we plot all these future delivery prices on a chart (with time on the x-axis and price on the y-axis),
                    we get a <strong>forward curve</strong>.
                </p>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 12px;">
                    Think of it like a weather forecast for commodity prices: it shows what the market currently expects
                    prices to be at each point in the future. Unlike a weather forecast, though, these are actual prices
                    at which you can enter into contracts today.
                </p>
            </div>
            <div class="fc-section">
                <div class="fc-section-title">How Is a Forward Curve Constructed?</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">
                    Building a forward curve involves collecting and stitching together market prices from multiple sources:
                </p>
                <div style="display: flex; flex-wrap: wrap; gap: 0; margin: 14px 0;">
                    <div class="sip-flow-step" style="flex: 1; min-width: 140px;"><div class="sip-flow-num">Step 1</div><div class="sip-flow-label">Spot Price</div><div class="sip-flow-desc">Observe today's cash price for immediate delivery from exchanges or OTC markets</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 140px;"><div class="sip-flow-num">Step 2</div><div class="sip-flow-label">Futures Prices</div><div class="sip-flow-desc">Collect closing prices for each listed futures contract month (e.g., Jun, Sep, Dec)</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 140px;"><div class="sip-flow-num">Step 3</div><div class="sip-flow-label">Interpolation</div><div class="sip-flow-desc">Fill gaps between contract months using cubic spline or linear interpolation</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 140px;"><div class="sip-flow-num">Step 4</div><div class="sip-flow-label">Extrapolation</div><div class="sip-flow-desc">Extend the curve beyond the last liquid contract using models or long-term assumptions</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 140px;"><div class="sip-flow-num">Step 5</div><div class="sip-flow-label">Smoothing</div><div class="sip-flow-desc">Apply smoothing to remove noise and ensure the curve is arbitrage-free</div></div>
                </div>
            </div>
            <div class="fc-callout"><div class="fc-callout-title">Key Insight: Forward Curve vs. Price Forecast</div><p>A forward curve does <strong>not</strong> predict where prices will actually go. It reflects the market's <strong>current consensus</strong> based on supply/demand expectations, storage costs, interest rates, and convenience yield.</p></div>
            <div class="fc-section">
                <div class="fc-section-title">Building Blocks of the Curve</div>
                <div class="fc-concept-grid">
                    <div class="fc-concept-card"><h4><span class="stage-badge" style="font-size: 0.7rem;">S</span> Spot Price</h4><p>The anchor point of every forward curve. For gold, from LBMA; for base metals, from LME official prices; for energy, from ICE or NYMEX settlement prices.</p></div>
                    <div class="fc-concept-card"><h4><span class="stage-badge" style="font-size: 0.7rem;">F</span> Futures Settlement Prices</h4><p>Each listed futures contract month provides a firm data point. For example, COMEX Gold lists contracts for Feb, Apr, Jun, Aug, Oct, Dec.</p></div>
                    <div class="fc-concept-card"><h4><span class="stage-badge" style="font-size: 0.7rem;">I</span> Interpolation Methods</h4><p><strong>Linear:</strong> Simple straight line between two known points.<br/><strong>Cubic spline:</strong> Smooth curve through all points. Most ETRM systems use cubic spline by default.</p></div>
                    <div class="fc-concept-card"><h4><span class="stage-badge" style="font-size: 0.7rem;">C</span> Cost of Carry Model</h4><p>The theoretical framework connecting spot and futures prices using storage costs, interest rates, and convenience yield.</p><div class="fc-formula">F(T) = S &times; e<sup>(r + u - y) &times; T</sup></div></div>
                </div>
            </div>
            <div class="fc-section">
                <div class="fc-section-title">Cost of Carry &mdash; Visual Breakdown</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 10px;">Each component either pushes the futures price above spot (positive carry cost) or pulls it below (convenience yield).</p>
                <div class="fc-canvas-wrap" style="height: 290px;"><canvas id="fcCostOfCarryCanvas"></canvas></div>
            </div>
            <div class="fc-section">
                <div class="fc-section-title">Who Uses Forward Curves and Why?</div>
                <table class="fc-table"><thead><tr><th>User</th><th>Purpose</th><th>Example</th></tr></thead><tbody>
                    <tr><td class="fw-bold">Commodity Traders</td><td>Price forwards, identify arbitrage</td><td>Spotting when contango is wide enough to profit from cash-and-carry</td></tr>
                    <tr><td class="fw-bold">Hedgers (Producers)</td><td>Lock in future selling prices</td><td>A gold miner sells 12-month forward to guarantee revenue</td></tr>
                    <tr><td class="fw-bold">Hedgers (Consumers)</td><td>Lock in future purchase prices</td><td>An airline buys jet fuel futures to cap fuel costs</td></tr>
                    <tr><td class="fw-bold">Risk Managers</td><td>Mark-to-market positions, $` + '${tip("VaR")}' + `</td><td>Valuing a 6-month copper swap against the forward curve</td></tr>
                    <tr><td class="fw-bold">Index Funds / ETFs</td><td>Roll strategies, tracking</td><td>Rolling front-month contracts; curve shape determines roll cost</td></tr>
                </tbody></table>
            </div>
        </div>

        <!-- TAB 2: INTERACTIVE CURVE -->
        <div class="fc-tab-content" id="fcTab_interactive" style="padding: 18px;">
            <div class="fc-section">
                <div class="fc-section-title">Build Your Own Forward Curve</div>
                <p style="font-size: 0.82rem; line-height: 1.6; color: var(--text-body); margin-bottom: 12px;">Select a commodity, choose a curve shape, and see how the forward curve changes.</p>
                <div class="fc-controls">
                    <label>Commodity:</label>
                    <select id="fcCommodity" onchange="updateForwardCurve()">
                        ${Object.entries(COMMODITIES).map(([sym, c]) => '<option value="' + sym + '"' + (sym === defaultCommodity ? ' selected' : '') + '>' + c.name + ' (' + sym + ')</option>').join('')}
                    </select>
                    <label style="margin-left: 10px;">Curve Shape:</label>
                    <select id="fcShape" onchange="updateForwardCurve()">
                        <option value="contango" selected>Contango (Upward Sloping)</option>
                        <option value="backwardation">Backwardation (Downward Sloping)</option>
                        <option value="flat">Flat</option>
                    </select>
                    <label style="margin-left: 10px;">Months:</label>
                    <select id="fcMonths" onchange="updateForwardCurve()">
                        <option value="6">6 Months</option><option value="12">12 Months</option><option value="24" selected>24 Months</option><option value="36">36 Months</option>
                    </select>
                </div>
            </div>
            <div class="fc-canvas-wrap" style="height: 360px;"><canvas id="fcMainCanvas"></canvas></div>
            <div class="fc-legend">
                <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: #38a169;"></div> Spot Price</div>
                <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: #3182ce;"></div> Contango</div>
                <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: #e53e3e;"></div> Backwardation</div>
                <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: #718096;"></div> Flat</div>
            </div>
            <div class="fc-section" style="margin-top: 16px;"><div class="fc-section-title">Term Structure Data</div><div id="fcTermTable"></div></div>
        </div>

        <!-- TAB 3: CONTANGO & BACKWARDATION -->
        <div class="fc-tab-content" id="fcTab_contango" style="padding: 18px;">
            <div class="fc-section">
                <div class="fc-section-title">Contango & Backwardation &mdash; The Two Shapes of Forward Curves</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">Every forward curve has a <strong>shape</strong> &mdash; it either slopes upward, downward, or stays roughly flat. Understanding this shape is critical because it affects hedging costs, roll returns, and signals about market conditions.</p>
            </div>
            <div class="fc-diagram-row">
                <div class="fc-diagram-box"><div class="fc-diagram-label"><span class="fc-badge fc-badge-contango">CONTANGO</span> Futures Price &gt; Spot Price</div><div class="fc-canvas-wrap" style="height: 250px; border: none; border-radius: 0;"><canvas id="fcContangoDiagram"></canvas></div></div>
                <div class="fc-diagram-box"><div class="fc-diagram-label"><span class="fc-badge fc-badge-backwardation">BACKWARDATION</span> Futures Price &lt; Spot Price</div><div class="fc-canvas-wrap" style="height: 250px; border: none; border-radius: 0;"><canvas id="fcBackwardationDiagram"></canvas></div></div>
            </div>
            <div class="fc-concept-grid" style="margin-top: 18px;">
                <div class="fc-concept-card" style="border-left: 3px solid #3182ce;">
                    <h4><span class="fc-badge fc-badge-contango">CONTANGO</span> (Normal Market)</h4>
                    <p>Futures prices are <strong>higher</strong> than spot. This is the "normal" state because it costs money to store a commodity.</p>
                    <p style="margin-top: 8px;"><strong>Why?</strong> Carry costs:</p>
                    <ul style="font-size: 0.78rem; margin: 6px 0 0 18px; line-height: 1.8;"><li><strong>Storage</strong> &mdash; vault fees, insurance, security</li><li><strong>Financing</strong> &mdash; interest cost of tying up capital</li></ul>
                    <div class="fc-formula">F = S &times; e<sup>(r + u) &times; T</sup></div>
                    <p style="margin-top: 10px; font-size: 0.75rem; color: var(--text-muted);"><strong>Example:</strong> Gold is almost always in contango. 12-month futures typically trade 1-3% above spot.</p>
                </div>
                <div class="fc-concept-card" style="border-left: 3px solid #e53e3e;">
                    <h4><span class="fc-badge fc-badge-backwardation">BACKWARDATION</span> (Inverted Market)</h4>
                    <p>Futures prices are <strong>lower</strong> than spot. Signals strong immediate demand for the physical commodity.</p>
                    <p style="margin-top: 8px;"><strong>Why?</strong> Supply is tight:</p>
                    <ul style="font-size: 0.78rem; margin: 6px 0 0 18px; line-height: 1.8;"><li><strong>Urgency</strong> &mdash; buyers need the commodity now</li><li><strong>Supply disruption</strong> &mdash; mine strikes, weather, geopolitics</li><li><strong>Inventory drawdowns</strong> &mdash; warehouse stocks falling</li></ul>
                    <div class="fc-formula">F = S &times; e<sup>(r + u - y) &times; T</sup>, where y &gt; r + u</div>
                    <p style="margin-top: 10px; font-size: 0.75rem; color: var(--text-muted);"><strong>Example:</strong> Copper was deeply backwardated in 2021-2022 as LME stocks fell to multi-year lows.</p>
                </div>
            </div>
            <div class="fc-callout" style="margin-top: 16px;"><div class="fc-callout-title">Beginner Summary</div><p><strong>Contango = "it costs more later"</strong> (storage + financing).<br/><strong>Backwardation = "it costs more now"</strong> (urgent demand for physical). Most markets spend the majority of time in contango but can flip quickly.</p></div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Comparison Table</div>
                <table class="fc-table"><thead><tr><th>Feature</th><th>Contango</th><th>Backwardation</th></tr></thead><tbody>
                    <tr><td class="fw-bold">Curve Shape</td><td>Upward sloping</td><td>Downward sloping</td></tr>
                    <tr><td class="fw-bold">Futures vs Spot</td><td>Futures &gt; Spot</td><td>Futures &lt; Spot</td></tr>
                    <tr><td class="fw-bold">Key Driver</td><td>Storage + financing costs</td><td>Convenience yield &gt; carry costs</td></tr>
                    <tr><td class="fw-bold">Supply Signal</td><td>Ample supply, no urgency</td><td>Tight supply, urgent demand</td></tr>
                    <tr><td class="fw-bold">Roll Yield Impact</td><td>Negative (costs money to roll)</td><td>Positive (earns money when rolling)</td></tr>
                    <tr><td class="fw-bold">Common Examples</td><td>Gold, natural gas (summer)</td><td>Copper (squeeze), oil (OPEC cuts)</td></tr>
                    <tr><td class="fw-bold">Frequency</td><td>More common (the "normal" state)</td><td>Less common (usually temporary)</td></tr>
                </tbody></table>
            </div>
        </div>

        <!-- TAB 4: ROLL YIELD -->
        <div class="fc-tab-content" id="fcTab_roll" style="padding: 18px;">
            <div class="fc-section">
                <div class="fc-section-title">Roll Yield &mdash; The Hidden Cost (or Benefit) of Futures Positions</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">Futures contracts expire. To maintain a long-term position, you must <strong>"roll"</strong> &mdash; close the expiring contract and open a new one. The <strong>roll yield</strong> is the gain or loss from this process.</p>
            </div>
            <div class="fc-callout"><div class="fc-callout-title">Simple Analogy</div><p>Like a gym membership: if monthly rates are going up (contango), renewing costs more &mdash; negative roll yield. If rates drop (backwardation), each renewal is cheaper &mdash; positive roll yield.</p></div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">How Roll Yield Works</div>
                <div style="display: flex; flex-wrap: wrap; gap: 0; margin: 14px 0;">
                    <div class="sip-flow-step" style="flex: 1; min-width: 160px;"><div class="sip-flow-num">Step 1</div><div class="sip-flow-label">Hold Front Month</div><div class="sip-flow-desc">You hold the nearest-to-expiry futures contract</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 160px;"><div class="sip-flow-num">Step 2</div><div class="sip-flow-label">Sell Expiring</div><div class="sip-flow-desc">Before expiry, sell (close) the front month contract</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 160px;"><div class="sip-flow-num">Step 3</div><div class="sip-flow-label">Buy Next Month</div><div class="sip-flow-desc">Simultaneously buy the next-month contract</div></div>
                    <div class="sip-flow-step" style="flex: 1; min-width: 160px;"><div class="sip-flow-num">Result</div><div class="sip-flow-label">Roll Yield</div><div class="sip-flow-desc">Price difference = your roll yield</div></div>
                </div>
            </div>
            <div class="fc-concept-grid" style="margin-top: 16px;">
                <div class="fc-concept-card" style="border-left: 3px solid #e53e3e;">
                    <h4>Negative Roll Yield (Contango)</h4>
                    <p>Next-month contract is <strong>more expensive</strong>. You sell low, buy high &mdash; losing money.</p>
                    <div class="fc-formula">Sell front at $2,050 &rarr; Buy next at $2,065<br/>Roll Yield = -0.73%</div>
                    <p style="margin-top: 8px; font-size: 0.75rem; color: var(--text-muted);">This is why long-only commodity ETFs (like USO) can underperform spot price over time.</p>
                </div>
                <div class="fc-concept-card" style="border-left: 3px solid #38a169;">
                    <h4>Positive Roll Yield (Backwardation)</h4>
                    <p>Next-month contract is <strong>cheaper</strong>. You sell high, buy low &mdash; earning money.</p>
                    <div class="fc-formula">Sell front at $9,500 &rarr; Buy next at $9,410<br/>Roll Yield = +0.95%</div>
                    <p style="margin-top: 8px; font-size: 0.75rem; color: var(--text-muted);">Positive roll yield provides a "tailwind" to total returns even if spot doesn't move.</p>
                </div>
            </div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Roll Yield by Month &mdash; Visual Comparison</div>
                <div class="fc-canvas-wrap" style="height: 320px;"><canvas id="fcRollYieldChart"></canvas></div>
                <div class="fc-legend">
                    <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: rgba(49,130,206,0.7); height: 8px; width: 14px;"></div> Positive Roll (Backwardation)</div>
                    <div class="fc-legend-item"><div class="fc-legend-swatch" style="background: rgba(229,62,62,0.7); height: 8px; width: 14px;"></div> Negative Roll (Contango)</div>
                </div>
            </div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Roll Yield Formula</div>
                <div class="fc-concept-card"><div class="fc-formula" style="text-align: center; font-size: 0.88rem; padding: 14px;">Roll Yield = (Front Month Price - Next Month Price) / Front Month Price &times; 100%</div><p style="margin-top: 10px; text-align: center; font-size: 0.78rem; color: var(--text-muted);">Annualised Roll Yield &asymp; Monthly Roll Yield &times; 12</p></div>
            </div>
            <div class="fc-callout" style="margin-top: 14px;"><div class="fc-callout-title">Why Roll Yield Matters</div><p>For commodity investors (especially ETFs/index funds), roll yield can be a <strong>larger component of total return</strong> than spot price change. In persistent contango, an investor can lose 5-10% per year just from rolling.</p></div>
        </div>

        <!-- TAB 5: CONVENIENCE YIELD -->
        <div class="fc-tab-content" id="fcTab_convenience" style="padding: 18px;">
            <div class="fc-section">
                <div class="fc-section-title">Convenience Yield &mdash; The Value of Having the Physical Commodity</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 14px;">The <strong>convenience yield</strong> is the non-monetary benefit from physically holding a commodity rather than a futures contract.</p>
            </div>
            <div class="fc-callout"><div class="fc-callout-title">Simple Analogy</div><p>Imagine you own a bakery. Having flour <strong>in your warehouse right now</strong> means you can keep baking even during a supply disruption. That peace of mind = convenience yield. A futures contract for flour in 3 months doesn't help if you run out today.</p></div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Convenience Yield vs. Inventory Level</div>
                <p style="font-size: 0.82rem; line-height: 1.7; color: var(--text-body); margin-bottom: 10px;">When inventories are low, convenience yield spikes; when high, it drops to near zero.</p>
                <div class="fc-canvas-wrap" style="height: 300px;"><canvas id="fcConvenienceYieldChart"></canvas></div>
            </div>
            <div class="fc-concept-grid" style="margin-top: 18px;">
                <div class="fc-concept-card" style="border-left: 3px solid #6b46c1;">
                    <h4>What Drives Convenience Yield?</h4>
                    <ul style="font-size: 0.78rem; margin: 6px 0 0 18px; line-height: 1.9;">
                        <li><strong>Inventory levels</strong> &mdash; Low stocks = high convenience yield</li>
                        <li><strong>Production needs</strong> &mdash; Manufacturers need raw materials continuously</li>
                        <li><strong>Seasonality</strong> &mdash; Heating oil in winter, natural gas before cold snaps</li>
                        <li><strong>Supply risk</strong> &mdash; Geopolitical events, weather, labour strikes</li>
                        <li><strong>Commodity type</strong> &mdash; Perishable goods have higher convenience yield than metals</li>
                    </ul>
                </div>
                <div class="fc-concept-card" style="border-left: 3px solid #d69e2e;">
                    <h4>Convenience Yield in Cost of Carry</h4>
                    <p>The "missing piece" explaining why some futures trade below spot.</p>
                    <div class="fc-formula">F = S &times; e<sup>(r + u - y) &times; T</sup></div>
                    <p style="margin-top: 6px;">Where: <strong>r</strong> = risk-free rate, <strong>u</strong> = storage cost, <strong>y</strong> = convenience yield, <strong>T</strong> = time</p>
                    <p style="margin-top: 8px;">When <strong>y &gt; r + u</strong>, futures trade below spot (backwardation).</p>
                </div>
            </div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Implied Convenience Yield Formula</div>
                <div class="fc-concept-card"><div class="fc-formula" style="text-align: center; font-size: 0.85rem; padding: 14px;">y = r + u - (1/T) &times; ln(F/S)</div><p style="margin-top: 10px; text-align: center; font-size: 0.78rem; color: var(--text-muted);">Rearranging the cost of carry formula to solve for y</p></div>
            </div>
            <div class="fc-section" style="margin-top: 16px;">
                <div class="fc-section-title">Commodity Comparison</div>
                <table class="fc-table"><thead><tr><th>Commodity</th><th>Convenience Yield</th><th>Storage Cost</th><th>Usual Curve</th><th>Reason</th></tr></thead><tbody>
                    <tr><td class="fw-bold">Gold</td><td>Very Low (~0%)</td><td>Low</td><td><span class="fc-badge fc-badge-contango">Contango</span></td><td>Easy to store, no industrial urgency</td></tr>
                    <tr><td class="fw-bold">Copper</td><td>Medium-High</td><td>Medium</td><td>Variable</td><td>Industrial use creates periodic squeezes</td></tr>
                    <tr><td class="fw-bold">Crude Oil</td><td>Medium</td><td>High</td><td>Variable</td><td>Refinery needs, OPEC supply management</td></tr>
                    <tr><td class="fw-bold">Natural Gas</td><td>High (seasonal)</td><td>High</td><td>Seasonal</td><td>Heating demand, storage capacity limits</td></tr>
                    <tr><td class="fw-bold">Agricultural</td><td>High</td><td>Medium-High</td><td>Often Backwardated</td><td>Perishable, crop uncertainty, seasonal</td></tr>
                </tbody></table>
            </div>
            <div class="fc-callout" style="margin-top: 14px;"><div class="fc-callout-title">Key Takeaway</div><p>Convenience yield makes commodity markets unique. Physical commodities have <strong>real, tangible value</strong> from simply being available when needed. Understanding physical fundamentals (inventory, supply chains, weather) is essential for any commodity trader.</p></div>
        </div>
    </div>
    `;

    setTimeout(() => {
        drawCostOfCarryDiagram('fcCostOfCarryCanvas');
        updateForwardCurve();
        drawContangoBackwardationDiagram('fcContangoDiagram', 'contango');
        drawContangoBackwardationDiagram('fcBackwardationDiagram', 'backwardation');
        drawRollYieldDiagram('fcRollYieldChart');
        drawConvenienceYieldDiagram('fcConvenienceYieldChart');
    }, 60);
}

function switchFCTab(tabName) {
    document.querySelectorAll('.fc-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.fc-tab-content').forEach(t => t.classList.remove('active'));
    const tabs = document.querySelectorAll('.fc-tab');
    const tabNames = ['overview', 'interactive', 'contango', 'roll', 'convenience'];
    const idx = tabNames.indexOf(tabName);
    if (idx >= 0 && tabs[idx]) tabs[idx].classList.add('active');
    const tabEl = document.getElementById('fcTab_' + tabName);
    if (tabEl) tabEl.classList.add('active');
    setTimeout(() => {
        if (tabName === 'interactive') updateForwardCurve();
        if (tabName === 'contango') { drawContangoBackwardationDiagram('fcContangoDiagram', 'contango'); drawContangoBackwardationDiagram('fcBackwardationDiagram', 'backwardation'); }
        if (tabName === 'roll') drawRollYieldDiagram('fcRollYieldChart');
        if (tabName === 'convenience') drawConvenienceYieldDiagram('fcConvenienceYieldChart');
        if (tabName === 'overview') drawCostOfCarryDiagram('fcCostOfCarryCanvas');
    }, 50);

/**
 * Calculate collateral requirements for a trade based on product type,
 * notional value, and counterparty risk rating.
 */
function calculateCollateralRequirements(trade) {
    const com = COMMODITIES[trade.commodity];
    const spot = getMarketPrice(trade.commodity);
    const notional = trade.quantity * spot * com.contractSize;
    const cpData = COUNTERPARTIES[trade.counterparty];
    const riskRating = cpData?.sanctions?.riskRating || 'Medium';

    // IM rates by product type (as % of notional)
    const imRates = {
        'Spot': 0.02, 'Forward': 0.05, 'Future': 0.08,
        'Swap': 0.10, 'Vanilla Option': 0.12,
        'Asian Option': 0.15, 'Barrier Option': 0.18
    };

    // Risk multipliers
    const riskMultipliers = { 'Low': 0.85, 'Medium': 1.0, 'High': 1.25 };

    // Commodity volatility add-on
    const volAddOn = {
        'precious': 0.02, 'base': 0.025, 'pgm': 0.03
    };

    const baseIMRate = imRates[trade.productType] || 0.08;
    const riskMult = riskMultipliers[riskRating] || 1.0;
    const commodityAddOn = volAddOn[com.type] || 0.02;
    const imRate = baseIMRate * riskMult + commodityAddOn;

    // Initial Margin
    const initialMargin = notional * imRate;

    // Variation Margin (MTM-based)
    const tradePrice = trade.price || spot;
    const priceDiff = spot - tradePrice;
    const vmDirection = trade.buySell === 'Buy' ? 1 : -1;
    const variationMargin = priceDiff * vmDirection * trade.quantity * com.contractSize;

    // Haircut schedule for collateral types
    const haircuts = {
        'Cash USD': 0.00,
        'Cash EUR': 0.005,
        'Cash GBP': 0.005,
        'US Treasury': 0.02,
        'German Bund': 0.025,
        'UK Gilt': 0.03,
        'Gold Bullion': 0.05,
        'Corporate Bond IG': 0.08,
        'Equity Index ETF': 0.15
    };

    // Simulate posted collateral
    const cashPortion = initialMargin * 0.6;
    const bondPortion = initialMargin * 0.3;
    const metalPortion = initialMargin * 0.1;

    const postedCollateral = [
        { type: 'Cash USD', amount: cashPortion, haircut: haircuts['Cash USD'], cssClass: 'coll-cash' },
        { type: 'US Treasury', amount: bondPortion, haircut: haircuts['US Treasury'], cssClass: 'coll-bond' },
        { type: 'Gold Bullion', amount: metalPortion, haircut: haircuts['Gold Bullion'], cssClass: 'coll-metal' }
    ];

    const totalPosted = postedCollateral.reduce((s, c) => s + c.amount, 0);
    const totalAfterHaircut = postedCollateral.reduce((s, c) => s + c.amount * (1 - c.haircut), 0);

    // Margin sufficiency
    const totalRequired = initialMargin + Math.max(variationMargin, 0);
    const surplus = totalAfterHaircut - totalRequired;
    const coverageRatio = totalRequired > 0 ? totalAfterHaircut / totalRequired : 1;

    // Threshold & MTA (from CSA terms)
    const thresholdAmount = riskRating === 'Low' ? 500000 : riskRating === 'Medium' ? 250000 : 100000;
    const minimumTransferAmount = 50000;

    // SPAN-style margin for futures
    let spanMargin = null;
    if (trade.productType === 'Future') {
        const scanRange = spot * 0.05; // 5% price scan range
        spanMargin = {
            scanRange: scanRange,
            shortOptionMin: spot * 0.01 * com.contractSize,
            interMonthSpread: initialMargin * 0.15,
            deliveryMonth: initialMargin * 0.20,
            totalSPAN: initialMargin * 0.95 // Slightly less than parametric IM
        };
    }

    return {
        notional,
        initialMargin,
        imRate,
        variationMargin,
        postedCollateral,
        totalPosted,
        totalAfterHaircut,
        totalRequired,
        surplus,
        coverageRatio,
        haircuts,
        thresholdAmount,
        minimumTransferAmount,
        spanMargin,
        marginCall: surplus < 0 ? Math.abs(surplus) : 0,
        status: surplus >= 0 ? 'SUFFICIENT' : 'MARGIN_CALL'
    };
}
